<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기업 상세 | 배당·소각 캘린더</title>
<meta name="description" content="기업 상세 정보 — 배당 내역, 태그, 시가총액">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--up:#ef4444;--dn:#3b82f6;--accent:#3b82f6;--gold:#f59e0b;--green:#10b981;--purple:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
.fi{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:12px;}
.fi:focus{outline:none;border-color:var(--accent);}
.tab-btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;text-decoration:none;display:inline-block;}
.tab-btn:hover{border-color:var(--muted);color:#fff;text-decoration:none;}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.badge{display:inline-block;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:600;}
.b-kospi{background:#7c3aed22;color:#a78bfa;}.b-kosdaq{background:#05966922;color:#6ee7b7;}
.b-pre{background:#f59e0b22;color:#fbbf24;}.b-post{background:#3b82f622;color:#93c5fd;}
.b-bb{background:#ef444422;color:#fca5a5;}.b-buy{background:#10b98122;color:#6ee7b7;}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:12px;color:var(--muted);}
.info-value{font-size:12px;font-weight:600;}
table{width:100%;border-collapse:collapse;}
thead th{background:#1a2332;padding:7px 6px;font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border);}
tbody td{padding:6px;border-bottom:1px solid #1e293b;white-space:nowrap;font-size:12px;}
tbody tr:hover{background:rgba(59,130,246,.06);}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:999;gap:12px;}
.sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sa{font-size:10px;opacity:.6;}
a{color:var(--accent);text-decoration:none;}a:hover{text-decoration:underline;}
.footer-disclaimer{text-align:center;padding:12px;font-size:11px;color:#475569;border-top:1px solid var(--border);margin-top:16px;}

/* Tag styles */
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:500;border:1px solid var(--border);background:rgba(59,130,246,.08);color:#93c5fd;margin:3px;}
.tag-chip.cat-sector,.tag-chip.cat-industry{background:rgba(59,130,246,.07);color:#93c5fd;border-color:rgba(59,130,246,.25);}
.tag-chip.cat-theme{background:rgba(167,139,250,.07);color:#c4b5fd;border-color:rgba(167,139,250,.25);}
.tag-chip.cat-custom{background:rgba(16,185,129,.07);color:#6ee7b7;border-color:rgba(16,185,129,.25);}
.vote-btn{background:none;border:none;cursor:pointer;padding:1px 3px;font-size:11px;color:var(--muted);line-height:1;border-radius:3px;transition:all .15s;}
.vote-btn:hover{color:#fff;background:rgba(255,255,255,.1);}
.vote-btn.voted-up{color:#10b981;}
.vote-btn.voted-dn{color:#ef4444;}
.tag-add-row{display:flex;gap:6px;margin-top:10px;}
.tag-input{flex:1;background:#0f172a;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:12px;}
.tag-input:focus{outline:none;border-color:var(--accent);}
.btn-sm{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s;border:1px solid var(--accent);background:var(--accent);color:#fff;}
.btn-sm:hover{background:#2563eb;}
.btn-sm.secondary{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-sm.secondary:hover{border-color:var(--muted);color:#fff;}
.tags-empty{color:var(--muted);font-size:12px;padding:8px 0;}
.tag-section-note{font-size:10px;color:#475569;margin-top:6px;}
.error-box{background:#1e293b;border:1px solid #ef444444;border-radius:8px;padding:24px;text-align:center;color:#fca5a5;font-size:13px;}
@media(max-width:600px){
  .hide-mobile{display:none;}
  .section{padding:12px;}
  #earningsRatios{grid-template-columns:repeat(2,1fr)!important;}
}
</style>
</head>
<body>
<div id="loading"><div class="sp"></div><div class="sa">데이터 로딩 중...</div></div>

<div style="max-width:900px;margin:0 auto;padding:12px 16px;" id="mainContent" style="display:none;">

<!-- Header -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
  <div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:2px;">
      <a href="./">← 기업 목록</a>
    </div>
    <h1 style="font-size:20px;font-weight:700;" id="pageTitle">—</h1>
    <div class="sa" id="pageSubtitle">—</div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <a href="../" class="tab-btn" style="font-size:11px;">배당 캘린더</a>
    <button class="tab-btn active" id="btnDividend" onclick="goDividend()" style="font-size:11px;">배당 상세</button>
  </div>
</div>

<!-- Error state -->
<div id="errorBox" style="display:none;">
  <div class="error-box">
    <div style="font-size:16px;font-weight:600;margin-bottom:8px;">종목을 찾을 수 없습니다</div>
    <div id="errorMsg" style="font-size:12px;"></div>
    <div style="margin-top:12px;"><a href="./" class="tab-btn">← 기업 목록으로</a></div>
  </div>
</div>

<!-- Company Info -->
<div class="section" id="sectionInfo" style="display:none;">
  <div class="section-title">기업 기본 정보</div>
  <div class="info-row">
    <span class="info-label">종목코드</span>
    <span class="info-value" id="infoCode" style="font-family:monospace;"></span>
  </div>
  <div class="info-row">
    <span class="info-label">종목명</span>
    <span class="info-value" id="infoName"></span>
  </div>
  <div class="info-row">
    <span class="info-label">시장</span>
    <span id="infoMarket"></span>
  </div>
  <div class="info-row">
    <span class="info-label">시가총액</span>
    <span class="info-value" id="infoCap">—</span>
  </div>
  <div class="info-row" id="rowSector" style="display:none;">
    <span class="info-label">섹터</span>
    <span class="info-value" id="infoSector"></span>
  </div>
</div>

<!-- Tags Section -->
<div class="section" id="sectionTags" style="display:none;">
  <div class="section-title">태그</div>
  <div id="tagsContainer">
    <div class="tags-empty">태그 로딩 중...</div>
  </div>
  <div class="tag-add-row" id="tagAddRow" style="display:none;">
    <input type="text" class="tag-input" id="tagInput" placeholder="태그 추가 (예: 고배당, 성장주, ...)" maxlength="30">
    <button class="btn-sm" id="tagSubmitBtn" onclick="submitTag()">추가</button>
  </div>
  <div class="tag-section-note" id="tagSectionNote"></div>
</div>

<!-- Earnings Section -->
<div class="section" id="sectionEarnings" style="display:none;">
  <div class="section-title">실적</div>
  <!-- 투자 지표 카드 -->
  <div id="earningsRatios" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;"></div>
  <!-- 분기별 실적 -->
  <div style="margin-bottom:14px;">
    <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;">분기별 실적 (억원)</div>
    <div style="overflow-x:auto;">
      <table id="earningsQTable">
        <thead>
          <tr>
            <th style="text-align:left;">분기</th>
            <th style="text-align:right;">매출액</th>
            <th style="text-align:right;">영업이익</th>
            <th style="text-align:right;">순이익</th>
            <th style="text-align:right;">영업이익률</th>
            <th style="text-align:right;" class="hide-mobile">YoY매출</th>
          </tr>
        </thead>
        <tbody id="earningsQTbody"></tbody>
      </table>
    </div>
  </div>
  <!-- 연간 실적 -->
  <div>
    <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;">연간 실적 (억원)</div>
    <div style="overflow-x:auto;">
      <table id="earningsATable">
        <thead>
          <tr>
            <th style="text-align:left;">연도</th>
            <th style="text-align:right;">매출액</th>
            <th style="text-align:right;">영업이익</th>
            <th style="text-align:right;">순이익</th>
            <th style="text-align:right;">영업이익률</th>
          </tr>
        </thead>
        <tbody id="earningsATbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Dividend History -->
<div class="section" id="sectionDiv" style="display:none;">
  <div class="section-title">배당·소각 내역 <span id="divCount" style="font-weight:400;color:var(--muted);"></span></div>
  <div style="overflow-x:auto;">
    <table id="divTable">
      <thead>
        <tr>
          <th style="text-align:left;">유형</th>
          <th style="text-align:left;">기준일</th>
          <th style="text-align:left;">지급일</th>
          <th style="text-align:right;">DPS (원)</th>
          <th style="text-align:right;">배당수익률</th>
          <th style="text-align:right;">총배당액 (억원)</th>
        </tr>
      </thead>
      <tbody id="divTbody"></tbody>
    </table>
  </div>
  <div id="divEmpty" style="display:none;color:var(--muted);font-size:12px;padding:16px 0;text-align:center;">배당 내역이 없습니다</div>
</div>

<div class="footer-disclaimer">데이터 출처: DART 공시 기반 · 투자 참고용으로만 활용하세요</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/supabase-init.js"></script>
<script>
// ── 설정 ────────────────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://gvhwaeoyxkmdquxkumkh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_NW9SJO3uG_fLbhlNywuuow_KsqD1N9J';

// ── 상태 ────────────────────────────────────────────────────────────────
let currentCode = '';
let stockInfo = {};
let sb = null;
let currentUser = null;  // 로그인한 유저 (null = 비로그인)
let myVotes = {};        // { [tagId]: 'up'|'down' } — castVote 토글 판정용

// ── URL 파라미터 파싱 ───────────────────────────────────────────────────
function getCode() {
  const params = new URLSearchParams(window.location.search);
  return (params.get('code') || '').replace(/\D/g, '').padStart(6, '0').slice(0, 6);
}

// ── 초기화 ──────────────────────────────────────────────────────────────
async function init() {
  currentCode = getCode();

  if (!currentCode || currentCode === '000000') {
    showError('URL에 종목코드가 없습니다. (?code=005930)');
    return;
  }

  // supabase-init.js의 공유 클라이언트 재사용 (세션 공유를 위해)
  // 직접 createClient 하면 세션이 없는 별도 인스턴스가 생성되어 RLS 차단됨
  sb = window.__supabaseClient || null;
  if (!sb && window.supabase && window.supabase.createClient) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
  if (sb) {
    // getSession()은 localStorage에서 직접 읽음 — getUser()는 네트워크 검증으로 PKCE 타이밍 시 실패 가능
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session ? session.user : null;

    // 로그인/로그아웃 이벤트 시 currentUser + myVotes 최신화
    sb.auth.onAuthStateChange((event, session) => {
      currentUser = session ? session.user : null;
      loadTags(); // myVotes도 함께 갱신
    });
  }

  try {
    const [idxRes, divRes] = await Promise.all([
      fetch('../data/earnings_index.json'),
      fetch('../data/dividends.json')
    ]);
    const idxData = await idxRes.json();
    const divData = await divRes.json();

    const stocksMap = idxData.stocks || idxData;
    const info = stocksMap[currentCode];
    if (!info) {
      showError(`종목코드 ${currentCode}를 찾을 수 없습니다.`);
      return;
    }

    stockInfo = { ...info, ticker: currentCode };

    // 시가총액 — dividends.json caps (원 단위) 또는 earnings_index.json cap (억 단위)
    const caps = divData.caps || {};
    const capRaw = caps[currentCode];
    let capDisplay = '—';
    if (capRaw) {
      const eok = Math.round(capRaw / 100000000);
      if (eok >= 10000) {
        capDisplay = `${(eok/10000).toFixed(2)}조 (${eok.toLocaleString()}억)`;
      } else {
        capDisplay = `${eok.toLocaleString()}억원`;
      }
    } else if (info.cap) {
      const eok = info.cap;
      capDisplay = eok >= 10000 ? `${(eok/10000).toFixed(2)}조 (${eok.toLocaleString()}억)` : `${eok.toLocaleString()}억원`;
    }

    // 헤더 업데이트
    const mktBadgeClass = info.market === 'KOSPI' ? 'b-kospi' : 'b-kosdaq';
    document.getElementById('pageTitle').textContent = `${info.name || currentCode}`;
    document.getElementById('pageSubtitle').textContent = `${currentCode} · ${info.market || ''}`;
    document.title = `${info.name} | 기업 상세`;

    // 기본 정보
    document.getElementById('infoCode').textContent = currentCode;
    document.getElementById('infoName').textContent = info.name || '—';
    document.getElementById('infoMarket').innerHTML = `<span class="badge ${mktBadgeClass}">${info.market || '—'}</span>`;
    document.getElementById('infoCap').textContent = capDisplay;

    if (info.sector) {
      document.getElementById('infoSector').textContent = info.sector;
      document.getElementById('rowSector').style.display = 'flex';
    }

    document.getElementById('sectionInfo').style.display = 'block';

    // 배당 내역
    const events = (divData.events || []).filter(e => e.ticker === currentCode);
    renderDividends(events);

    // 태그
    document.getElementById('sectionTags').style.display = 'block';
    await loadTags();

    // 실적 데이터 (없으면 섹션 숨김)
    try {
      const earnRes = await fetch(`../data/earnings/${currentCode}.json`);
      if (earnRes.ok) {
        const earnData = await earnRes.json();
        renderEarnings(earnData);
      }
    } catch(e) { /* earnings 없음 — 섹션 유지 hidden */ }

    document.getElementById('mainContent').style.display = 'block';
  } catch(e) {
    showError('데이터를 불러오지 못했습니다: ' + e.message);
    return;
  }

  document.getElementById('loading').style.display = 'none';
}

// ── 배당 내역 렌더 ────────────────────────────────────────────────────
function renderDividends(events) {
  document.getElementById('sectionDiv').style.display = 'block';
  const divCount = document.getElementById('divCount');

  if (!events || events.length === 0) {
    document.getElementById('divCount').textContent = '(0건)';
    document.getElementById('divEmpty').style.display = 'block';
    return;
  }

  // 최신순 정렬
  events.sort((a, b) => (b.recordDate || '').localeCompare(a.recordDate || ''));
  divCount.textContent = `(${events.length}건)`;

  const tbody = document.getElementById('divTbody');
  tbody.innerHTML = events.map(e => {
    let typeLabel = '배당';
    let typeCls = 'b-post';
    if (e.type === 'buyback' || e.type === 'bb') { typeLabel = '자사주소각'; typeCls = 'b-bb'; }
    else if (e.type === 'buy') { typeLabel = '자사주취득'; typeCls = 'b-buy'; }
    else if (e.type === 'pre' || (e.fiscalYear || '').includes('중간')) { typeLabel = '중간배당'; typeCls = 'b-pre'; }

    const dps = e.dps ? e.dps.toLocaleString() + '원' : '—';
    const yld = e.yield ? `<span style="color:var(--gold);">${e.yield.toFixed(1)}%</span>` : '—';
    const total = e.totalDividend ? `<span style="color:var(--muted);">${Math.round(e.totalDividend/100000000).toLocaleString()}억</span>` : '—';

    return `<tr>
      <td><span class="badge ${typeCls}">${typeLabel}</span></td>
      <td>${e.recordDate || '—'}</td>
      <td>${e.payDate || '—'}</td>
      <td style="text-align:right;">${dps}</td>
      <td style="text-align:right;">${yld}</td>
      <td style="text-align:right;">${total}</td>
    </tr>`;
  }).join('');
}

// ── 로그인 유도 ───────────────────────────────────────────────────────
function requireLogin(msg) {
  // js/comments.js의 로그인 모달이 있으면 활용, 없으면 안내 메시지
  if (typeof openLoginModal === 'function') {
    openLoginModal(msg);
  } else {
    alert((msg || '로그인이 필요합니다.') + '\n\n로그인 후 이용해 주세요.');
  }
}

// ── 태그 노출 여부 ────────────────────────────────────────────────────
function isVisible(tag) {
  const s = tag.status;
  return s === 'official' || s === 'candidate';
}

// ── 태그 로딩 ────────────────────────────────────────────────────────
async function loadTags() {
  const container = document.getElementById('tagsContainer');
  const note = document.getElementById('tagSectionNote');
  const addRow = document.getElementById('tagAddRow');

  // 로그인 상태에 따라 안내 문구와 입력 UI 결정
  if (currentUser) {
    if (note) note.textContent = '추천수가 높은 태그가 상위에 표시됩니다.';
    if (addRow) addRow.style.display = 'flex';
  } else {
    if (note) note.textContent = '로그인 후 태그를 추가하고 추천할 수 있습니다.';
    if (addRow) addRow.style.display = 'flex'; // 비로그인도 UI 노출, 클릭 시 로그인 유도
  }

  if (!sb) {
    const staticTags = (stockInfo && stockInfo.tags) ? stockInfo.tags : [];
    if (staticTags.length > 0) { renderStaticTags(staticTags); }
    else { container.innerHTML = '<div class="tags-empty">태그 기능을 사용하려면 네트워크 연결이 필요합니다.</div>'; }
    return;
  }

  try {
    const { data: stockTags, error } = await sb
      .from('stock_tags')
      .select('id, tag_id, tags(id, name, slug, category, status, upvotes, downvotes, color, created_at)')
      .eq('ticker', currentCode);

    if (error) throw error;

    // 내 투표 조회 (로그인 시에만) — 전역 myVotes 갱신
    myVotes = {};
    if (currentUser && stockTags && stockTags.length) {
      const tagIds = stockTags.map(st => st.tag_id).filter(Boolean);
      if (tagIds.length) {
        const { data: votes } = await sb
          .from('tag_votes')
          .select('tag_id, vote_type')
          .eq('user_id', currentUser.id)
          .in('tag_id', tagIds);
        if (votes) votes.forEach(v => { myVotes[v.tag_id] = v.vote_type; });
      }
    }

    renderTags(stockTags || []);
  } catch(e) {
    const staticTags = (stockInfo && stockInfo.tags) ? stockInfo.tags : [];
    if (staticTags.length > 0) { renderStaticTags(staticTags); }
    else { container.innerHTML = `<div class="tags-empty">태그 로딩 실패: ${escHtml(e.message)}</div>`; }
  }
}

function renderStaticTags(tags) {
  const container = document.getElementById('tagsContainer');
  container.innerHTML = '<div>' + tags.map(t => {
    const name = escHtml(typeof t === 'string' ? t : (t.name || ''));
    const type = typeof t === 'string' ? 'theme' : (t.type || 'theme');
    const catClass = (type === 'industry' || type === 'sector') ? 'cat-sector' : 'cat-theme';
    return `<span class="tag-chip ${catClass}">${name}</span>`;
  }).join('') + '</div>';
}

function renderTags(stockTags) {
  const container = document.getElementById('tagsContainer');

  // 표시 가능한 태그 필터 (official | candidate)
  const visible = stockTags.filter(st => st.tags && isVisible(st.tags));

  if (!visible.length) {
    const staticTags = (stockInfo && stockInfo.tags) ? stockInfo.tags : [];
    if (staticTags.length > 0) { renderStaticTags(staticTags); return; }
    container.innerHTML = '<div class="tags-empty">아직 태그가 없습니다. 로그인 후 첫 번째 태그를 추가해 보세요.</div>';
    return;
  }

  // 정렬: upvotes DESC, 동률이면 최신순(created_at DESC)
  visible.sort((a, b) => {
    const ta = a.tags || {}, tb = b.tags || {};
    const upDiff = (tb.upvotes || 0) - (ta.upvotes || 0);
    if (upDiff !== 0) return upDiff;
    return (tb.created_at || '').localeCompare(ta.created_at || '');
  });

  let html = '<div>';
  visible.forEach(st => {
    const tag   = st.tags || {};
    const name  = escHtml(tag.name || '?');
    const ups   = tag.upvotes || 0;
    const myV   = myVotes[st.tag_id] || '';
    const colorStyle = tag.color ? `border-color:${tag.color}40;color:${tag.color};` : '';
    html += `<span class="tag-chip" style="${colorStyle}">
      <span>${name}</span>
      <button class="vote-btn ${myV==='up'?'voted-up':''}" onclick="castVote(${st.tag_id},'up')" title="추천">▲</button>
      <span style="font-size:10px;min-width:14px;text-align:center;">${ups}</span>
      <button class="vote-btn ${myV==='down'?'voted-dn':''}" onclick="castVote(${st.tag_id},'down')" title="비추천">▼</button>
    </span>`;
  });
  html += '</div>';

  container.innerHTML = html;
}

// ── 투표 (토글/방향 전환) ──────────────────────────────────────────────
// - 같은 방향 재클릭 → DELETE (취소)
// - 반대 방향 클릭   → DELETE 후 INSERT (전환)
// - 첫 클릭         → INSERT
async function castVote(tagId, voteType) {
  if (!sb) return;
  if (!currentUser) {
    requireLogin('태그 추천은 로그인 후 이용 가능합니다.');
    return;
  }
  try {
    const existing = myVotes[tagId]; // 현재 내 투표 상태

    if (existing) {
      // 기존 투표 삭제 (토글 취소 or 방향 전환 전처리)
      const { error: delErr } = await sb.from('tag_votes')
        .delete()
        .eq('tag_id', tagId)
        .eq('user_id', currentUser.id);
      if (delErr && delErr.code !== 'PGRST116') {
        if (delErr.code === '42501') { requireLogin('세션이 만료됐습니다. 다시 로그인해 주세요.'); return; }
        console.warn('투표 삭제 실패:', delErr.code, delErr.message);
        await loadTags(); return;
      }
    }

    if (existing !== voteType) {
      // 같은 방향 재클릭이 아닐 때만 INSERT (취소가 아닌 경우)
      const { error: insErr } = await sb.from('tag_votes').insert({
        tag_id:    tagId,
        user_id:   currentUser.id,
        vote_type: voteType
      });
      if (insErr) {
        if (insErr.code === '42501') { requireLogin('세션이 만료됐습니다. 다시 로그인해 주세요.'); return; }
        console.warn('투표 실패:', insErr.code, insErr.message);
      }
    }

    // 트리거(trg_tag_vote_counts)가 tags.upvotes/downvotes 자동 갱신
    await loadTags();
  } catch(e) {
    console.warn('투표 예외:', e.message);
    await loadTags();
  }
}

// ── 태그 추가 ─────────────────────────────────────────────────────────
async function submitTag() {
  if (!sb) { alert('네트워크 연결이 필요합니다.'); return; }
  if (!currentUser) {
    requireLogin('태그 추가는 로그인 후 이용 가능합니다.');
    return;
  }

  const input = document.getElementById('tagInput');
  const name = input.value.trim();
  if (!name) return;
  if (name.length < 2) { alert('태그는 2자 이상 입력해 주세요.'); return; }
  if (name.length > 30) { alert('태그는 30자 이내로 입력해 주세요.'); return; }

  const btn = document.getElementById('tagSubmitBtn');
  if (btn) btn.disabled = true;

  try {
    const slug = name
      .toLowerCase()
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9가-힣\-]/g, '')
      .slice(0, 40)
      + '-' + Date.now().toString(36);

    // tags INSERT (status='official' — 즉시 노출)
    const { data: tagData, error: tagErr } = await sb
      .from('tags')
      .insert({
        name,
        slug,
        category: 'custom',
        status:   'official',
        is_auto:  false,
        ip_hash:  null
      })
      .select('id')
      .single();

    if (tagErr) {
      if (tagErr.code === '23505') { alert('이미 존재하는 태그 이름입니다.'); return; }
      throw tagErr;
    }

    // stock_tags 연결
    const { error: stErr } = await sb
      .from('stock_tags')
      .insert({ ticker: currentCode, tag_id: tagData.id });

    if (stErr && stErr.code !== '23505') throw stErr;

    // 본인 upvote 자동 1회 부여
    await sb.from('tag_votes').insert({
      tag_id:    tagData.id,
      user_id:   currentUser.id,
      vote_type: 'up'
    });

    input.value = '';
    await loadTags();
  } catch(e) {
    alert('태그 추가 실패: ' + e.message);
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── 실적 렌더 ──────────────────────────────────────────────────────
function renderEarnings(data) {
  document.getElementById('sectionEarnings').style.display = 'block';

  const fmtAmt = v => v == null ? '—' : Math.round(v / 100).toLocaleString();
  const fmtPct = v => v == null ? '—' : `${Number(v).toFixed(1)}%`;
  const fmtYoY = v => {
    if (v == null) return '—';
    const n = Number(v);
    const color = n > 0 ? 'var(--up)' : n < 0 ? 'var(--dn)' : 'var(--muted)';
    return `<span style="color:${color};">${n > 0 ? '+' : ''}${n.toFixed(1)}%</span>`;
  };

  // 투자 지표 카드
  const r = data.ratios || {};
  const cards = [
    { label: 'ROE', value: r.roe != null ? fmtPct(r.roe) : '—' },
    { label: 'EPS', value: r.eps != null ? r.eps.toLocaleString() + '원' : '—' },
    { label: 'BPS', value: r.bps != null ? r.bps.toLocaleString() + '원' : '—' },
    { label: '부채비율', value: r.debt_ratio != null ? fmtPct(r.debt_ratio) : '—' },
  ];
  document.getElementById('earningsRatios').innerHTML = cards.map(c =>
    `<div style="background:#0f172a;border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;">
      <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">${c.label}</div>
      <div style="font-size:14px;font-weight:700;">${c.value}</div>
    </div>`
  ).join('');

  // 분기별 실적 (최근 8분기)
  const quarterly = (data.quarterly || []).slice(0, 8);
  document.getElementById('earningsQTbody').innerHTML = quarterly.length
    ? quarterly.map(q => `<tr>
        <td style="font-family:monospace;">${q.period || '—'}</td>
        <td style="text-align:right;">${fmtAmt(q.revenue)}</td>
        <td style="text-align:right;">${fmtAmt(q.operating_profit)}</td>
        <td style="text-align:right;">${fmtAmt(q.net_income)}</td>
        <td style="text-align:right;">${fmtPct(q.op_margin)}</td>
        <td style="text-align:right;" class="hide-mobile">${fmtYoY(q.yoy_revenue)}</td>
      </tr>`).join('')
    : '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:12px;">분기 데이터 없음</td></tr>';

  // 연간 실적 (최근 5년)
  const annual = (data.annual || []).slice(0, 5);
  document.getElementById('earningsATbody').innerHTML = annual.length
    ? annual.map(a => `<tr>
        <td style="font-family:monospace;">${a.year || '—'}</td>
        <td style="text-align:right;">${fmtAmt(a.revenue)}</td>
        <td style="text-align:right;">${fmtAmt(a.operating_profit)}</td>
        <td style="text-align:right;">${fmtAmt(a.net_income)}</td>
        <td style="text-align:right;">${fmtPct(a.op_margin)}</td>
      </tr>`).join('')
    : '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:12px;">연간 데이터 없음</td></tr>';
}

// ── 배당 페이지로 이동 ─────────────────────────────────────────────
function goDividend() {
  window.location.href = `../?ticker=${currentCode}`;
}

// ── 에러 표시 ──────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('mainContent').style.display = 'block';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 태그 입력 엔터키 지원 ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const tagInput = document.getElementById('tagInput');
  if (tagInput) {
    tagInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitTag();
    });
  }
  init();
});
</script>
