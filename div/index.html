<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배당·소각 캘린더</title>
<meta name="description" content="KOSPI/KOSDAQ 배당금·자사주 연간 분석 및 캘린더. DART 공시 기반.">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--up:#ef4444;--dn:#3b82f6;--accent:#3b82f6;--gold:#f59e0b;--green:#10b981;--purple:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
.fi{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:12px;}
.fi:focus{outline:none;border-color:var(--accent);}
select.fi{cursor:pointer;}
table{width:100%;border-collapse:collapse;}
thead th{position:sticky;top:0;background:#1a2332;padding:8px 6px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;border-bottom:1px solid var(--border);z-index:2;}
thead th:hover{color:#fff;}
tbody td{padding:6px;border-bottom:1px solid #1e293b;white-space:nowrap;font-size:12px;}
tbody tr{transition:background .1s;}
tbody tr:hover{background:rgba(59,130,246,.08);}
.badge{display:inline-block;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:600;}
.b-kospi{background:#7c3aed22;color:#a78bfa;}.b-kosdaq{background:#05966922;color:#6ee7b7;}
.b-pre{background:#f59e0b22;color:#fbbf24;}.b-post{background:#3b82f622;color:#93c5fd;}
.b-bb{background:#ef444422;color:#fca5a5;}.b-buy{background:#10b98122;color:#6ee7b7;}.b-dispose{background:#f59e0b22;color:#fbbf24;}
.tab-btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;}
.tab-btn:hover{border-color:var(--muted);color:#fff;}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.pill{padding:3px 10px;border:1px solid var(--border);border-radius:99px;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;transition:all .15s;}
.pill:hover{border-color:var(--muted);color:#fff;}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:center;}
.stat-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.stat-card .value{font-size:22px;font-weight:700;margin-top:2px;}
.stat-card .sub{font-size:11px;color:var(--muted);margin-top:2px;}
.tc{max-height:calc(100vh - 300px);overflow-y:auto;}
.tc::-webkit-scrollbar{width:5px;}
.tc::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:999;gap:12px;}
.sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sa{font-size:10px;opacity:.6;}
a{color:var(--accent);text-decoration:none;}a:hover{text-decoration:underline;}
.clickable-name{cursor:pointer;color:var(--text);transition:color .15s;}
.clickable-name:hover{color:var(--accent);text-decoration:underline;}
.footer-disclaimer{text-align:center;padding:12px;font-size:11px;color:#475569;border-top:1px solid var(--border);margin-top:16px;}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-hdr{text-align:center;font-size:10px;color:var(--muted);padding:4px;font-weight:600;}
.cal-day{background:var(--card);border:1px solid transparent;border-radius:4px;min-height:60px;padding:4px;cursor:pointer;transition:all .15s;position:relative;}
.cal-day:hover{border-color:var(--accent);}
.cal-day.today{border-color:var(--gold);}
.cal-day.empty{background:transparent;cursor:default;min-height:auto;}
.cal-day.empty:hover{border-color:transparent;}
.cal-day .day-num{font-size:11px;font-weight:600;color:var(--muted);}
.cal-day.today .day-num{color:var(--gold);}
.cal-day.has-events .day-num{color:var(--text);}
.cal-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin:1px;}
.cal-dot.div{background:var(--accent);}.cal-dot.bb{background:var(--up);}
.cal-cnt{font-size:9px;color:var(--accent);font-weight:700;}
.cal-day.selected{border-color:var(--accent);background:#1e3a5f;}
/* year bar chart */
.yr-bar{display:flex;align-items:end;gap:2px;height:40px;}
.yr-bar-item{flex:1;border-radius:2px 2px 0 0;transition:all .2s;}
/* Detail Panel */
#detailPanel{display:none;position:fixed;top:0;right:0;width:520px;height:100vh;background:var(--bg);border-left:1px solid var(--border);z-index:100;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.5);}
#detailPanel::-webkit-scrollbar{width:5px;}
#detailPanel::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
.detail-header{position:sticky;top:0;background:var(--bg);padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:3;}
.detail-close{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:4px;font-size:12px;}
.detail-close:hover{color:#fff;border-color:var(--muted);}
.detail-section{padding:12px 16px;border-bottom:1px solid var(--border);}
.detail-section h3{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--muted);}
.detail-table{width:100%;}
.detail-table td{padding:5px 6px;font-size:12px;border-bottom:1px solid #1e293b;}
.detail-table tr:hover{background:rgba(59,130,246,.06);}
#detailOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99;}
.dps-up{color:var(--up);font-size:10px;}.dps-dn{color:var(--dn);font-size:10px;}
</style>
</head>
<body>
<div id="loading"><div class="sp"></div><div class="sa">데이터 로딩 중...</div></div>
<div style="max-width:1280px;margin:0 auto;padding:12px 16px;">

<!-- Header -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
  <div>
    <h1 style="font-size:18px;font-weight:700;">배당·소각 캘린더</h1>
    <div class="sa" id="updatedAt"></div>
  </div>
  <a href="../" class="tab-btn" style="text-decoration:none;font-size:11px;">아파트 스크리너</a>
</div>

<!-- Stats -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px;" id="stats"></div>

<!-- Tabs -->
<div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
  <button class="tab-btn active" data-tab="calendar" onclick="switchTab('calendar')">캘린더</button>
  <button class="tab-btn" data-tab="annual" onclick="switchTab('annual')">연간 분석</button>
  <button class="tab-btn" data-tab="company" onclick="switchTab('company')">기업별</button>
  <div style="flex:1;"></div>
  <input type="text" class="fi" id="search" placeholder="종목명 / 코드 검색..." style="width:200px;" oninput="render()">
</div>

<!-- ===== 캘린더 ===== -->
<div id="panelCalendar">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
    <button class="pill" onclick="calNav(-1)">&lt;</button>
    <span style="font-size:15px;font-weight:700;min-width:120px;text-align:center;" id="calTitle"></span>
    <button class="pill" onclick="calNav(1)">&gt;</button>
    <div style="display:flex;gap:3px;margin-left:12px;">
      <button class="pill active" data-cmarket="all" onclick="setF('cmarket','all')">전체</button>
      <button class="pill" data-cmarket="KOSPI" onclick="setF('cmarket','KOSPI')">KOSPI</button>
      <button class="pill" data-cmarket="KOSDAQ" onclick="setF('cmarket','KOSDAQ')">KOSDAQ</button>
    </div>
    <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer;">
      <input type="checkbox" id="chkPayDate" onchange="renderCal()"> 지급일(입금일) 기준
    </label>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div id="calEvents" style="margin-top:10px;"></div>
</div>

<!-- ===== 연간 분석 ===== -->
<div id="panelAnnual" style="display:none;">
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
    <div style="display:flex;gap:3px;">
      <button class="pill active" data-aview="monthly" onclick="setF('aview','monthly')">월별 비교</button>
      <button class="pill" data-aview="yearly" onclick="setF('aview','yearly')">연간 합계</button>
    </div>
    <div style="display:flex;gap:3px;margin-left:12px;">
      <button class="pill active" data-amarket="all" onclick="setF('amarket','all')">전체</button>
      <button class="pill" data-amarket="KOSPI" onclick="setF('amarket','KOSPI')">KOSPI</button>
      <button class="pill" data-amarket="KOSDAQ" onclick="setF('amarket','KOSDAQ')">KOSDAQ</button>
    </div>
    <div style="display:flex;gap:3px;margin-left:12px;" id="yearBar"></div>
    <div style="font-size:10px;color:var(--muted);margin-left:auto;" id="buildDate"></div>
  </div>
  <!-- 집계 카드 -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:14px;" id="annualStats"></div>
  <!-- 차트 영역 -->
  <div id="annualCharts"></div>
</div>

<!-- ===== 기업별 ===== -->
<div id="panelCompany" style="display:none;">
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
    <select class="fi" id="selYear" onchange="render()" style="width:100px;"></select>
    <div style="display:flex;gap:3px;">
      <button class="pill active" data-cmpmarket="all" onclick="setF('cmpmarket','all')">전체</button>
      <button class="pill" data-cmpmarket="KOSPI" onclick="setF('cmpmarket','KOSPI')">KOSPI</button>
      <button class="pill" data-cmpmarket="KOSDAQ" onclick="setF('cmpmarket','KOSDAQ')">KOSDAQ</button>
    </div>
    <select class="fi" id="selCmpSort" onchange="render()" style="width:140px;">
      <option value="totalDiv">배당총액순</option>
      <option value="totalBB">자사주매입순</option>
      <option value="totalAll">배당+매입순</option>
      <option value="yield">수익률순</option>
      <option value="dps">DPS순</option>
      <option value="name">종목명순</option>
    </select>
    <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer;">
      <input type="checkbox" id="chkHasDivBB" onchange="render()"> 배당/자사주 있는 종목만
    </label>
  </div>
  <div class="tc">
    <table>
      <thead><tr>
        <th>종목명</th>
        <th>시장</th>
        <th style="text-align:right">배당총액</th>
        <th style="text-align:right">DPS</th>
        <th style="text-align:right">공시수익률</th>
        <th style="text-align:right">현재가수익률</th>
        <th style="text-align:right">자사주매입</th>
        <th style="text-align:right">자사주소각</th>
        <th style="text-align:right">배당+매입</th>
        <th>배당추이</th>
        <th>공시</th>
      </tr></thead>
      <tbody id="cmpBody"></tbody>
    </table>
  </div>
</div>

<!-- Footer -->
<div id="countInfo" style="text-align:center;padding:8px;font-size:11px;color:var(--muted);"></div>
<div class="footer-disclaimer">DART 공시 기반 · 전체 KOSPI/KOSDAQ · 투자 판단의 책임은 본인에게 있습니다 · <a href="../">아파트 스크리너</a></div>
</div>

<!-- Detail Panel -->
<div id="detailOverlay" onclick="closeDetail()"></div>
<div id="detailPanel">
  <div class="detail-header">
    <div><div style="font-size:15px;font-weight:700;" id="detailName"></div><div style="font-size:11px;color:var(--muted);margin-top:2px;" id="detailMeta"></div></div>
    <button class="detail-close" onclick="closeDetail()">닫기</button>
  </div>
  <div id="detailContent"></div>
</div>

<script>
const NOW=new Date(), TODAY=NOW.toISOString().slice(0,10), THIS_YEAR=NOW.getFullYear();
const YEARS=[2022,2023,2024,2025,2026];
let divData=[],bbData=[],priceMap={},currentTab='calendar';
let calYear=THIS_YEAR, calMonth=NOW.getMonth(), calSelectedDate=null;
let F={cmarket:'all',amarket:'all',aview:'monthly',cmpmarket:'all',aYear:THIS_YEAR};
let dataUpdated='';

// Precomputed
let tickerMeta={}, yearAgg={};

async function init(){
  try{
    const [dR,bR]=await Promise.all([
      fetch('data/dividends.json').then(r=>r.ok?r.json():{events:[]}),
      fetch('data/buybacks.json').then(r=>r.ok?r.json():{events:[]})
    ]);
    divData=dR.events||[];bbData=bR.events||[];priceMap=dR.prices||{};
    // Fix dividend types
    divData.forEach(e=>{
      if(!e.type&&e.recordDate&&e.fiscalYear){
        const ry=+e.recordDate.substring(0,4),fy=+e.fiscalYear;
        if(ry>fy)e.type='후배당';
        else{const rm=+e.recordDate.substring(5,7);e.type=rm===12?'후배당':'선배당';}
      }
      if(e.recordDate&&e.fiscalYear){const ry=+e.recordDate.substring(0,4),fy=+e.fiscalYear;if(ry>fy&&e.type!=='후배당')e.type='후배당';}
    });
    buildMeta();
    dataUpdated=dR.updated||'';
    const priceCount=Object.keys(priceMap).length;
    document.getElementById('updatedAt').textContent=`DART 공시 기준 · ${divData.length.toLocaleString()}건 배당 · ${bbData.length.toLocaleString()}건 자사주 · 현재가 ${priceCount.toLocaleString()}종목 · ${dataUpdated}`;
    buildYearSelect();buildStats();render();
  }catch(e){console.error(e);}
  document.getElementById('loading').style.display='none';
  setTimeout(()=>{var s=document.createElement('script');s.src='https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4171612672605986';s.async=true;s.crossOrigin='anonymous';document.head.appendChild(s);},1000);
}

function buildMeta(){
  tickerMeta={};yearAgg={};
  YEARS.forEach(y=>yearAgg[y]={divTotal:0,buyTotal:0,cancelTotal:0,divCount:0,buyCount:0,cancelCount:0,divTickers:new Set(),buyTickers:new Set(),cancelTickers:new Set()});
  for(const e of divData){
    const t=e.ticker,y=+(e.recordDate||'').substring(0,4);
    if(!tickerMeta[t])tickerMeta[t]={name:e.name,market:e.market,yearDiv:{},yearBuy:{},yearCancel:{},yearDPS:{},yearYield:{},events:[]};
    const m=tickerMeta[t];m.events.push(e);
    if(y&&YEARS.includes(y)){
      m.yearDiv[y]=(m.yearDiv[y]||0)+(e.totalDividend||0);
      m.yearDPS[y]=(m.yearDPS[y]||0)+(e.dps||0);
      if(e.yield>0&&e.yield<50)m.yearYield[y]=e.yield;
      if(yearAgg[y]){yearAgg[y].divTotal+=(e.totalDividend||0);yearAgg[y].divCount++;yearAgg[y].divTickers.add(t);}
    }
  }
  for(const e of bbData){
    const t=e.ticker,y=+((e.buybackDate||'').replace(/\./g,'-').substring(0,4));
    if(!tickerMeta[t])tickerMeta[t]={name:e.name,market:e.market,yearDiv:{},yearBuy:{},yearCancel:{},yearDPS:{},yearYield:{},events:[]};
    const m=tickerMeta[t];
    const amt=e.totalAmount||0;
    const isBuy=e.type==='매입'||(!e.type&&e.type!=='소각');
    const isCancel=e.type==='소각';
    if(y&&YEARS.includes(y)){
      if(isCancel){
        m.yearCancel[y]=(m.yearCancel[y]||0)+amt;
        if(yearAgg[y]){yearAgg[y].cancelTotal+=amt;yearAgg[y].cancelCount++;yearAgg[y].cancelTickers.add(t);}
      }else{
        m.yearBuy[y]=(m.yearBuy[y]||0)+amt;
        if(yearAgg[y]){yearAgg[y].buyTotal+=amt;yearAgg[y].buyCount++;yearAgg[y].buyTickers.add(t);}
      }
    }
  }
}

function buildYearSelect(){
  const sel=document.getElementById('selYear');
  sel.innerHTML=YEARS.slice().reverse().map(y=>`<option value="${y}">${y}년</option>`).join('');
  // year pills for annual
  const bar=document.getElementById('yearBar');
  bar.innerHTML=YEARS.map(y=>`<button class="pill${y===F.aYear?' active':''}" data-ayear="${y}" onclick="setF('aYear',${y})">${y}</button>`).join('');
}

function buildStats(){
  const ty=THIS_YEAR,a=yearAgg[ty]||{};
  const divT=(a.divTotal||0)/1e12, buyT=(a.buyTotal||0)/1e12, cancelT=(a.cancelTotal||0)/1e12;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="label">${ty} 배당총액</div><div class="value">${divT.toFixed(1)}조</div><div class="sub">${a.divTickers?.size||0}개 종목</div></div>
    <div class="stat-card"><div class="label">${ty} 자사주 매입</div><div class="value" style="color:var(--green)">${buyT.toFixed(1)}조</div><div class="sub">${a.buyTickers?.size||0}개 종목</div></div>
    <div class="stat-card"><div class="label">${ty} 자사주 소각</div><div class="value" style="color:var(--up)">${cancelT.toFixed(1)}조</div><div class="sub">${a.cancelTickers?.size||0}개 종목</div></div>
    <div class="stat-card"><div class="label">${ty} 주주환원</div><div class="value" style="color:var(--gold)">${(divT+buyT).toFixed(1)}조</div><div class="sub">배당+매입</div></div>
  `;
}

function switchTab(t){currentTab=t;document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.getElementById('panelCalendar').style.display=t==='calendar'?'':'none';
  document.getElementById('panelAnnual').style.display=t==='annual'?'':'none';
  document.getElementById('panelCompany').style.display=t==='company'?'':'none';
  render();
}
function setF(k,v){F[k]=v;document.querySelectorAll(`[data-${k.toLowerCase()}]`).forEach(b=>b.classList.toggle('active',b.dataset[k.toLowerCase()]==String(v)));render();}

function render(){
  if(currentTab==='calendar')renderCal();
  else if(currentTab==='annual')renderAnnual();
  else renderCompany();
}

// ===== CALENDAR =====
function calNav(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}calSelectedDate=null;renderCal();}

function renderCal(){
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  const usePayDate=document.getElementById('chkPayDate').checked;
  document.getElementById('calTitle').textContent=`${calYear}년 ${calMonth+1}월`;
  const first=new Date(calYear,calMonth,1);const lastDay=new Date(calYear,calMonth+1,0).getDate();
  let startDow=first.getDay();// 0=Sun → adjust to Mon start
  startDow=startDow===0?6:startDow-1;

  // Build date→events map
  const dateMap={};
  const ym=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  for(const e of divData){
    const dt=usePayDate?(e.payDate||''):e.recordDate;
    if(!dt||!dt.startsWith(ym))continue;
    if(F.cmarket!=='all'&&e.market!==F.cmarket)continue;
    if(q&&!e.name.toLowerCase().includes(q)&&!e.ticker.includes(q))continue;
    if(!dateMap[dt])dateMap[dt]={divs:[],bbs:[]};
    dateMap[dt].divs.push(e);
  }
  for(const e of bbData){
    const dt=(e.buybackDate||'').replace(/\./g,'-');
    if(!dt||!dt.startsWith(ym))continue;
    if(F.cmarket!=='all'&&e.market!==F.cmarket)continue;
    if(q&&!e.name.toLowerCase().includes(q)&&!e.ticker.includes(q))continue;
    if(!dateMap[dt])dateMap[dt]={divs:[],bbs:[]};
    dateMap[dt].bbs.push(e);
  }

  let html='<div class="cal-hdr">월</div><div class="cal-hdr">화</div><div class="cal-hdr">수</div><div class="cal-hdr">목</div><div class="cal-hdr">금</div><div class="cal-hdr">토</div><div class="cal-hdr">일</div>';
  for(let i=0;i<startDow;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=lastDay;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ev=dateMap[ds];
    const isToday=ds===TODAY;
    const isSel=ds===calSelectedDate;
    const hasEv=ev&&(ev.divs.length+ev.bbs.length)>0;
    let cls='cal-day';if(isToday)cls+=' today';if(hasEv)cls+=' has-events';if(isSel)cls+=' selected';
    html+=`<div class="${cls}" onclick="selectCalDate('${ds}')"><div class="day-num">${d}</div>`;
    if(hasEv){
      const dc=ev.divs.length,bc=ev.bbs.length;
      html+='<div style="margin-top:2px;">';
      if(dc)html+=`<span class="cal-cnt" style="color:var(--accent);">${dc}배당</span> `;
      if(bc)html+=`<span class="cal-cnt" style="color:var(--up);">${bc}자사주</span>`;
      html+='</div>';
    }
    html+='</div>';
  }
  document.getElementById('calGrid').innerHTML=html;

  // Events list
  if(calSelectedDate&&dateMap[calSelectedDate]){
    const ev=dateMap[calSelectedDate];
    let ehtml=`<div style="font-size:13px;font-weight:600;margin-bottom:8px;">${calSelectedDate} — 배당 ${ev.divs.length}건, 자사주 ${ev.bbs.length}건</div>`;
    if(ev.divs.length){
      const isPast=calSelectedDate<TODAY;
      const yieldHdr1=isPast?'기준일수익률':'공시수익률';
      const yieldHdr2=isPast?'현재가수익률':'현재가수익률';
      ehtml+=`<table><thead><tr><th>종목</th><th>시장</th><th>구분</th><th style="text-align:right">DPS</th><th style="text-align:right">배당총액</th><th style="text-align:right">${yieldHdr1}</th><th style="text-align:right">${yieldHdr2}</th><th>공시</th></tr></thead><tbody>`;
      ev.divs.sort((a,b)=>(b.totalDividend||0)-(a.totalDividend||0));
      for(const e of ev.divs){
        const cp=priceMap[e.ticker]||0;
        const curYield=cp>0&&e.dps>0?(e.dps/cp*100):0;
        const curYieldStr=curYield>0?curYield.toFixed(1)+'%':'-';
        const curYieldCls=curYield>=3?'color:var(--up)':'';
        ehtml+=`<tr><td><span class="clickable-name" onclick="showDetail('${esc(e.ticker)}','${esc(e.name)}')">${esc(e.name)}</span></td><td>${mktB(e.market)}</td><td>${typeB(e.type)}</td><td style="text-align:right;font-weight:600;">${e.dps?e.dps.toLocaleString():'-'}</td><td style="text-align:right;">${fmtAmt(e.totalDividend)}</td><td style="text-align:right;${e.yield>=3?'color:var(--up)':''}">${e.yield?e.yield.toFixed(1)+'%':'-'}</td><td style="text-align:right;${curYieldCls}">${curYieldStr}</td><td>${dartL(e.rceptNo)}</td></tr>`;
      }
      ehtml+='</tbody></table>';
    }
    if(ev.bbs.length){
      ehtml+='<table style="margin-top:8px;"><thead><tr><th>종목</th><th>시장</th><th>구분</th><th style="text-align:right">주식수</th><th style="text-align:right">총액</th><th>공시</th></tr></thead><tbody>';
      for(const e of ev.bbs){
        const tb=e.type==='소각'?'<span class="badge b-bb">소각</span>':e.type==='매입'?'<span class="badge b-buy">매입</span>':e.type==='처분'?'<span class="badge b-dispose">처분</span>':'';
        ehtml+=`<tr><td><span class="clickable-name" onclick="showDetail('${esc(e.ticker)}','${esc(e.name)}')">${esc(e.name)}</span></td><td>${mktB(e.market)}</td><td>${tb}</td><td style="text-align:right;">${e.shareCount?e.shareCount.toLocaleString():'-'}</td><td style="text-align:right;font-weight:600;">${fmtAmt(e.totalAmount)}</td><td>${dartL(e.rceptNo)}</td></tr>`;
      }
      ehtml+='</tbody></table>';
    }
    document.getElementById('calEvents').innerHTML=ehtml;
  }else{
    document.getElementById('calEvents').innerHTML=calSelectedDate?`<div style="color:var(--muted);padding:12px;">이벤트 없음</div>`:'';
  }
  document.getElementById('countInfo').textContent='';
}

// ===== ANNUAL =====
function renderAnnual(){
  const mkt=F.amarket, view=F.aview||'monthly';
  document.getElementById('buildDate').textContent=`데이터 빌드: ${dataUpdated}`;

  // Build monthly aggregation: year-month → {divT, buyT, cancelT}
  const monthly={};
  for(const e of divData){
    const rd=e.recordDate||'';if(rd.length<7)continue;
    if(mkt!=='all'&&e.market!==mkt)continue;
    const ym=rd.substring(0,7);
    if(!monthly[ym])monthly[ym]={divT:0,buyT:0,cancelT:0};
    monthly[ym].divT+=(e.totalDividend||0);
  }
  for(const e of bbData){
    const bd=(e.buybackDate||'').replace(/\./g,'-');if(bd.length<7)continue;
    if(mkt!=='all'&&e.market!==mkt)continue;
    const ym=bd.substring(0,7);
    if(!monthly[ym])monthly[ym]={divT:0,buyT:0,cancelT:0};
    const amt=e.totalAmount||0;
    if(e.type==='소각')monthly[ym].cancelT+=amt;
    else monthly[ym].buyT+=amt;
  }

  // Build yearly aggregation from monthly
  const ya={};YEARS.forEach(y=>ya[y]={divT:0,buyT:0,cancelT:0});
  for(const [ym,d] of Object.entries(monthly)){
    const y=+ym.substring(0,4);if(!YEARS.includes(y))continue;
    ya[y].divT+=d.divT;ya[y].buyT+=d.buyT;ya[y].cancelT+=d.cancelT;
  }

  const sy=F.aYear, a=ya[sy]||{divT:0,buyT:0,cancelT:0};
  const dT=a.divT/1e12, buyT=a.buyT/1e12, canT=a.cancelT/1e12;

  // YTD comparison: same months in previous year
  const curMaxMonth=sy===THIS_YEAR?NOW.getMonth()+1:12;
  let ytdDivCur=0,ytdDivPrev=0,ytdBuyCur=0,ytdBuyPrev=0;
  for(let m=1;m<=curMaxMonth;m++){
    const ymCur=`${sy}-${String(m).padStart(2,'0')}`;
    const ymPrev=`${sy-1}-${String(m).padStart(2,'0')}`;
    ytdDivCur+=(monthly[ymCur]?.divT||0);ytdDivPrev+=(monthly[ymPrev]?.divT||0);
    ytdBuyCur+=(monthly[ymCur]?.buyT||0);ytdBuyPrev+=(monthly[ymPrev]?.buyT||0);
  }
  const ytdLabel=sy===THIS_YEAR?`1~${curMaxMonth}월 YTD`:`연간`;
  const dGrow=ytdDivPrev>0?((ytdDivCur-ytdDivPrev)/ytdDivPrev*100).toFixed(0)+'%':'-';
  const bGrow=ytdBuyPrev>0?((ytdBuyCur-ytdBuyPrev)/ytdBuyPrev*100).toFixed(0)+'%':'-';
  const partial=sy===THIS_YEAR?' (진행중)':'';

  document.getElementById('annualStats').innerHTML=`
    <div class="stat-card"><div class="label">${sy} 배당총액</div><div class="value">${dT.toFixed(1)}조</div><div class="sub">${partial}</div></div>
    <div class="stat-card"><div class="label">${sy} 자사주 매입</div><div class="value" style="color:var(--green)">${buyT.toFixed(1)}조</div></div>
    <div class="stat-card"><div class="label">${sy} 자사주 소각</div><div class="value" style="color:var(--up)">${canT.toFixed(1)}조</div></div>
    <div class="stat-card"><div class="label">${sy} 주주환원</div><div class="value" style="color:var(--gold)">${(dT+buyT).toFixed(1)}조</div><div class="sub">배당+매입</div></div>
    <div class="stat-card"><div class="label">배당 전년비 (${ytdLabel})</div><div class="value" style="color:${dGrow.includes('-')?'var(--dn)':'var(--green)'}">${dGrow}</div><div class="sub">${(ytdDivPrev/1e12).toFixed(1)}→${(ytdDivCur/1e12).toFixed(1)}조</div></div>
    <div class="stat-card"><div class="label">매입 전년비 (${ytdLabel})</div><div class="value" style="color:${bGrow.includes('-')?'var(--dn)':'var(--green)'}">${bGrow}</div><div class="sub">${(ytdBuyPrev/1e12).toFixed(1)}→${(ytdBuyCur/1e12).toFixed(1)}조</div></div>
  `;

  if(view==='monthly') renderMonthlyChart(monthly);
  else renderYearlyChart(ya);
  document.getElementById('countInfo').textContent='';
}

function renderMonthlyChart(monthly){
  const MONTHS=['01','02','03','04','05','06','07','08','09','10','11','12'];
  const colors={2022:'#475569',2023:'#64748b',2024:'#94a3b8',2025:'var(--accent)',2026:'var(--gold)'};
  const selYears=YEARS;

  // 배당 월별 비교
  let maxVal=0;
  const grid={};
  for(const y of selYears){
    grid[y]={};
    for(const m of MONTHS){
      const ym=`${y}-${m}`;
      const v=(monthly[ym]?.divT||0)/1e12;
      grid[y][m]=v;if(v>maxVal)maxVal=v;
    }
  }
  maxVal=maxVal||1;

  let html=`<div class="stat-card" style="text-align:left;padding:16px;margin-bottom:12px;">
    <div class="label" style="margin-bottom:4px;">배당 총액 월별 비교 (조원)</div>
    <div style="display:flex;gap:1px;font-size:9px;color:var(--muted);margin-bottom:2px;">${MONTHS.map(m=>`<div style="flex:1;text-align:center;">${+m}월</div>`).join('')}</div>`;
  for(const y of selYears){
    const isSel=y===F.aYear;
    const col=colors[y]||'#475569';
    html+=`<div style="display:flex;gap:1px;align-items:end;height:32px;margin-bottom:1px;" title="${y}">
      <div style="width:30px;font-size:9px;color:${isSel?'#fff':'var(--muted)'};font-weight:${isSel?700:400};line-height:32px;">${y}</div>`;
    for(const m of MONTHS){
      const v=grid[y][m];
      const h=v>0?Math.max(2,Math.round(v/maxVal*28)):0;
      const opacity=isSel?1:0.5;
      html+=`<div style="flex:1;display:flex;align-items:end;justify-content:center;height:100%;"><div style="width:100%;height:${h}px;background:${col};opacity:${opacity};border-radius:1px;" title="${y}.${m}: ${v.toFixed(1)}조"></div></div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // 자사주 매입 월별
  let maxBuy=0;
  const buyGrid={};
  for(const y of selYears){
    buyGrid[y]={};
    for(const m of MONTHS){
      const ym=`${y}-${m}`;
      const v=(monthly[ym]?.buyT||0)/1e12;
      buyGrid[y][m]=v;if(v>maxBuy)maxBuy=v;
    }
  }
  maxBuy=maxBuy||1;

  html+=`<div class="stat-card" style="text-align:left;padding:16px;margin-bottom:12px;">
    <div class="label" style="margin-bottom:4px;">자사주 매입 월별 비교 (조원)</div>
    <div style="display:flex;gap:1px;font-size:9px;color:var(--muted);margin-bottom:2px;"><div style="width:30px;"></div>${MONTHS.map(m=>`<div style="flex:1;text-align:center;">${+m}월</div>`).join('')}</div>`;
  for(const y of selYears){
    const isSel=y===F.aYear;
    const col=colors[y]||'#475569';
    html+=`<div style="display:flex;gap:1px;align-items:end;height:32px;margin-bottom:1px;">
      <div style="width:30px;font-size:9px;color:${isSel?'#fff':'var(--muted)'};font-weight:${isSel?700:400};line-height:32px;">${y}</div>`;
    for(const m of MONTHS){
      const v=buyGrid[y][m];
      const h=v>0?Math.max(2,Math.round(v/maxBuy*28)):0;
      const opacity=isSel?1:0.5;
      html+=`<div style="flex:1;display:flex;align-items:end;justify-content:center;height:100%;"><div style="width:100%;height:${h}px;background:${col};opacity:${opacity};border-radius:1px;" title="${y}.${m}: ${v.toFixed(1)}조"></div></div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // 자사주 소각 월별
  let maxCan=0;
  const canGrid={};
  for(const y of selYears){
    canGrid[y]={};
    for(const m of MONTHS){
      const ym=`${y}-${m}`;
      const v=(monthly[ym]?.cancelT||0)/1e12;
      canGrid[y][m]=v;if(v>maxCan)maxCan=v;
    }
  }
  maxCan=maxCan||1;

  html+=`<div class="stat-card" style="text-align:left;padding:16px;">
    <div class="label" style="margin-bottom:4px;">자사주 소각 월별 비교 (조원)</div>
    <div style="display:flex;gap:1px;font-size:9px;color:var(--muted);margin-bottom:2px;"><div style="width:30px;"></div>${MONTHS.map(m=>`<div style="flex:1;text-align:center;">${+m}월</div>`).join('')}</div>`;
  for(const y of selYears){
    const isSel=y===F.aYear;
    const col=y===2026?'var(--up)':colors[y]||'#475569';
    html+=`<div style="display:flex;gap:1px;align-items:end;height:32px;margin-bottom:1px;">
      <div style="width:30px;font-size:9px;color:${isSel?'#fff':'var(--muted)'};font-weight:${isSel?700:400};line-height:32px;">${y}</div>`;
    for(const m of MONTHS){
      const v=canGrid[y][m];
      const h=v>0?Math.max(2,Math.round(v/maxCan*28)):0;
      const opacity=isSel?1:0.5;
      html+=`<div style="flex:1;display:flex;align-items:end;justify-content:center;height:100%;"><div style="width:100%;height:${h}px;background:${col};opacity:${opacity};border-radius:1px;" title="${y}.${m}: ${v.toFixed(1)}조"></div></div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  document.getElementById('annualCharts').innerHTML=html;
}

function renderYearlyChart(ya){
  const maxDiv=Math.max(...YEARS.map(y=>(ya[y]?.divT||0)/1e12),1);
  const maxBuy=Math.max(...YEARS.map(y=>(ya[y]?.buyT||0)/1e12),1);
  const maxCan=Math.max(...YEARS.map(y=>(ya[y]?.cancelT||0)/1e12),1);
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
    <div class="stat-card" style="text-align:left;padding:16px;">
      <div class="label" style="margin-bottom:8px;">배당 총액 (조원)</div>
      <div style="display:flex;align-items:end;gap:6px;height:80px;">`;
  for(const y of YEARS){
    const dv=(ya[y]?.divT||0)/1e12;
    const dh=Math.max(4,Math.round(dv/maxDiv*70));
    const isSel=y===F.aYear;
    html+=`<div style="flex:1;text-align:center;"><div style="height:${dh}px;background:${isSel?'var(--accent)':'#334155'};border-radius:3px 3px 0 0;margin:0 auto;width:80%;cursor:pointer;" onclick="setF('aYear',${y})"></div><div style="font-size:9px;color:var(--muted);margin-top:4px;">${y}${y===THIS_YEAR?' *':''}</div><div style="font-size:10px;font-weight:600;">${dv.toFixed(1)}</div></div>`;
  }
  html+=`</div></div>
    <div class="stat-card" style="text-align:left;padding:16px;">
      <div class="label" style="margin-bottom:8px;">자사주 매입 (조원)</div>
      <div style="display:flex;align-items:end;gap:6px;height:80px;">`;
  for(const y of YEARS){
    const bv=(ya[y]?.buyT||0)/1e12;
    const bh=Math.max(4,Math.round(bv/maxBuy*70));
    const isSel=y===F.aYear;
    html+=`<div style="flex:1;text-align:center;"><div style="height:${bh}px;background:${isSel?'var(--green)':'#334155'};border-radius:3px 3px 0 0;margin:0 auto;width:80%;cursor:pointer;" onclick="setF('aYear',${y})"></div><div style="font-size:9px;color:var(--muted);margin-top:4px;">${y}${y===THIS_YEAR?' *':''}</div><div style="font-size:10px;font-weight:600;">${bv.toFixed(1)}</div></div>`;
  }
  html+=`</div></div>
    <div class="stat-card" style="text-align:left;padding:16px;">
      <div class="label" style="margin-bottom:8px;">자사주 소각 (조원)</div>
      <div style="display:flex;align-items:end;gap:6px;height:80px;">`;
  for(const y of YEARS){
    const cv=(ya[y]?.cancelT||0)/1e12;
    const ch=Math.max(4,Math.round(cv/maxCan*70));
    const isSel=y===F.aYear;
    html+=`<div style="flex:1;text-align:center;"><div style="height:${ch}px;background:${isSel?'var(--up)':'#334155'};border-radius:3px 3px 0 0;margin:0 auto;width:80%;cursor:pointer;" onclick="setF('aYear',${y})"></div><div style="font-size:9px;color:var(--muted);margin-top:4px;">${y}${y===THIS_YEAR?' *':''}</div><div style="font-size:10px;font-weight:600;">${cv.toFixed(1)}</div></div>`;
  }
  html+=`</div></div></div>`;
  document.getElementById('annualCharts').innerHTML=html;
}

// ===== COMPANY =====
function renderCompany(){
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  const sy=+document.getElementById('selYear').value;
  const mkt=F.cmpmarket;
  const sortMode=document.getElementById('selCmpSort').value;
  const onlyHas=document.getElementById('chkHasDivBB').checked;

  let rows=[];
  for(const [t,m] of Object.entries(tickerMeta)){
    if(mkt!=='all'&&m.market!==mkt)continue;
    if(q&&!m.name.toLowerCase().includes(q)&&!t.includes(q))continue;
    const dv=m.yearDiv[sy]||0, buy=m.yearBuy[sy]||0, cancel=m.yearCancel[sy]||0, dps=m.yearDPS[sy]||0, yld=m.yearYield[sy]||0;
    if(onlyHas&&dv===0&&buy===0&&cancel===0)continue;
    // DPS trend
    const trend=YEARS.map(y=>m.yearDPS[y]||0);
    // latest rceptNo for this year
    let rn='';
    for(const e of m.events){if((e.recordDate||'').startsWith(String(sy))&&e.rceptNo){rn=e.rceptNo;break;}}
    const cp=priceMap[t]||0;
    const curYield=cp>0&&dps>0?(dps/cp*100):0;
    rows.push({ticker:t,name:m.name,market:m.market,totalDiv:dv,totalBuy:buy,totalCancel:cancel,dps,yield:yld,curYield,trend,rceptNo:rn,totalAll:dv+buy});
  }

  if(sortMode==='totalDiv')rows.sort((a,b)=>b.totalDiv-a.totalDiv);
  else if(sortMode==='totalBB')rows.sort((a,b)=>b.totalBuy-a.totalBuy);
  else if(sortMode==='totalAll')rows.sort((a,b)=>b.totalAll-a.totalAll);
  else if(sortMode==='yield')rows.sort((a,b)=>b.yield-a.yield);
  else if(sortMode==='dps')rows.sort((a,b)=>b.dps-a.dps);
  else rows.sort((a,b)=>a.name.localeCompare(b.name));

  const tbody=document.getElementById('cmpBody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--muted);">데이터 없음</td></tr>';return;}

  // Top 200
  const show=rows.slice(0,200);
  const maxTrend=Math.max(...show.flatMap(r=>r.trend),1);
  let html='';
  for(const r of show){
    // mini trend
    let th='<div style="display:flex;gap:1px;align-items:end;height:18px;">';
    for(let i=0;i<r.trend.length;i++){
      const v=r.trend[i],h=v>0?Math.max(2,Math.round(v/maxTrend*16)):0;
      const col=i===r.trend.length-1?'var(--accent)':'#475569';
      th+=`<div style="width:5px;height:${h}px;background:${col};border-radius:1px;" title="${YEARS[i]}: ${v.toLocaleString()}"></div>`;
    }
    th+='</div>';

    html+=`<tr>
      <td><span class="clickable-name" onclick="showDetail('${esc(r.ticker)}','${esc(r.name)}')">${esc(r.name)}</span> <span style="color:var(--muted);font-size:10px;">${esc(r.ticker)}</span></td>
      <td>${mktB(r.market)}</td>
      <td style="text-align:right;font-weight:600;">${fmtAmt(r.totalDiv)}</td>
      <td style="text-align:right;">${r.dps?r.dps.toLocaleString():'-'}</td>
      <td style="text-align:right;${r.yield>=3?'color:var(--up)':''}">${r.yield?r.yield.toFixed(1)+'%':'-'}</td>
      <td style="text-align:right;${r.curYield>=3?'color:var(--up)':''}">${r.curYield?r.curYield.toFixed(1)+'%':'-'}</td>
      <td style="text-align:right;font-weight:600;color:var(--green);">${fmtAmt(r.totalBuy)}</td>
      <td style="text-align:right;color:var(--up);">${fmtAmt(r.totalCancel)}</td>
      <td style="text-align:right;font-weight:700;color:var(--gold);">${fmtAmt(r.totalAll)}</td>
      <td>${th}</td>
      <td>${dartL(r.rceptNo)}</td>
    </tr>`;
  }
  tbody.innerHTML=html;
  document.getElementById('countInfo').textContent=`${show.length}/${rows.length}개 종목 (${sy}년)`;
}

// ===== DETAIL =====
function showDetail(ticker,name){
  document.getElementById('detailName').textContent=name;
  const m=tickerMeta[ticker];
  const tBBs=bbData.filter(e=>e.ticker===ticker).sort((a,b)=>(b.buybackDate||'').localeCompare(a.buybackDate||''));
  document.getElementById('detailMeta').textContent=`${ticker} · ${m?.market||''}`;
  let html='';
  if(m&&m.events.length){
    // 연간 요약
    html+='<div class="detail-section"><h3>연간 주주환원</h3><table class="detail-table"><tr style="color:var(--muted);font-size:11px;"><td>연도</td><td style="text-align:right">배당총액</td><td style="text-align:right">DPS</td><td style="text-align:right">매입</td><td style="text-align:right">소각</td><td style="text-align:right">배당+매입</td></tr>';
    for(const y of YEARS.slice().reverse()){
      const dv=m.yearDiv[y]||0,buy=m.yearBuy[y]||0,cancel=m.yearCancel[y]||0,dps=m.yearDPS[y]||0;
      if(!dv&&!buy&&!cancel)continue;
      html+=`<tr><td style="font-weight:600;">${y}</td><td style="text-align:right;">${fmtAmt(dv)}</td><td style="text-align:right;">${dps?dps.toLocaleString():'-'}</td><td style="text-align:right;color:var(--green);">${fmtAmt(buy)}</td><td style="text-align:right;color:var(--up);">${fmtAmt(cancel)}</td><td style="text-align:right;font-weight:700;color:var(--gold);">${fmtAmt(dv+buy)}</td></tr>`;
    }
    html+='</table></div>';
    // 배당 상세
    const sorted=[...m.events].sort((a,b)=>(b.recordDate||'').localeCompare(a.recordDate||''));
    const cp=priceMap[ticker]||0;
    html+=`<div class="detail-section"><h3>배당 이력 (${sorted.length}건)</h3>`;
    if(cp>0)html+=`<div style="font-size:11px;color:var(--muted);margin-bottom:6px;">현재가: ${cp.toLocaleString()}원 (${dataUpdated} 기준)</div>`;
    html+=`<table class="detail-table"><tr style="color:var(--muted);font-size:11px;"><td>기준일</td><td>구분</td><td style="text-align:right">DPS</td><td style="text-align:right">배당총액</td><td style="text-align:right">공시수익률</td><td style="text-align:right">현재가수익률</td><td></td></tr>`;
    for(const e of sorted){
      const cYld=cp>0&&e.dps>0?(e.dps/cp*100):0;
      const cYldStr=cYld>0?cYld.toFixed(1)+'%':'-';
      const isPastEv=(e.recordDate||'')<TODAY;
      html+=`<tr><td>${esc(e.recordDate)}</td><td>${typeB(e.type)}</td><td style="text-align:right;font-weight:600;">${e.dps?e.dps.toLocaleString():'-'}</td><td style="text-align:right;">${fmtAmt(e.totalDividend)}</td><td style="text-align:right;${e.yield>=3?'color:var(--up)':''}">${e.yield?e.yield.toFixed(1)+'%':'-'}</td><td style="text-align:right;${cYld>=3?'color:var(--up)':''}">${cYldStr}</td><td>${dartL(e.rceptNo)}</td></tr>`;
    }
    html+='</table></div>';
  }
  if(tBBs.length){
    html+=`<div class="detail-section"><h3>자사주 이력 (${tBBs.length}건)</h3><table class="detail-table"><tr style="color:var(--muted);font-size:11px;"><td>일자</td><td>구분</td><td style="text-align:right">주식수</td><td style="text-align:right">총액</td><td></td></tr>`;
    for(const e of tBBs){
      const tb=e.type==='소각'?'<span class="badge b-bb">소각</span>':e.type==='매입'?'<span class="badge b-buy">매입</span>':e.type==='처분'?'<span class="badge b-dispose">처분</span>':'';
      html+=`<tr><td>${esc(e.buybackDate)}</td><td>${tb}</td><td style="text-align:right;">${e.shareCount?e.shareCount.toLocaleString():'-'}</td><td style="text-align:right;font-weight:600;">${fmtAmt(e.totalAmount)}</td><td>${dartL(e.rceptNo)}</td></tr>`;
    }
    html+='</table></div>';
  }
  if(!html)html='<div class="detail-section" style="color:var(--muted);text-align:center;padding:40px;">데이터 없음</div>';
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById('detailPanel').style.display='block';
  document.getElementById('detailOverlay').style.display='block';
}
function closeDetail(){document.getElementById('detailPanel').style.display='none';document.getElementById('detailOverlay').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

// ===== HELPERS =====
function mktB(m){return m==='KOSPI'?'<span class="badge b-kospi">KOSPI</span>':m==='KOSDAQ'?'<span class="badge b-kosdaq">KOSDAQ</span>':m||'';}
function typeB(t){return t==='선배당'?'<span class="badge b-pre">선배당</span>':t==='후배당'?'<span class="badge b-post">후배당</span>':'';}
function dartL(r){return r?`<a href="https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${r}" target="_blank" rel="noopener">원문</a>`:'';}
function fmtAmt(v){if(!v)return'-';if(v>=1e12)return(v/1e12).toFixed(1)+'조';if(v>=1e8)return(v/1e8).toFixed(0)+'억';if(v>=1e4)return(v/1e4).toFixed(0)+'만';return v.toLocaleString();}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

init();
</script>
</body>
</html>
