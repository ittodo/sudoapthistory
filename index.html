<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울·경기 아파트 투자 스크리너</title>
<meta name="description" content="국토교통부 실거래가 데이터 기반 서울·경기 아파트 49,015개 단지+평형 투자 지표 분석 스크리너">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4171612672605986"
     crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --up: #ef4444; --dn: #3b82f6; --accent: #3b82f6; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
  .fi { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 12px; width: 100%; }
  .fi:focus { outline: none; border-color: var(--accent); }
  .tc { max-height: calc(100vh - 290px); overflow-y: auto; }
  .main-layout { display: flex; gap: 12px; }
  .left-col { flex: 1; min-width: 0; }
  .right-col { width: 380px; flex-shrink: 0; display: none; position: sticky; top: 12px; align-self: flex-start; max-height: calc(100vh - 80px); overflow-y: auto; }
  .right-col.open { display: block; }
  .right-col::-webkit-scrollbar { width: 5px; }
  .right-col::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  .tc::-webkit-scrollbar { width: 5px; }
  .tc::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { position: sticky; top: 0; background: #1a2332; padding: 8px 6px; font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; user-select: none; white-space: nowrap; border-bottom: 1px solid var(--border); }
  thead th:hover { color: #fff; }
  tbody td { padding: 6px; border-bottom: 1px solid #1e293b; white-space: nowrap; font-size: 12px; }
  tbody tr { cursor: pointer; transition: background .1s; }
  tbody tr:hover { background: rgba(59,130,246,.08); }
  tbody tr.sel { background: rgba(59,130,246,.15); }
  .up { color: var(--up); }
  .dn { color: var(--dn); }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 99px; font-size: 10px; font-weight: 600; margin-right: 4px; }
  .b-s { background: #7c3aed22; color: #a78bfa; }
  .b-g { background: #05966922; color: #6ee7b7; }
  .mc { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
  .mc .l { font-size: 10px; color: var(--muted); }
  .mc .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .rg { display: flex; align-items: center; gap: 3px; }
  .rg input { width: 60px; }
  #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 999; gap: 12px; }
  .sp { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sa { font-size: 10px; opacity: .4; }
  .sa.on { opacity: 1; color: var(--accent); }
  .pg-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; }
  .pg-btn:hover { border-color: var(--muted); color: #fff; }
  .area-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
  .area-tab { padding: 3px 10px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 500; transition: all .15s; }
  .area-tab:hover { border-color: var(--muted); color: #fff; }
  .area-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .yr-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 4px; border-bottom: 1px solid #1e293b; cursor: pointer; border-radius: 3px; transition: background .1s; }
  .yr-row:hover { background: rgba(59,130,246,.1); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 680px; max-width: 95vw; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: start; justify-content: space-between; }
  .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
  .modal-body::-webkit-scrollbar { width: 5px; }
  .modal-body::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  .month-tabs { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 12px; }
  .month-tab { padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; transition: all .15s; }
  .month-tab:hover { border-color: var(--muted); color: #fff; }
  .month-tab.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
  .tx-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tx-table th { padding: 6px 8px; text-align: left; color: var(--muted); font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--border); }
  .tx-table td { padding: 5px 8px; border-bottom: 1px solid #1e293b; }
  .tx-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .tx-stat { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; text-align: center; }
  .tx-stat .label { font-size: 10px; color: var(--muted); }
  .tx-stat .value { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .footer-disclaimer { text-align: center; padding: 12px; font-size: 11px; color: #475569; border-top: 1px solid var(--border); margin-top: 16px; }
  #mapWrap { height: 200px; margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); display: none; position: relative; }
  #vmap { width: 100%; height: 100%; }
  #vmap .leaflet-control-attribution, #vmapBig .leaflet-control-attribution { font-size: 9px; background: rgba(30,41,59,.8); color: #64748b; }
  #vmap .leaflet-control-attribution a, #vmapBig .leaflet-control-attribution a { color: #94a3b8; }
  .map-expand-btn { position: absolute; top: 8px; right: 8px; z-index: 500; width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: rgba(15,23,42,.85); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .15s; }
  .map-expand-btn:hover { background: var(--card); color: #fff; border-color: var(--muted); }
  .map-modal { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1001; display: flex; align-items: center; justify-content: center; }
  .map-modal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 90vw; height: 80vh; max-width: 1200px; overflow: hidden; display: flex; flex-direction: column; }
  .map-modal-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .map-modal-body { flex: 1; position: relative; }
  #vmapBig { width: 100%; height: 100%; }
  .view-tabs { display: flex; gap: 2px; margin-bottom: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 3px; width: fit-content; }
  .view-tab { padding: 6px 16px; border-radius: 6px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; transition: all .15s; }
  .view-tab:hover { color: #fff; }
  .view-tab.active { background: var(--accent); color: #fff; }
  .area-view { display: none; }
  .area-view.show { display: flex; gap: 12px; }
  .area-left { width: 280px; flex-shrink: 0; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; align-self: flex-start; position: sticky; top: 12px; max-height: calc(100vh - 120px); overflow-y: auto; }
  .area-left::-webkit-scrollbar { width: 5px; }
  .area-left::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  .area-right { flex: 1; min-width: 0; }
  .level-tabs { display: flex; gap: 2px; margin-bottom: 10px; background: var(--bg); border-radius: 6px; padding: 2px; }
  .level-tab { flex: 1; padding: 5px 0; border: none; border-radius: 5px; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 600; text-align: center; transition: all .15s; }
  .level-tab.active { background: var(--accent); color: #fff; }
  .area-checklist { max-height: 420px; overflow-y: auto; }
  .area-checklist::-webkit-scrollbar { width: 4px; }
  .area-checklist::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  .area-item { display: flex; align-items: center; gap: 8px; padding: 5px 6px; border-radius: 4px; cursor: pointer; transition: background .1s; font-size: 12px; }
  .area-item:hover { background: rgba(59,130,246,.08); }
  .area-item.checked { background: rgba(59,130,246,.12); }
  .area-check { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; transition: all .15s; }
  .area-item.checked .area-check { background: var(--accent); border-color: var(--accent); color: #fff; }
  .area-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; min-height: 24px; }
  .area-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .area-badge .x { font-size: 13px; margin-left: 2px; opacity: .7; }
  .area-badge .x:hover { opacity: 1; }
  .cmp-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .cmp-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; margin-bottom: 12px; }
  .cmp-summary { border-left: 3px solid; border-radius: 8px; background: var(--card); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 12px; }
  .cmp-summary .name { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .cmp-summary .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 11px; }
  .cmp-summary .stat-label { color: var(--muted); }
  .cmp-summary .stat-value { font-weight: 600; text-align: right; }
  .cmp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cmp-table th { padding: 8px 10px; text-align: center; color: var(--muted); font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--border); }
  .cmp-table th:first-child { text-align: left; }
  .cmp-table td { padding: 6px 10px; border-bottom: 1px solid #1e293b; text-align: center; }
  .cmp-table td:first-child { text-align: left; color: var(--muted); font-weight: 500; }
  .cmp-table td.best { font-weight: 700; }
  .cmp-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .cmp-empty .icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }
  .cmp-empty .msg { font-size: 13px; }
  /* 단지 목록 테이블 in comparison */
  .complex-list-section { margin-top: 8px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
  .complex-list-section h4 { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
  .complex-list-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .complex-list-table th { padding: 5px 6px; text-align: center; color: var(--muted); font-weight: 600; font-size: 10px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .complex-list-table th:first-child, .complex-list-table th:nth-child(2) { text-align: left; }
  .complex-list-table td { padding: 4px 6px; border-bottom: 1px solid #1e293b; text-align: center; }
  .complex-list-table td:first-child, .complex-list-table td:nth-child(2) { text-align: left; }
  .complex-list-table tbody tr { cursor: pointer; transition: background .1s; }
  .complex-list-table tbody tr:hover { background: rgba(59,130,246,.08); }

  /* 시뮬레이터 */
  .cmp-sub-tabs { display:flex; gap:2px; margin-bottom:12px; background:var(--bg); border-radius:6px; padding:2px; width:fit-content; }
  .cmp-sub-tab { padding:5px 14px; border-radius:5px; border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:12px; font-weight:600; transition:all .15s; }
  .cmp-sub-tab:hover { color:#fff; }
  .cmp-sub-tab.active { background:var(--accent); color:#fff; }
  .sim-sliders { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-bottom:14px; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; }
  .sim-slider label { font-size:11px; color:var(--muted); display:block; margin-bottom:3px; }
  .sim-slider input[type=range] { width:100%; accent-color:var(--accent); }
  .sim-slider .val { font-size:12px; font-weight:600; color:#fff; text-align:right; }
  .sim-result-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin-bottom:14px; }
  .sim-result-card { border-left:3px solid; border-radius:8px; background:var(--card); border-top:1px solid var(--border); border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:12px; }
  .sim-result-card .sim-name { font-size:12px; font-weight:700; margin-bottom:6px; }
  .sim-result-card .sim-stats { display:grid; grid-template-columns:1fr 1fr; gap:3px; font-size:11px; }
  .sim-result-card .sim-stat-label { color:var(--muted); }
  .sim-result-card .sim-stat-value { font-weight:600; text-align:right; }

  /* 모바일 카드 */
  .m-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: background .1s; }
  .m-card:hover { background: rgba(59,130,246,.08); }
  .m-card.sel { background: rgba(59,130,246,.15); }
  .m-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .m-card-name { font-weight: 700; font-size: 13px; }
  .m-card-loc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .m-card-price { font-size: 16px; font-weight: 700; text-align: right; }
  .m-card-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .m-card-metric { text-align: center; }
  .m-card-metric .ml { font-size: 9px; color: var(--muted); }
  .m-card-metric .mv { font-size: 12px; font-weight: 600; }
  .m-detail-back { display: none; background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 10px; width: 100%; text-align: left; }
  .m-detail-back:hover { color: #fff; border-color: var(--muted); }
  .filter-toggle-btn { display: none; background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; width: 100%; text-align: center; margin-top: 8px; }
  .filter-toggle-btn:hover { color: #fff; border-color: var(--muted); }

  @media (max-width: 768px) {
    #app { padding: 8px !important; }
    .flex.items-center.justify-between.mb-3 { flex-direction: column; align-items: flex-start !important; gap: 8px; }
    .view-tabs { width: 100%; }
    .view-tab { flex: 1; text-align: center; }
    .filter-toggle-btn { display: block; }
    .filter-hidden { display: none !important; }
    #tableWrap { display: none; }
    .left-col > .flex.items-center.justify-between.mt-2 { display: flex !important; }
    #mobileCards { display: block !important; }
    .right-col.open { position: fixed; inset: 0; width: 100% !important; z-index: 900; background: var(--bg); border-radius: 0; overflow-y: auto; max-height: 100vh !important; padding: 12px; }
    .m-detail-back { display: block; }
    .area-view.show { flex-direction: column; }
    .area-left { width: 100% !important; position: static !important; max-height: none !important; }
    .area-checklist { max-height: 200px !important; }
    .cmp-cards-grid { grid-template-columns: 1fr !important; }
    .sim-result-cards { grid-template-columns: 1fr !important; }
    .sim-sliders { grid-template-columns: 1fr !important; }
    .modal-card { width: 100vw !important; max-width: 100vw !important; border-radius: 0 !important; max-height: 100vh !important; }
    .map-modal-card { width: 100vw !important; border-radius: 0 !important; height: 90vh !important; }
    .tx-summary { grid-template-columns: repeat(2, 1fr) !important; }
    .main-layout { flex-direction: column; }
  }
  @media (min-width: 769px) {
    #mobileCards { display: none !important; }
    .filter-toggle-btn { display: none !important; }
    .m-detail-back { display: none !important; }
  }
</style>
</head>
<body>
<div id="loading"><div class="sp"></div><span style="color:#94a3b8;font-size:13px" id="loadMsg">데이터 로딩 중...</span></div>

<div id="app" style="display:none;max-width:1600px" class="mx-auto px-3 py-3">
  <div class="flex items-center justify-between mb-3">
    <div>
      <h1 class="text-lg font-bold text-white">서울·경기 아파트 투자 스크리너</h1>
      <p class="text-xs" style="color:#64748b">국토교통부 실거래가 2015-2026 | <span id="tc">0</span>개 단지</p>
    </div>
    <div class="flex gap-2 items-center">
      <a href="div/" class="pg-btn" style="text-decoration:none;color:#94a3b8;">배당·소각 캘린더</a>
      <span id="fc" class="text-xs" style="color:#64748b">0건</span>
      <button onclick="toggleMerged()" class="pg-btn" id="mgBtn" title="같은 단지의 모든 평형을 하나로 합쳐서 봅니다">평형별</button>
      <button onclick="resetF()" class="pg-btn">초기화</button>
    </div>
  </div>

  <div class="view-tabs">
    <button class="view-tab active" id="vtComplex" onclick="switchView('complex')">단지별</button>
    <button class="view-tab" id="vtArea" onclick="switchView('area')">비교</button>
  </div>

  <div id="complexView">
  <div style="background:rgba(30,41,59,.5);border:1px solid rgba(51,65,85,.5);border-radius:10px;padding:12px;margin-bottom:12px">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">
      <div><label class="text-xs" style="color:#64748b">지역</label><select id="fR" class="fi" onchange="onR()"><option value="">전체</option><option value="1">서울</option><option value="0">경기</option></select></div>
      <div><label class="text-xs" style="color:#64748b">시/구</label><select id="fG" class="fi" onchange="onG()"><option value="">전체</option></select></div>
      <div><label class="text-xs" style="color:#64748b">동</label><select id="fD" class="fi" onchange="af()"><option value="">전체</option></select></div>
      <div><label class="text-xs" style="color:#64748b">단지 검색</label><input id="fS" type="text" class="fi" placeholder="단지명..." oninput="af()"></div>
      <div><label class="text-xs" style="color:#64748b">CAGR(%)</label><div class="rg"><input id="cL" type="number" class="fi" placeholder="min" onchange="af()"><span style="color:#475569">~</span><input id="cH" type="number" class="fi" placeholder="max" onchange="af()"></div></div>
      <div><label class="text-xs" style="color:#64748b">MDD(%)</label><div class="rg"><input id="mL" type="number" class="fi" placeholder="min" onchange="af()"><span style="color:#475569">~</span><input id="mH" type="number" class="fi" placeholder="max" onchange="af()"></div></div>
      <div><label class="text-xs" style="color:#64748b">25년가(억)</label><div class="rg"><input id="pL" type="number" class="fi" placeholder="min" onchange="af()"><span style="color:#475569">~</span><input id="pH" type="number" class="fi" placeholder="max" onchange="af()"></div></div>
      <div><label class="text-xs" style="color:#64748b">샤프비율</label><div class="rg"><input id="sL" type="number" class="fi" placeholder="min" step="0.1" onchange="af()"><span style="color:#475569">~</span><input id="sH" type="number" class="fi" placeholder="max" step="0.1" onchange="af()"></div></div>
    </div>
    <button class="filter-toggle-btn" onclick="toggleFilters()" id="filterToggle">필터 더보기 ▼</button>
  </div>

  <div class="main-layout">
    <div class="left-col">
      <div class="tc" id="tableWrap">
        <table>
          <thead><tr>

async function loadMonthly(gu){
  if(MONTHLY_CACHE[gu]) return MONTHLY_CACHE[gu];
  try{
    const r=await fetch('data/monthly/'+encodeURIComponent(gu)+'.json');
    const j=await r.json();

    return j;
  }catch(e){ console.warn('Monthly load failed for',gu,e); return {}; }
}

function forwardFill(prices){
  // 0인 월을 직전 유효값으로 채움. filled[i]=true면 forward-fill된 값
  const result=new Array(prices.length);
  const filled=new Array(prices.length);
  let last=0;
  for(let i=0;i<prices.length;i++){
    if(prices[i]>0){ last=prices[i]; result[i]=prices[i]; filled[i]=false; }
    else if(last>0){ result[i]=last; filled[i]=true; }
    else { result[i]=0; filled[i]=true; }
  }
  return {values:result, filled};
}

function buildAreaGuFilter(){
  const rv=document.getElementById('aR').value;
  const sel=document.getElementById('aGu');
  sel.innerHTML='<option value="">전체 시/구</option>';
  const gs=new Set();
  Object.entries(LT).forEach(([rk,ro])=>{
    if(rv!==''&&parseInt(rv)!==parseInt(rk)) return;
    Object.keys(ro).forEach(g=>gs.add(g));
  });
  [...gs].sort().forEach(g=>{sel.innerHTML+=`<option value="${g}">${g}</option>`});
}

function getAreaNames(){
  const rv=document.getElementById('aR').value;
  const sq=document.getElementById('aSearch').value.toLowerCase();
  const names=[];

  if(areaLevel==='complex'){
    // 단지 목록: 통합 모드 반영
    const guF=document.getElementById('aGu').value;
    const seen=new Set();
    let count=0;
    const src=merged?DM:D;
    for(const x of src){
      if(rv!==''&&x.r!==parseInt(rv)) continue;
      if(guF&&x.g!==guF) continue;
      const label=x.n+' '+x.a+'㎡ ('+x.g+')';
      if(sq&&!label.toLowerCase().includes(sq)) continue;
      const key='idx:'+x.i;
      if(!seen.has(key)){ seen.add(key); names.push({label, key}); count++; }
      if(count>=200) break;
    }
    return names;
  } else if(areaLevel==='gu'){
    const nameSet=new Set();
    Object.entries(LT).forEach(([rk,ro])=>{
      if(rv!==''&&parseInt(rv)!==parseInt(rk)) return;
      Object.keys(ro).forEach(g=>{ if(!sq||g.toLowerCase().includes(sq)) nameSet.add(g); });
    });
    return [...nameSet].sort().map(n=>({label:n,key:n}));
  } else {
    const guF=document.getElementById('aGu').value;
    const nameSet=new Set();
    Object.entries(LT).forEach(([rk,ro])=>{
      if(rv!==''&&parseInt(rv)!==parseInt(rk)) return;
      Object.entries(ro).forEach(([g,dset])=>{
        if(guF&&g!==guF) return;
        dset.forEach(d=>{
          const label=g+' '+d;
          if(!sq||label.toLowerCase().includes(sq)) nameSet.add(label);
        });
      });
    });
    return [...nameSet].sort().map(n=>({label:n,key:n}));
  }
}

  }).join('');

function getComplexLabel(key){
  if(key.startsWith('idx:')){
    const idx=parseInt(key.slice(4));
    const x=DI[idx];
    return x?(x.n+' '+x.a+'㎡'):key;
  }
  return key;
}

function aggregateArea(key){
  if(areaCache[key]) return areaCache[key];

  if(areaLevel==='complex'){
    // 단지 비교: 통합 모드면 DM에서 찾기
    const dataIdx=parseInt(key.slice(4));
    let x=DI[dataIdx];
    if(merged){
      const mx=DM.find(e=>e.i===dataIdx);
      if(mx) x=mx;
    }
    if(!x) return null;

    const yearAvg=new Array(12).fill(null);
    if(PRICES){
      if(x._merged&&x.si){
        // 통합: 모든 평형 평균
        for(let j=0;j<12;j++){
          const vals=[];
          x.si.forEach(sibIdx=>{
            const pr=PRICES[String(sibIdx)];
            if(pr&&pr[j]>0) vals.push(pr[j]);
          });
          yearAvg[j]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
        }
      } else {
        const pr=PRICES[String(x.i)];
        if(pr) pr.forEach((p,j)=>{ yearAvg[j]=p>0?p:null; });
      }
    }

    let y25=null;
    if(yearAvg[9]&&yearAvg[10]) y25=((yearAvg[10]-yearAvg[9])/yearAvg[9]*100);

    const cntLabel=x._merged?x.si.length:1;
    const result={
      name: x.n+' '+x.a+'㎡',
      key, _merged:x._merged,
      cnt:cntLabel, totalTx:x.t||0,
      avgP25:x.p25, avgCagr:x.c, avgMdd:x.m,
      avgSharpe:x.s, avgQ:x.q, avgK:x.k, y25,
      yearAvg, items:x._merged?x.si.map(i=>DI[i]).filter(Boolean):[x], gu:x.g,
      si:x.si
    };
    areaCache[key]=result;
    return result;
  }

  const src=merged?DM:D;
  let items;
  if(areaLevel==='gu'){
    items=src.filter(x=>x.g===key);
  } else {
    const parts=key.split(' ');
    const dong=parts.pop();
    const gu=parts.join(' ');
    items=src.filter(x=>x.g===gu&&x.d===dong);
  }
  if(items.length===0) return null;

  const avg=(arr)=>{const v=arr.filter(x=>x!==null&&x!==undefined);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};
  const cnt=items.length;
  const totalTx=items.reduce((s,x)=>s+(x.t||0),0);
  const avgP25=avg(items.filter(x=>x.p25&&x.p25>0).map(x=>x.p25));
  const avgCagr=avg(items.filter(x=>x.c!==null).map(x=>x.c));
  const avgMdd=avg(items.map(x=>x.m));
  const avgSharpe=avg(items.filter(x=>x.s!==null).map(x=>x.s));
  const avgQ=avg(items.filter(x=>x.q!==null).map(x=>x.q));
  const avgK=avg(items.filter(x=>x.k!==null).map(x=>x.k));

  const yearAvg=new Array(12).fill(null);
  if(PRICES){
    for(let yi=0;yi<12;yi++){
      const vals=[];
      items.forEach(x=>{
        const pr=PRICES[String(x.i)];
        if(pr&&pr[yi]>0) vals.push(pr[yi]);
      });
      yearAvg[yi]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    }
  }

  let y25=null;
  if(yearAvg[9]&&yearAvg[10]) y25=((yearAvg[10]-yearAvg[9])/yearAvg[9]*100);

  // 구 이름 추출 (동 레벨일 때)
  let gu=key;
  if(areaLevel==='dong'){
    const parts=key.split(' ');
    parts.pop();
    gu=parts.join(' ');
  }

  const result={name:key,key,cnt,totalTx,avgP25,avgCagr,avgMdd,avgSharpe,avgQ,avgK,y25,yearAvg,items,gu};
  areaCache[key]=result;
  return result;
}

async function renderComparison(){
  const el=document.getElementById('cmpResult');
  if(selectedAreas.length===0){
    el.innerHTML='<div class="cmp-empty"><div class="icon">&#x1F4CA;</div><div class="msg">좌측에서 비교할 항목을 선택하세요 (최대 10개)</div></div>';
    return;
  }
  const data=selectedAreas.map(n=>aggregateArea(n)).filter(Boolean);

        <span class="stat-label">MDD</span><span class="stat-value">${fm(d.avgMdd)}</span>
      </div>
    </div>`;
  });
  html+='</div>';

  // 차트
  html+='<div class="cmp-card"><h3 style="font-size:12px;color:#94a3b8;margin-bottom:10px;font-weight:600">평균 가격 추이 (억원, 월별)</h3><div style="height:280px"><canvas id="cmpChart"></canvas></div></div>';

  // 상세 비교 테이블
  html+='<div class="cmp-card"><h3 style="font-size:12px;color:#94a3b8;margin-bottom:10px;font-weight:600">지표 비교</h3>';
  html+='<table class="cmp-table"><thead><tr><th>지표</th>';
  data.forEach((d,i)=>{ html+=`<th style="color:${CMP_COLORS[i]}">${d.name}</th>`; });
  html+='</tr></thead><tbody>';

  const metrics=[
    ['단지수',d=>d.cnt,v=>''+v,'max'],
    ['총 거래건수',d=>d.totalTx,v=>v.toLocaleString(),'max'],
    ['25년 평균가(억)',d=>d.avgP25,v=>v?v.toFixed(2):'-','max'],
    ['CAGR(%)',d=>d.avgCagr,v=>v!==null?v.toFixed(1):'-','max'],
    ['MDD(%)',d=>d.avgMdd,v=>v!==null?v.toFixed(1):'-','max'],
    ['샤프비율',d=>d.avgSharpe,v=>v!==null?v.toFixed(2):'-','max'],
    ['24→25 수익(%)',d=>d.y25,v=>v!==null?v.toFixed(1):'-','max'],
    ['21→25 수익(%)',d=>d.avgQ,v=>v!==null?v.toFixed(1):'-','max'],
    ['26 모멘텀(%)',d=>d.avgK,v=>v!==null?v.toFixed(1):'-','max']
  ];

  metrics.forEach(([label,getter,fmt,bestDir])=>{
    const vals=data.map(d=>getter(d));
    const validVals=vals.filter(v=>v!==null&&v!==undefined);
    const bestVal=validVals.length>0?(bestDir==='max'?Math.max(...validVals):Math.min(...validVals)):null;
    html+='<tr><td>'+label+'</td>';
    vals.forEach((v,i)=>{
      const isBest=v!==null&&v===bestVal&&validVals.length>1;

  // 구/동 비교 시 단지 목록

}

function goToComplex(dataIdx){

  switchView('complex');

  showDetail(x);

async function renderComparisonChartMonthly(data){
  const ctx=document.getElementById('cmpChart');
  if(!ctx) return;
  if(cmpChart) cmpChart.destroy();

  // 각 데이터의 구 이름들 수집 → monthly 데이터 로드
  const gusToLoad=new Set();
  data.forEach(d=>{
    if(d.items) d.items.forEach(x=>gusToLoad.add(x.g));
    if(d.gu) gusToLoad.add(d.gu);
  });
  await Promise.all([...gusToLoad].map(g=>loadMonthly(g)));

  const datasets=data.map((d,i)=>{
    let monthlyPrices=new Array(132).fill(0);
    let monthlyCounts=new Array(132).fill(0);

    if(areaLevel==='complex'){
      if(d._merged&&d.si&&d.si.length>1){
        // 통합 단지: 각 평형 개별 forward-fill 후 평균
        const filledSeries=[];
        d.si.forEach(sibIdx=>{
          const sib=DI[sibIdx];
          if(!sib) return;
          const md=MONTHLY_CACHE[sib.g];
          if(md&&md[String(sibIdx)]){
            const ff=forwardFill(md[String(sibIdx)].p);
            filledSeries.push({values:ff.values, raw:md[String(sibIdx)]});
          }
        });
        for(let slot=0;slot<132;slot++){
          const vals=[];
          filledSeries.forEach(s=>{ if(s.values[slot]>0) vals.push(s.values[slot]); });
          if(vals.length) monthlyPrices[slot]=vals.reduce((a,b)=>a+b,0)/vals.length;
          filledSeries.forEach(s=>{ monthlyCounts[slot]+=s.raw.c[slot]; });
        }
      } else {
        const dataIdx=parseInt(d.key.slice(4));
        const x=DI[dataIdx];
        if(x){
          const md=MONTHLY_CACHE[x.g];
          if(md&&md[String(x.i)]){
            monthlyPrices=md[String(x.i)].p.slice();
            monthlyCounts=md[String(x.i)].c.slice();
          }
        }
      }
    } else {
      // 구/동: 각 단지를 개별 forward-fill 후 평균 (구성 편향 제거)
      if(d.items){
        // 1. 각 단지의 월별 시리즈를 개별 forward-fill
        const filledSeries=[];
        d.items.forEach(x=>{
          const md=MONTHLY_CACHE[x.g];
          if(md&&md[String(x.i)]){
            const ff=forwardFill(md[String(x.i)].p);
            filledSeries.push(ff.values);
          }
        });
        // 2. forward-fill된 값들의 평균
        for(let slot=0;slot<132;slot++){
          const vals=[];
          filledSeries.forEach(s=>{
            if(s[slot]>0) vals.push(s[slot]);
          });
          if(vals.length) monthlyPrices[slot]=vals.reduce((a,b)=>a+b,0)/vals.length;
        }
      }
    }

    const ff=forwardFill(monthlyPrices);
    const pointRadii=ff.values.map((v,j)=>v>0&&!ff.filled[j]?2:0);

    return {
      label:d.name,
      data:ff.values.map(v=>v>0?parseFloat(v.toFixed(2)):null),
      borderColor:CMP_COLORS[i],
      backgroundColor:CMP_COLORS[i]+'18',
      fill:false,tension:.3,
      pointRadius:pointRadii,
      pointBackgroundColor:CMP_COLORS[i],
      pointBorderColor:'#1e293b',
      pointBorderWidth:1,
      borderWidth:2,
      spanGaps:true
    };
  });

  cmpChart=new Chart(ctx,{
    type:'line',
    data:{ labels:MONTH_LABELS, datasets },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{color:'#94a3b8',font:{size:11},usePointStyle:true,pointStyle:'circle',boxWidth:8}},
        tooltip:{
          backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#334155',borderWidth:1,
          callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'억'}
        }
      },
      scales:{
        x:{
          grid:{color:'#1e293b'},
          ticks:{
            color:'#64748b',font:{size:10},maxRotation:0,
            callback:function(val,idx){ return idx%12===0?MONTH_LABELS[idx].slice(0,4):''; }
          }
        },
        y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10},callback:v=>v+'억'}}
      }
    }
  });
}

// === 투자 시뮬레이터 ===
function getAcqTaxRate(price, cnt){
  if(cnt===1){ return price<=6?.01:price<=9?.02:.03; }
  if(cnt===2) return .08;
  return .12;
}
function getBrokerFee(price){
  const p=price*10000;
  if(p<50000) return price*.004;
  if(p<90000) return price*.005;
  return price*.009;
}
function applyProgressiveTax(amtOk){
  const w=amtOk*10000;
  let tax=0;
  const brackets=[[1400,.06,0],[5000,.15,126],[8800,.24,576],[15000,.35,1544],[30000,.38,1994],[50000,.40,2594],[100000,.42,3594],[Infinity,.45,6594]];
  for(const[limit,rate,deduct] of brackets){
    if(w<=limit){ tax=w*rate-deduct; break; }
  }
  return Math.max(0,tax/10000);
}
function calcCapGainTax(gain, years, cnt, exempt){
  if(gain<=0) return 0;
  let taxableGain=gain;
  if(exempt&&cnt===1&&years>=2){
    taxableGain=Math.max(0, gain-12);
    if(taxableGain===0) return 0;
  }
  let deductRate=0;
  if(years>=3) deductRate=Math.min(years*(exempt&&cnt===1?.04:.02), exempt&&cnt===1?.8:.3);
  const taxable=taxableGain*(1-deductRate);
  return applyProgressiveTax(taxable);
}

function calcInvestReturn(areaData, params){
  const price=areaData.avgP25;
  const cagr=areaData.avgCagr;
  if(!price||price<=0||cagr===null) return null;

  const {jeonseRate, years, holdTaxRate, houseCnt, exempt1house, depositRate}=params;
  const jeonse=price*jeonseRate/100;
  const gap=price-jeonse;
  const acqTaxRate=getAcqTaxRate(price, houseCnt);
  const acqTax=price*acqTaxRate;
  const brokerBuy=getBrokerFee(price);
  const initInvest=gap+acqTax+brokerBuy;

  const futurePrice=price*Math.pow(1+cagr/100, years);
  const capitalGain=futurePrice-price;
  const capGainTax=calcCapGainTax(capitalGain, years, houseCnt, exempt1house);
  const brokerSell=getBrokerFee(futurePrice);
  const holdingTax=price*holdTaxRate/100*years;

  const totalProfit=capitalGain-capGainTax-acqTax-holdingTax-brokerBuy-brokerSell;
  const roi=totalProfit/initInvest*100;
  const annualReturn=(Math.pow(1+roi/100, 1/years)-1)*100;
  const leverage=price/gap;

  // 연도별 자산/예금
  const yearlyAsset=[];
  const yearlyDeposit=[];
  for(let t=0;t<=years;t++){
    const curPrice=price*Math.pow(1+cagr/100,t);
    const cumHoldTax=price*holdTaxRate/100*t;
    yearlyAsset.push(curPrice-price-cumHoldTax-acqTax-brokerBuy);
    yearlyDeposit.push(initInvest*(Math.pow(1+depositRate/100,t)-1));
  }

  // 손익분기 CAGR (이진탐색)
  let beLow=0, beHigh=20, beCagr=null;
  for(let iter=0;iter<50;iter++){
    const mid=(beLow+beHigh)/2;
    const fp=price*Math.pow(1+mid/100, years);
    const cg=fp-price;
    const cgt=calcCapGainTax(cg, years, houseCnt, exempt1house);
    const bs=getBrokerFee(fp);
    const tp=cg-cgt-acqTax-holdingTax-brokerBuy-bs;
    if(tp<0) beLow=mid; else beHigh=mid;
    if(Math.abs(tp)<0.001){beCagr=mid;break;}
  }
  beCagr=(beLow+beHigh)/2;

  return {
    roi, annualReturn, leverage, breakeven:beCagr,
    costs:{acquisition:acqTax, holding:holdingTax, capitalGains:capGainTax, brokerBuy, brokerSell},
    initInvest, totalProfit, price, futurePrice, jeonse, jeonseRate, gap,
    yearlyAsset, yearlyDeposit
  };
}

  simData.forEach((d,i)=>{
    const color=CMP_COLORS[i];

function setSimHouseCnt(n){
  document.querySelectorAll('.sim-house-btn').forEach(b=>{
    const isActive=parseInt(b.dataset.cnt)===n;
    b.style.background=isActive?'var(--accent)':'';
    b.style.color=isActive?'#fff':'';
    b.style.borderColor=isActive?'var(--accent)':'';
    b.classList.toggle('active',isActive);
  });
  updateSim();
}

function getSimParams(){
  const years=parseInt(document.getElementById('simYears')?.value||5);
  const holdTaxRate=parseFloat(document.getElementById('simHoldTax')?.value||0.3);
  const activeBtn=document.querySelector('.sim-house-btn.active');
  const houseCnt=activeBtn?parseInt(activeBtn.dataset.cnt):1;
  const exempt1house=document.getElementById('simExempt')?.checked??true;
  const depositRate=parseFloat(document.getElementById('simDeposit')?.value||3.5);

  // 항목별 전세가율
  const jeonseRates=[];
  document.querySelectorAll('.simJeonseEach').forEach(el=>{
    const val=parseFloat(el.value);
    jeonseRates.push(val);
    const valEl=document.querySelector(`.simJeonseEachVal[data-idx="${el.dataset.idx}"]`);
    if(valEl) valEl.textContent=val+'%';
  });

  // 공통 슬라이더 값 표시 갱신
  const yv=document.getElementById('simYearsVal'); if(yv) yv.textContent=years+'년';
  const hv=document.getElementById('simHoldTaxVal'); if(hv) hv.textContent=holdTaxRate+'%';
  const dv=document.getElementById('simDepositVal'); if(dv) dv.textContent=depositRate+'%';

  return {jeonseRates, years, holdTaxRate, houseCnt, exempt1house, depositRate};
}

function updateSim(){
  const params=getSimParams();
  const data=selectedAreas.map(n=>aggregateArea(n)).filter(Boolean);
  const results=data.map((d,i)=>{
    const jeonseRate=params.jeonseRates[i]!==undefined?params.jeonseRates[i]:65;
    return {area:d, result:calcInvestReturn(d, {...params, jeonseRate})};
  });

  const el=document.getElementById('simResults');
  if(!el) return;

  const validResults=results.filter(r=>r.result);
  if(validResults.length===0){
    el.innerHTML='<div class="cmp-empty"><div class="msg">시뮬레이션 가능한 데이터가 없습니다 (25년 평균가와 CAGR 필요)</div></div>';
    return;
  }

  let html='';
  const fmtOk=v=>v.toFixed(2)+'억';

  // 결과 카드

        <span class="sim-stat-label">연환산</span><span class="sim-stat-value ${res.annualReturn>0?'up':'dn'}">${fmtPct(res.annualReturn)}</span>
        <span class="sim-stat-label">레버리지</span><span class="sim-stat-value">${res.leverage.toFixed(1)}x</span>
        <span class="sim-stat-label">순수익</span><span class="sim-stat-value ${res.totalProfit>0?'up':'dn'}">${fmtOk(res.totalProfit)}</span>
        <span class="sim-stat-label">손익분기</span><span class="sim-stat-value">연${res.breakeven.toFixed(1)}%</span>
        <span class="sim-stat-label">초기투자</span><span class="sim-stat-value">${fmtOk(res.initInvest)}</span>
      </div>
    </div>`;
  });
  html+='</div>';

  // 차트
  html+='<div class="cmp-card"><h3 style="font-size:12px;color:#94a3b8;margin-bottom:10px;font-weight:600">순수익 vs 기회비용 (연도별)</h3><div style="height:280px"><canvas id="cmpSimChartCanvas"></canvas></div></div>';

  // 비용 비교 테이블
  html+='<div class="cmp-card"><h3 style="font-size:12px;color:#94a3b8;margin-bottom:10px;font-weight:600">비용 비교</h3>';
  html+='<div style="overflow-x:auto"><table class="cmp-table"><thead><tr><th>항목</th>';
  validResults.forEach((r,i)=>{
    const idx=results.indexOf(r);
    html+=`<th style="color:${CMP_COLORS[idx]}">${r.area.name}</th>`;
  });
  html+='</tr></thead><tbody>';

  const rows=[
    ['매매가(25년)',r=>fmtOk(r.result.price)],

  if(cmpSimChart) cmpSimChart.destroy();

  const labels=[];
  for(let t=0;t<=params.years;t++) labels.push(t+'년차');

  const datasets=[];
  validResults.forEach((r,vi)=>{
    const idx=allResults.indexOf(r);
    datasets.push({
      label:r.area.name+' 순수익',
      data:r.result.yearlyAsset,
      borderColor:CMP_COLORS[idx],
      backgroundColor:CMP_COLORS[idx]+'18',
      fill:false, tension:.3, borderWidth:2,
      pointRadius:3, pointBackgroundColor:CMP_COLORS[idx]

  // 기회비용 (예금) - 첫 번째 유효 결과의 초기투자금 기준
  if(validResults.length>0){

    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{color:'#94a3b8',font:{size:11},usePointStyle:true,pointStyle:'circle',boxWidth:8}},
        tooltip:{
          backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#334155',borderWidth:1,
          callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y>=0?'+':'')+c.parsed.y.toFixed(2)+'억'}
        }

      scales:{

        y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10},callback:v=>v.toFixed(1)+'억'}}

    }
  });
}

let LT={};
function buildLoc(){
  LT={};
  D.forEach(x=>{
    const rk=x.r;
    if(!LT[rk])LT[rk]={};
    if(!LT[rk][x.g])LT[rk][x.g]=new Set();
    if(x.d)LT[rk][x.g].add(x.d);
  });
}

function buildMerged(){
  // si 필드로 같은 단지 그룹핑 → 통합 엔트리 생성
  const grouped=new Map(); // complexKey → [entries]
  const assigned=new Set();
  D.forEach(x=>{
    if(assigned.has(x.i)) return;
    if(x.si && x.si.length>1){
      const key=x.si.slice().sort().join(',');
      if(!grouped.has(key)){
        const siblings=x.si.map(idx=>DI[idx]).filter(Boolean);
        grouped.set(key, siblings);
        siblings.forEach(s=>assigned.add(s.i));
      }
    } else {
      // 단일 평형: 그대로 통과
      grouped.set('solo:'+x.i, [x]);
      assigned.add(x.i);
    }
  });

  DM=[];
  grouped.forEach((siblings, key)=>{
    if(siblings.length===1){
      // 단일 평형: 원본 그대로 사용
      DM.push(siblings[0]);
      return;
    }
    // 다평형 통합: 거래건수(t) 가중평균
    const totalT=siblings.reduce((s,x)=>s+(x.t||1),0);
    const wavg=(field)=>{
      const valid=siblings.filter(x=>x[field]!==null&&x[field]!==undefined);
      if(valid.length===0) return null;
      const wt=valid.reduce((s,x)=>s+(x.t||1),0);
      return valid.reduce((s,x)=>s+x[field]*(x.t||1),0)/wt;
    };
    const areas=siblings.map(x=>x.a).sort((a,b)=>a-b);
    const aMin=areas[0], aMax=areas[areas.length-1];
    const rep=siblings[0]; // 대표 엔트리
    const mc=wavg('c'); const mm=wavg('m'); const ms=wavg('s');
    const mq=wavg('q'); const mk=wavg('k'); const my25=wavg('y25');
    const mp25=wavg('p25');
    DM.push({
      _merged:true,
      i:rep.i, // 대표 인덱스
      n:rep.n, r:rep.r, g:rep.g, d:rep.d, b:rep.b,
      a:aMin===aMax?aMin:(aMin+'~'+aMax),
      _aNum:aMax, // 정렬용
      c:mc!==null?parseFloat(mc.toFixed(1)):null,
      m:mm!==null?parseFloat(mm.toFixed(1)):0,
      s:ms!==null?parseFloat(ms.toFixed(2)):null,
      v:siblings.reduce((s,x)=>s+(x.v||0),0),
      q:mq!==null?parseFloat(mq.toFixed(1)):null,
      k:mk!==null?parseFloat(mk.toFixed(1)):null,
      t:totalT,
      p25:mp25!==null?parseFloat(mp25.toFixed(2)):null,
      y25:my25!==null?parseFloat(my25.toFixed(1)):null,
      si:siblings.map(x=>x.i),
      j:rep.j, rd:rep.rd
    });
  });
  console.log(`Merged: ${D.length} → ${DM.length} entries`);
}

function onR(){

  const gs=new Set();
  if(v!==''){
    const rk=parseInt(v);
    if(LT[rk])Object.keys(LT[rk]).sort().forEach(g=>gs.add(g));
  }else{
    Object.values(LT).forEach(o=>Object.keys(o).forEach(g=>gs.add(g)));
  }
  [...gs].sort().forEach(g=>{s.innerHTML+=`<option value="${g}">${g}</option>`});
  onG();
}

function onG(){
  const rv=gv('fR'), gv2=gv('fG');
  const s=document.getElementById('fD');
  s.innerHTML='<option value="">전체</option>';
  const ds=new Set();
  Object.entries(LT).forEach(([rk,ro])=>{
    if(rv!==''&&parseInt(rv)!==parseInt(rk))return;
    Object.entries(ro).forEach(([g,dset])=>{
      if(gv2&&g!==gv2)return;
      dset.forEach(d=>ds.add(d));
    });
  });
  [...ds].sort().forEach(d=>{s.innerHTML+=`<option value="${d}">${d}</option>`});
  af();
}

function gv(id){return document.getElementById(id).value}
function gn(id){const v=document.getElementById(id).value;return v===''?null:parseFloat(v)}

function af(){
  const fR=gv('fR'),fG=gv('fG'),fD=gv('fD'),fS=gv('fS').toLowerCase();
  const cL=gn('cL'),cH=gn('cH'),mL=gn('mL'),mH=gn('mH'),pL=gn('pL'),pH2=gn('pH'),sL=gn('sL'),sH=gn('sH');

  const src=merged?DM:D;
  F=src.filter(x=>{
    if(fR!==''&&x.r!==parseInt(fR))return false;
    if(fG&&x.g!==fG)return false;
    if(fD&&x.d!==fD)return false;
    if(fS&&!x.n.toLowerCase().includes(fS)&&!x.g.toLowerCase().includes(fS)&&!(x.d||'').toLowerCase().includes(fS))return false;
    if(cL!==null&&(x.c===null||x.c<cL))return false;
    if(cH!==null&&(x.c===null||x.c>cH))return false;
    if(mL!==null&&x.m<mL)return false;
    if(mH!==null&&x.m>mH)return false;
    if(pL!==null&&(x.p25===null||x.p25===0||x.p25<pL))return false;
    if(pH2!==null&&(x.p25===null||x.p25===0||x.p25>pH2))return false;
    if(sL!==null&&(x.s===null||x.s<sL))return false;
    if(sH!==null&&(x.s===null||x.s>sH))return false;
    return true;
  });
  ds();cp=1;rt();
  saveHash();
}

function ds(){
  F.sort((a,b)=>{
    let va=a[sc], vb=b[sc];
    // 통합 모드 면적 정렬: _aNum 사용
    if(sc==='a'&&merged){ va=a._aNum||a.a; vb=b._aNum||b.a; }
    if(va===null||va===undefined)va=sa?Infinity:-Infinity;
    if(vb===null||vb===undefined)vb=sa?Infinity:-Infinity;
    if(typeof va==='string')return sa?va.localeCompare(vb):vb.localeCompare(va);
    return sa?va-vb:vb-va;
  });
}

function sb(col){
  if(sc===col)sa=!sa;else{sc=col;sa=false;}
  document.querySelectorAll('.sa').forEach(e=>{e.classList.remove('on');e.textContent='\u25BC'});
  const a=document.querySelector(`[data-c="${col}"]`);
  if(a){a.classList.add('on');a.textContent=sa?'\u25B2':'\u25BC';}
  ds();rt();saveHash();
}

// --- 상세 패널 ---
function sd(i){
  si=i;
  const x=F[i];
  showDetail(x);
  rt();
  if(isMobile()) document.body.style.overflow='hidden';
  saveHash();
}

function showDetail(x){
  curDetailIdx=x.i;
  const dp=document.getElementById('dp');
  dp.classList.add('open');

  const isMerged=x._merged&&x.si&&x.si.length>1;

  document.getElementById('dn').textContent=x.n;
  document.getElementById('dl').textContent=`${x.r?'\uC11C\uC6B8':'\uACBD\uAE30'} ${x.g} ${x.d||''} | ${x.a}\u33A1 | ${x.b?x.b+'\uB144 \uC900\uACF5':''} | \uCD1D ${x.t.toLocaleString()}\uAC74`;

  // 평형 탭
  const tabsEl=document.getElementById('areaTabs');
  if(x.si && x.si.length>1){
    let tabs='';
    if(isMerged){
      // 통합 모드: "통합" 탭 + 개별 평형 탭
      const isAllActive=curDetailIdx===x.i&&!window._showingSingleArea;
      tabs+=`<button class="area-tab ${isAllActive?'active':''}" onclick="showMergedDetail()">통합</button>`;
      x.si.forEach(sibIdx=>{
        const sib=DI[sibIdx];
        if(!sib)return;
        const isActive=window._showingSingleArea&&curDetailIdx===sibIdx?'active':'';
        tabs+=`<button class="area-tab ${isActive}" onclick="switchAreaFromMerged(${sibIdx})">${sib.a}\u33A1</button>`;
      });
    } else {
      x.si.forEach(sibIdx=>{
        const sib=DI[sibIdx];
        if(!sib)return;
        const isActive=sibIdx===x.i?'active':'';
        tabs+=`<button class="area-tab ${isActive}" onclick="switchArea(${sibIdx})">${sib.a}\u33A1</button>`;
      });
    }
    tabsEl.innerHTML=tabs;
    tabsEl.style.display='flex';
  } else {
    tabsEl.innerHTML='';
    tabsEl.style.display='none';
  }

  // 메트릭 카드
  const fm=(v,s='%')=>v!==null&&v!==undefined?(v>0?'+':'')+v+s:'-';
  document.getElementById('metrics').innerHTML=[
    ['CAGR',fm(x.c),x.c>0?'up':'dn'],
    ['MDD',x.m+'%','dn'],
    ['\uC0E4\uD504\uBE44\uC728',x.s!==null?''+x.s:'-',''],
    ['25\uB144 \uD3C9\uADE0\uAC00',x.p25&&x.p25>0?x.p25+'\uC5B5':'-',''],
    ['21\u219225 \uC218\uC775',fm(x.q),x.q>0?'up':'dn'],
    ['26\uB144 \uBAA8\uBA58\uD140',x.k!==null?fm(x.k):'-',x.k>0?'up':x.k<0?'dn':'']
  ].map(([l,v,c])=>`<div class="mc"><div class="l">${l}</div><div class="v ${c}">${v}</div></div>`).join('');

  let prices=getPrices(x.i);
  if(!prices&&x._merged&&x.si){
    for(const sibIdx of x.si){ prices=getPrices(sibIdx); if(prices) break; }
  }
  if(!prices){
    document.getElementById('yp').innerHTML='<div style="color:#64748b">\uAC00\uACA9 \uB370\uC774\uD130 \uB85C\uB529 \uC911...</div>';
    if(ch)ch.destroy();
    const retry=setInterval(()=>{
      if(PRICES){clearInterval(retry);if(curDetailIdx===x.i)renderDetail(x);}
    },200);
    return;
  }
  window._showingSingleArea=false;
  renderDetail(x);
}

// 통합 모드에서 개별 평형 클릭
function switchAreaFromMerged(dataIdx){
  const x=DI[dataIdx];
  if(!x)return;
  window._showingSingleArea=true;
  curDetailIdx=dataIdx;
  // 탭만 업데이트 (통합 엔트리의 si 사용)
  const mergedEntry=F.find(f=>f._merged&&f.si&&f.si.includes(dataIdx));
  const tabsEl=document.getElementById('areaTabs');
  if(mergedEntry&&mergedEntry.si){
    let tabs=`<button class="area-tab" onclick="showMergedDetail()">통합</button>`;
    mergedEntry.si.forEach(sibIdx=>{
      const sib=DI[sibIdx];
      if(!sib)return;
      tabs+=`<button class="area-tab ${sibIdx===dataIdx?'active':''}" onclick="switchAreaFromMerged(${sibIdx})">${sib.a}\u33A1</button>`;
    });
    tabsEl.innerHTML=tabs;
  }
  // 메트릭/차트는 개별 평형 것으로 표시
  const fm=(v,s='%')=>v!==null&&v!==undefined?(v>0?'+':'')+v+s:'-';
  document.getElementById('dn').textContent=x.n;
  document.getElementById('dl').textContent=`${x.r?'\uC11C\uC6B8':'\uACBD\uAE30'} ${x.g} ${x.d||''} | ${x.a}\u33A1 | ${x.b?x.b+'\uB144 \uC900\uACF5':''} | \uCD1D ${x.t.toLocaleString()}\uAC74`;
  document.getElementById('metrics').innerHTML=[
    ['CAGR',fm(x.c),x.c>0?'up':'dn'],
    ['MDD',x.m+'%','dn'],
    ['\uC0E4\uD504\uBE44\uC728',x.s!==null?''+x.s:'-',''],
    ['25\uB144 \uD3C9\uADE0\uAC00',x.p25&&x.p25>0?x.p25+'\uC5B5':'-',''],
    ['21\u219225 \uC218\uC775',fm(x.q),x.q>0?'up':'dn'],
    ['26\uB144 \uBAA8\uBA58\uD140',x.k!==null?fm(x.k):'-',x.k>0?'up':x.k<0?'dn':'']
  ].map(([l,v,c])=>`<div class="mc"><div class="l">${l}</div><div class="v ${c}">${v}</div></div>`).join('');
  renderDetail(x);
}

async function renderDetail(x){
  let prices=getPrices(x.i);
  // 통합 엔트리면 si 중 아무 가격이라도 있으면 진행
  if(!prices&&x._merged&&x.si){
    for(const sibIdx of x.si){ prices=getPrices(sibIdx); if(prices) break; }
  }
  if(!prices)return;
  const volumes=getVolumes(x.i);
  const details=getDetails(x.i);

  // 연도별 가격 리스트
  let yh='';
  if(x._merged&&x.si&&x.si.length>1){
    // 통합 엔트리: 모든 평형의 연도별 가격을 평균
    const mergedYearPrices=new Array(12).fill(0);
    const mergedYearVols=new Array(12).fill(0);
    const mergedYearCounts=new Array(12).fill(0); // 해당 연도에 가격 있는 평형 수
    x.si.forEach(sibIdx=>{
      const pr=getPrices(sibIdx);
      const vl=getVolumes(sibIdx);
      if(pr) pr.forEach((p,j)=>{
        if(p>0){ mergedYearPrices[j]+=p; mergedYearCounts[j]++; }
      });
      if(vl) vl.forEach((v,j)=>{ mergedYearVols[j]+=v; });
    });
    for(let j=0;j<12;j++){
      if(mergedYearCounts[j]>0){
        const avgP=parseFloat((mergedYearPrices[j]/mergedYearCounts[j]).toFixed(2));
        const y=2015+j;
        let chg='';
        // 이전 연도와 비교
        if(j>0&&mergedYearCounts[j-1]>0){
          const prevAvg=mergedYearPrices[j-1]/mergedYearCounts[j-1];
          const pct=((avgP-prevAvg)/prevAvg*100).toFixed(1);
          chg=`<span class="${pct>0?'up':pct<0?'dn':''}" style="font-size:10px">${pct>0?'+':''}${pct}%</span>`;
        }
        const volStr=mergedYearVols[j]>0?`<span style="color:#64748b;font-size:10px">${mergedYearVols[j]}건</span>`:'';
        yh+=`<div class="yr-row">
          <span style="color:#64748b;min-width:32px">${y}</span>
          <span style="font-weight:600">${avgP}억</span>
          <span style="color:#475569;font-size:10px">(${mergedYearCounts[j]}평형)</span>
          ${volStr}
          ${chg}
        </div>`;
      }
    }
  } else {
    prices.forEach((p,j)=>{
      if(p>0){
        const y=2015+j;
        const vol=volumes?volumes[j]:0;
        let chg='';
        if(j>0&&prices[j-1]>0){
          const pct=((p-prices[j-1])/prices[j-1]*100).toFixed(1);
          chg=`<span class="${pct>0?'up':pct<0?'dn':''}" style="font-size:10px">${pct>0?'+':''}${pct}%</span>`;
        }
        const volStr=vol>0?`<span style="color:#64748b;font-size:10px">${vol}건</span>`:'';

        let rangeStr='';
        if(details && details[j]){
          const d=details[j];
          const mn=d[1], mx=d[2];
          if(mn>0 && mx>0 && mn!==mx){
            rangeStr=`<span style="color:#475569;font-size:10px">(${mn}~${mx})</span>`;
          }
        }

        yh+=`<div class="yr-row" onclick="openTxModal(${x.i},${y})">
          <span style="color:#64748b;min-width:32px">${y}</span>
          <span style="font-weight:600">${p}억</span>
          ${rangeStr}
          ${volStr}
          ${chg}
        </div>`;
      }
    });
  }
  document.getElementById('yp').innerHTML=yh;

  // 월별 차트
  const md=await loadMonthly(x.g);
  let entryMonthly=md[String(x.i)];

  // 통합 엔트리: 각 평형을 개별 forward-fill 후 평균 (구성 편향 제거)
  if(x._merged&&x.si&&x.si.length>1){
    const filledSeries=[];
    for(const sibIdx of x.si){
      const sib=DI[sibIdx];
      if(!sib) continue;
      const sibMd=MONTHLY_CACHE[sib.g]||await loadMonthly(sib.g);
      if(sibMd&&sibMd[String(sibIdx)]){
        const ff=forwardFill(sibMd[String(sibIdx)].p);
        filledSeries.push({values:ff.values, filled:ff.filled, raw:sibMd[String(sibIdx)]});
      }
    }
    if(filledSeries.length>0){
      const mergedP=new Array(132).fill(0);
      const mergedC=new Array(132).fill(0);
      const mergedFilled=new Array(132).fill(true);
      for(let slot=0;slot<132;slot++){
        const vals=[];
        let anyReal=false;
        filledSeries.forEach(s=>{
          if(s.values[slot]>0){ vals.push(s.values[slot]); if(!s.filled[slot]) anyReal=true; }
        });
        if(vals.length){
          mergedP[slot]=vals.reduce((a,b)=>a+b,0)/vals.length;
          mergedFilled[slot]=!anyReal;
        }
        filledSeries.forEach(s=>{ mergedC[slot]+=s.raw.c[slot]; });
      }
      entryMonthly={p:mergedP, c:mergedC, _filled:mergedFilled, _preFilled:true};
    }
  }

  if(ch)ch.destroy();

  if(entryMonthly){
    // 월별 차트
    const rawPrices=entryMonthly.p;
    const rawCounts=entryMonthly.c;
    // _preFilled이면 이미 forward-fill 처리된 상태
    const ff=entryMonthly._preFilled?{values:rawPrices, filled:entryMonthly._filled}:forwardFill(rawPrices);

    // 첫 유효값과 마지막 유효값 사이만 표시
    let firstValid=-1, lastValid=-1;
    for(let i=0;i<ff.values.length;i++){
      if(ff.values[i]>0){
        if(firstValid<0) firstValid=i;
        lastValid=i;
      }
    }
    if(firstValid<0) firstValid=0;
    if(lastValid<0) lastValid=ff.values.length-1;

    const sliceData=ff.values.slice(firstValid,lastValid+1);
    const sliceFilled=ff.filled.slice(firstValid,lastValid+1);
    const sliceCounts=rawCounts.slice(firstValid,lastValid+1);
    const sliceLabels=MONTH_LABELS.slice(firstValid,lastValid+1);

    const pointRadii=sliceData.map((v,i)=>v>0&&!sliceFilled[i]?2:0);

    ch=new Chart(document.getElementById('chart'),{
      type:'line',
      data:{
        labels:sliceLabels,
        datasets:[{
          data:sliceData.map(v=>v>0?parseFloat(v.toFixed(2)):null),
          borderColor:'#3b82f6',
          backgroundColor:'rgba(59,130,246,.08)',
          fill:true,tension:.3,
          pointRadius:pointRadii,
          pointBackgroundColor:sliceData.map((v,i)=>!sliceFilled[i]?'#3b82f6':'transparent'),
          pointBorderColor:'#1e293b',
          pointBorderWidth:1,
          borderWidth:2,
          spanGaps:true
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#334155',borderWidth:1,
            callbacks:{
              title:items=>{
                const idx=items[0].dataIndex;
                return sliceLabels[idx];
              },
              label:c=>{
                const idx=c.dataIndex;
                const cnt=sliceCounts[idx];
                const isFilled=sliceFilled[idx];
                let label=c.parsed.y+'\uC5B5\uC6D0';
                if(cnt>0) label+=' ('+cnt+'\uAC74)';
                if(isFilled) label+=' (직전가 유지)';
                return label;
              }
            }
          }
        },
        scales:{
          x:{
            grid:{color:'#1e293b'},
            ticks:{
              color:'#64748b',font:{size:9},maxRotation:0,
              callback:function(val,idx){ return idx%12===0?sliceLabels[idx].slice(0,4):''; }
            }
          },
          y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10},callback:v=>v+'\uC5B5'}}
        }
      }
    });
  } else {
    // 월별 데이터 없으면 기존 연도별 차트 폴백
    const vp=[],vy=[];
    prices.forEach((p,j)=>{if(p>0){vp.push(p);vy.push(2015+j);}});

    ch=new Chart(document.getElementById('chart'),{
      type:'line',
      data:{
        labels:vy.map(y=>y+'\uB144'),
        datasets:[{
          data:vp,
          borderColor:'#3b82f6',
          backgroundColor:'rgba(59,130,246,.08)',
          fill:true,tension:.3,
          pointRadius:3,pointBackgroundColor:'#3b82f6',pointBorderColor:'#1e293b',pointBorderWidth:2,borderWidth:2
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#334155',borderWidth:1,callbacks:{label:c=>c.parsed.y+'\uC5B5\uC6D0'}}},
        scales:{
          x:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10}}},
          y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10},callback:v=>v+'\uC5B5'}}
        }
      }
    });
  }

  document.getElementById('dp').scrollTop=0;
  showOnMap(x);
}

function renderTxModal(x){
  if(!x) x=DI[curDetailIdx];
  const txs=txModalData;

  const months=new Set(txs.map(t=>t[0]));
  let mtabs=`<button class="month-tab ${txModalMonth===0?'active':''}" onclick="txModalMonth=0;renderTxModal()">\uC804\uCCB4</button>`;
  for(let m=1;m<=12;m++){
    if(months.has(m)){
      mtabs+=`<button class="month-tab ${txModalMonth===m?'active':''}" onclick="txModalMonth=${m};renderTxModal()">${m}\uC6D4</button>`;
    }
  }
  document.getElementById('txMonthTabs').innerHTML=mtabs;

  const filtered=txModalMonth===0?txs:txs.filter(t=>t[0]===txModalMonth);

  if(filtered.length>0){
    const prices=filtered.map(t=>t[2]);
    const avg=Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
    const mn=Math.min(...prices);
    const mx=Math.max(...prices);
    document.getElementById('txSummary').innerHTML=[
      ['\uCD1D \uAC70\uB798',filtered.length+'\uAC74',''],
      ['\uD3C9\uADE0',(avg/10000).toFixed(2)+'\uC5B5',''],
      ['\uCD5C\uC800',(mn/10000).toFixed(2)+'\uC5B5','dn'],
      ['\uCD5C\uACE0',(mx/10000).toFixed(2)+'\uC5B5','up']
    ].map(([l,v,c])=>`<div class="tx-stat"><div class="label">${l}</div><div class="value ${c}">${v}</div></div>`).join('');
  } else {
    document.getElementById('txSummary').innerHTML='<div style="color:#64748b;text-align:center;grid-column:1/-1">\uAC70\uB798 \uB0B4\uC5ED\uC774 \uC5C6\uC2B5\uB2C8\uB2E4</div>';
  }

  if(filtered.length>0){
    let rows='';
    filtered.forEach((t,i)=>{
      const price=(t[2]/10000).toFixed(2);
      let diff='';
      if(i>0){
        const prev=filtered[i-1][2];
        const d=t[2]-prev;
        if(d!==0){
          const pct=(d/prev*100).toFixed(1);
          const cls=d>0?'up':'dn';
          diff=`<span class="${cls}">${d>0?'+':''}${pct}%</span>`;
        }
      }
      rows+=`<tr>
        <td>${t[0]}\uC6D4 ${t[1]}\uC77C</td>
        <td style="font-weight:600">${price}\uC5B5</td>
        <td>${t[3]?t[3]+'\uCE35':'-'}</td>
        <td>${diff}</td>
      </tr>`;
    });
    document.getElementById('txTableWrap').innerHTML=`<table class="tx-table">
      <thead><tr><th>\uACC4\uC57D\uC77C</th><th>\uAC70\uB798\uAE08\uC561</th><th>\uCE35</th><th>\uC804\uAC74\uB300\uBE44</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } else {
    document.getElementById('txTableWrap').innerHTML='';
  }
}

let LMAP_BIG=null, LMARKER_BIG=null, curMapCoord=null, curMapEntry=null;
const VWTILE='https://api.vworld.kr/req/wmts/1.0.0/'+VWORLD_KEY+'/Base/{z}/{y}/{x}.png';

function initMap(){
  if(LMAP) return;
  LMAP=L.map('vmap',{center:[37.5665,126.978],zoom:12,zoomControl:false,attributionControl:false});
  L.tileLayer(VWTILE,{maxZoom:19,attribution:'V-World'}).addTo(LMAP);
  L.control.attribution({position:'bottomright',prefix:false}).addTo(LMAP);

const GEO_CACHE={};
let _jsonpId=0;

function getCoordSync(x){
  const aptKey=x.g+'|'+(x.d||'')+'|'+x.n;
  const dongKey=x.g+'|'+(x.d||'');
  return GEO_CACHE[aptKey]||(GEO_DATA&&GEO_DATA[aptKey])||(GEO_DATA&&GEO_DATA[dongKey])||GEO_GU[x.g]||null;
}

function vworldJsonp(url){
  return new Promise((resolve)=>{
    const cbName='_vwCb'+(++_jsonpId);
    const script=document.createElement('script');
    const timeout=setTimeout(()=>{cleanup();resolve(null)},5000);
    function cleanup(){clearTimeout(timeout);delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script)}
    window[cbName]=function(data){cleanup();resolve(data)};
    script.src=url+'&callback='+cbName;
    script.onerror=function(){cleanup();resolve(null)};
    document.head.appendChild(script);
  });
}

async function getCoordAsync(x){
  const aptKey=x.g+'|'+(x.d||'')+'|'+x.n;
  if(GEO_CACHE[aptKey]) return GEO_CACHE[aptKey];
  if(x.j && x.d){
    const jibunQ=(x.d||'')+' '+x.j;
    const jUrl='https://apis.vworld.kr/jibun2coord.do?q='+encodeURIComponent(jibunQ)+'&output=json&epsg=epsg:4326&apiKey='+VWORLD_KEY;
    const jData=await vworldJsonp(jUrl);
    if(jData&&jData.EPSG_4326_Y&&jData.EPSG_4326_X){
      const coord=[parseFloat(jData.EPSG_4326_Y),parseFloat(jData.EPSG_4326_X)];
      GEO_CACHE[aptKey]=coord;
      return coord;
    }
  }
  if(x.rd){
    const rUrl='https://apis.vworld.kr/new2coord.do?q='+encodeURIComponent(x.rd)+'&output=json&epsg=epsg:4326&apiKey='+VWORLD_KEY;
    const rData=await vworldJsonp(rUrl);
    if(rData&&rData.EPSG_4326_Y&&rData.EPSG_4326_X){
      const coord=[parseFloat(rData.EPSG_4326_Y),parseFloat(rData.EPSG_4326_X)];
      GEO_CACHE[aptKey]=coord;
      return coord;
    }
  }
  const region=x.r?'서울':'경기';
  const queries=[
    `${region} ${x.g} ${x.d||''} ${x.n}`,
    `${region} ${x.g} ${x.n}`
  ];
  for(const q of queries){
    const url='https://api.vworld.kr/req/search?service=search&request=search&version=2.0&crs=EPSG:4326&size=1&page=1&type=place&format=json&key='+VWORLD_KEY+'&query='+encodeURIComponent(q);
    const data=await vworldJsonp(url);
    if(data&&data.response&&data.response.status==='OK'&&data.response.result&&data.response.result.items&&data.response.result.items.length>0){
      const pt=data.response.result.items[0].point;
      const coord=[parseFloat(pt.y),parseFloat(pt.x)];
      GEO_CACHE[aptKey]=coord;
      return coord;
    }
  }
  const dongKey=x.g+'|'+(x.d||'');
  return (GEO_DATA&&GEO_DATA[aptKey])||(GEO_DATA&&GEO_DATA[dongKey])||GEO_GU[x.g]||null;
}

function showOnMap(x){
  document.getElementById('mapWrap').style.display='block';
  initMap();
  const syncCoord=getCoordSync(x);
  if(syncCoord){
    curMapCoord=syncCoord; curMapEntry=x;
    setTimeout(()=>{
      LMAP.invalidateSize();
      LMAP.setView(syncCoord,15,{animate:true});
      if(LMARKER) LMAP.removeLayer(LMARKER);
      LMARKER=L.circleMarker(syncCoord,{radius:8,fillColor:'#ef4444',color:'#fff',weight:2,fillOpacity:1})
        .bindPopup(`<b>${x.n}</b><br>${x.g} ${x.d||''}<br>${x.a}\u33A1`,{className:''})
        .addTo(LMAP).openPopup();
    },150);
  }
  getCoordAsync(x).then(coord=>{
    if(!coord) return;
    curMapCoord=coord; curMapEntry=x;
    if(!syncCoord){
      setTimeout(()=>{ LMAP.invalidateSize(); },50);
    }
    LMAP.setView(coord,15,{animate:true});
    if(LMARKER) LMAP.removeLayer(LMARKER);
    LMARKER=L.circleMarker(coord,{radius:8,fillColor:'#ef4444',color:'#fff',weight:2,fillOpacity:1})
      .bindPopup(`<b>${x.n}</b><br>${x.g} ${x.d||''}<br>${x.a}\u33A1`,{className:''})
      .addTo(LMAP).openPopup();
  });
}

function openMapModal(){

  document.getElementById('fG').innerHTML='<option value="">\uC804\uCCB4</option>';
  document.getElementById('fD').innerHTML='<option value="">\uC804\uCCB4</option>';
  af();
}

// --- URL 해시 ---
let hashLock=false;
function saveHash(){
  if(hashLock) return;
  const p={};
  const fR=gv('fR');if(fR)p.r=fR;
  const fG=gv('fG');if(fG)p.g=fG;
  const fD=gv('fD');if(fD)p.d=fD;
  const fS=gv('fS');if(fS)p.s=fS;
  const cLv=gv('cL');if(cLv)p.cL=cLv;
  const cHv=gv('cH');if(cHv)p.cH=cHv;
  const mLv=gv('mL');if(mLv)p.mL=mLv;
  const mHv=gv('mH');if(mHv)p.mH=mHv;
  const pLv=gv('pL');if(pLv)p.pL=pLv;
  const pHv=gv('pH');if(pHv)p.pH=pHv;
  const sLv=gv('sL');if(sLv)p.sL=sLv;
  const sHv=gv('sH');if(sHv)p.sH=sHv;
  if(sc!=='c')p.sc=sc;
  if(sa)p.sa=1;
  if(cp>1)p.p=cp;
  if(ps!==100)p.ps=ps;
  if(curDetailIdx!==null)p.i=curDetailIdx;
  if(merged)p.mg=1;
  if(viewMode==='area')p.vm='area';
  if(areaLevel!=='gu')p.al=areaLevel;
  if(selectedAreas.length)p.aa=selectedAreas.join('|');
  if(cmpSubTab==='sim')p.st='sim';
  const h=Object.entries(p).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  history.replaceState(null,null,h?'#'+h:'#');
}

function loadHash(){
  const h=location.hash.slice(1);
  if(!h) return false;
  const p={};
  h.split('&').forEach(s=>{const [k,v]=s.split('=');if(k)p[k]=decodeURIComponent(v||'');});
  hashLock=true;
  if(p.r){document.getElementById('fR').value=p.r;onR();}
  if(p.g){document.getElementById('fG').value=p.g;onG();}
  if(p.d)document.getElementById('fD').value=p.d;
  if(p.s)document.getElementById('fS').value=p.s;
  if(p.cL)document.getElementById('cL').value=p.cL;
  if(p.cH)document.getElementById('cH').value=p.cH;
  if(p.mL)document.getElementById('mL').value=p.mL;
  if(p.mH)document.getElementById('mH').value=p.mH;
  if(p.pL)document.getElementById('pL').value=p.pL;
  if(p.pH)document.getElementById('pH').value=p.pH;
  if(p.sL)document.getElementById('sL').value=p.sL;
  if(p.sH)document.getElementById('sH').value=p.sH;
  if(p.sc)sc=p.sc;
  if(p.sa)sa=true;
  if(p.ps){ps=parseInt(p.ps);document.getElementById('ps').value=p.ps;}
  if(p.mg){
    merged=true;
    const btn=document.getElementById('mgBtn');
    btn.textContent='통합';
    btn.style.background='var(--accent)';
    btn.style.color='#fff';
    btn.style.borderColor='var(--accent)';
  }
  hashLock=false;
  af();
  if(p.p)cp=parseInt(p.p);
  rt();
  if(p.i!==undefined){
    const dataIdx=parseInt(p.i);
    const x=DI[dataIdx];
    if(x){curDetailIdx=dataIdx;showDetail(x);}
  }
  // 비교 뷰 복원
  if(p.al){
    areaLevel=p.al;
    document.getElementById('lvComplex').className='level-tab'+(areaLevel==='complex'?' active':'');
    document.getElementById('lvGu').className='level-tab'+(areaLevel==='gu'?' active':'');
    document.getElementById('lvDong').className='level-tab'+(areaLevel==='dong'?' active':'');
    document.getElementById('aGuFilter').style.display=(areaLevel==='dong'||areaLevel==='complex')?'':'none';
    if(areaLevel==='dong'||areaLevel==='complex') buildAreaGuFilter();
  }
  if(p.aa){ selectedAreas=p.aa.split('|'); }
  if(p.st==='sim') cmpSubTab='sim';
  if(p.vm==='area') switchView('area');
  return true;
}

// --- 모바일 필터 토글 ---
let filtersExpanded=false;
function toggleFilters(){
  filtersExpanded=!filtersExpanded;
  const btn=document.getElementById('filterToggle');
  btn.textContent=filtersExpanded?'필터 접기 ▲':'필터 더보기 ▼';
  applyMobileFilterVisibility();
}
function applyMobileFilterVisibility(){
  if(!isMobile()) return;
  const grid=document.querySelector('#complexView > div > div[style*="grid"]');
  if(!grid) return;
  const children=grid.children;
  for(let i=2;i<children.length;i++){
    if(filtersExpanded) children[i].classList.remove('filter-hidden');
    else children[i].classList.add('filter-hidden');
  }
}
function initMobileFilters(){
  if(isMobile()) applyMobileFilterVisibility();
}
window.addEventListener('resize',function(){
  if(!isMobile()){
    const grid=document.querySelector('#complexView > div > div[style*="grid"]');
    if(grid){
      for(let i=0;i<grid.children.length;i++) grid.children[i].classList.remove('filter-hidden');
    }
    document.body.style.overflow='';
  } else {
    applyMobileFilterVisibility();
  }
});

init();
initMobileFilters();
</script>
