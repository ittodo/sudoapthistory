<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울·경기 아파트 투자 스크리너</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --up: #ef4444; --dn: #3b82f6; --accent: #3b82f6; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
  .fi { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 12px; width: 100%; }
  .fi:focus { outline: none; border-color: var(--accent); }
  .tc { max-height: calc(100vh - 290px); overflow-y: auto; }
  .main-layout { display: flex; gap: 12px; }
  .left-col { flex: 1; min-width: 0; }
  .right-col { width: 380px; flex-shrink: 0; display: none; position: sticky; top: 12px; align-self: flex-start; max-height: calc(100vh - 80px); overflow-y: auto; }
  .right-col.open { display: block; }
  .right-col::-webkit-scrollbar { width: 5px; }
  .right-col::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  .tc::-webkit-scrollbar { width: 5px; }
  .tc::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { position: sticky; top: 0; background: #1a2332; padding: 8px 6px; font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; user-select: none; white-space: nowrap; border-bottom: 1px solid var(--border); }
  thead th:hover { color: #fff; }
  tbody td { padding: 6px; border-bottom: 1px solid #1e293b; white-space: nowrap; font-size: 12px; }
  tbody tr { cursor: pointer; transition: background .1s; }
  tbody tr:hover { background: rgba(59,130,246,.08); }
  tbody tr.sel { background: rgba(59,130,246,.15); }
  .up { color: var(--up); }
  .dn { color: var(--dn); }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 99px; font-size: 10px; font-weight: 600; margin-right: 4px; }
  .b-s { background: #7c3aed22; color: #a78bfa; }
  .b-g { background: #05966922; color: #6ee7b7; }
  .mc { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
  .mc .l { font-size: 10px; color: var(--muted); }
  .mc .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .rg { display: flex; align-items: center; gap: 3px; }
  .rg input { width: 60px; }
  #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 999; gap: 12px; }
  .sp { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sa { font-size: 10px; opacity: .4; }
  .sa.on { opacity: 1; color: var(--accent); }
  .pg-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; }
  .pg-btn:hover { border-color: var(--muted); color: #fff; }
  /* 평형 탭 */
  .area-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
  .area-tab { padding: 3px 10px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 500; transition: all .15s; }
  .area-tab:hover { border-color: var(--muted); color: #fff; }
  .area-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* 연도 행 (클릭 가능) */
  .yr-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 4px; border-bottom: 1px solid #1e293b; cursor: pointer; border-radius: 3px; transition: background .1s; }
  .yr-row:hover { background: rgba(59,130,246,.1); }
  /* 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 680px; max-width: 95vw; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: start; justify-content: space-between; }
  .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
  .modal-body::-webkit-scrollbar { width: 5px; }
  .modal-body::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  .month-tabs { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 12px; }
  .month-tab { padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; transition: all .15s; }
  .month-tab:hover { border-color: var(--muted); color: #fff; }
  .month-tab.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
  .tx-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tx-table th { padding: 6px 8px; text-align: left; color: var(--muted); font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--border); }
  .tx-table td { padding: 5px 8px; border-bottom: 1px solid #1e293b; }
  .tx-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .tx-stat { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; text-align: center; }
  .tx-stat .label { font-size: 10px; color: var(--muted); }
  .tx-stat .value { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .footer-disclaimer { text-align: center; padding: 12px; font-size: 11px; color: #475569; border-top: 1px solid var(--border); margin-top: 16px; }
  /* 지도 */
  #mapWrap { height: 200px; margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); display: none; position: relative; }
  #vmap { width: 100%; height: 100%; }
  #vmap .leaflet-control-attribution, #vmapBig .leaflet-control-attribution { font-size: 9px; background: rgba(30,41,59,.8); color: #64748b; }
  #vmap .leaflet-control-attribution a, #vmapBig .leaflet-control-attribution a { color: #94a3b8; }
  .map-expand-btn { position: absolute; top: 8px; right: 8px; z-index: 500; width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: rgba(15,23,42,.85); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .15s; }
  .map-expand-btn:hover { background: var(--card); color: #fff; border-color: var(--muted); }
  /* 지도 팝업 모달 */
  .map-modal { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1001; display: flex; align-items: center; justify-content: center; }
  .map-modal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 90vw; height: 80vh; max-width: 1200px; overflow: hidden; display: flex; flex-direction: column; }
  .map-modal-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .map-modal-body { flex: 1; position: relative; }
  #vmapBig { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="loading"><div class="sp"></div><span style="color:#94a3b8;font-size:13px" id="loadMsg">데이터 로딩 중...</span></div>

<div id="app" style="display:none;max-width:1600px" class="mx-auto px-3 py-3">
  <div class="flex items-center justify-between mb-3">
    <div>
      <h1 class="text-lg font-bold text-white">서울·경기 아파트 투자 스크리너</h1>
      <p class="text-xs" style="color:#64748b">국토교통부 실거래가 2015-2026 | <span id="tc">0</span>개 단지</p>
    </div>
    <div class="flex gap-2 items-center">
      <span id="fc" class="text-xs" style="color:#64748b">0건</span>
      <button onclick="resetF()" class="pg-btn">초기화</button>
    </div>
  </div>

  <div style="background:rgba(30,41,59,.5);border:1px solid rgba(51,65,85,.5);border-radius:10px;padding:12px;margin-bottom:12px">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">
      <div><label class="text-xs" style="color:#64748b">지역</label><select id="fR" class="fi" onchange="onR()"><option value="">전체</option><option value="1">서울</option><option value="0">경기</option></select></div>
      <div><label class="text-xs" style="color:#64748b">시/구</label><select id="fG" class="fi" onchange="onG()"><option value="">전체</option></select></div>
      <div><label class="text-xs" style="color:#64748b">동</label><select id="fD" class="fi" onchange="af()"><option value="">전체</option></select></div>
      <div><label class="text-xs" style="color:#64748b">단지 검색</label><input id="fS" type="text" class="fi" placeholder="단지명..." oninput="af()"></div>
      <div><label class="text-xs" style="color:#64748b">CAGR(%)</label><div class="rg"><input id="cL" type="number" class="fi" placeholder="min" onchange="af()"><span style="color:#475569">~</span><input id="cH" type="number" class="fi" placeholder="max" onchange="af()"></div></div>
      <div><label class="text-xs" style="color:#64748b">MDD(%)</label><div class="rg"><input id="mL" type="number" class="fi" placeholder="min" onchange="af()"><span style="color:#475569">~</span><input id="mH" type="number" class="fi" placeholder="max" onchange="af()"></div></div>
      <div><label class="text-xs" style="color:#64748b">25년가(억)</label><div class="rg"><input id="pL" type="number" class="fi" placeholder="min" onchange="af()"><span style="color:#475569">~</span><input id="pH" type="number" class="fi" placeholder="max" onchange="af()"></div></div>
      <div><label class="text-xs" style="color:#64748b">샤프비율</label><div class="rg"><input id="sL" type="number" class="fi" placeholder="min" step="0.1" onchange="af()"><span style="color:#475569">~</span><input id="sH" type="number" class="fi" placeholder="max" step="0.1" onchange="af()"></div></div>
    </div>
  </div>

  <div class="main-layout">
    <div class="left-col">
      <div class="tc" id="tableWrap">
        <table>
          <thead><tr>
            <th style="width:30px">#</th>
            <th onclick="sb('n')" class="text-left">단지명 <span class="sa" data-c="n">▼</span></th>
            <th onclick="sb('g')" class="text-left">구 <span class="sa" data-c="g">▼</span></th>
            <th onclick="sb('d')" class="text-left">동 <span class="sa" data-c="d">▼</span></th>
            <th onclick="sb('a')">면적 <span class="sa" data-c="a">▼</span></th>
            <th onclick="sb('p25')">25년가 <span class="sa" data-c="p25">▼</span></th>
            <th onclick="sb('y25')" title="24년→25년 가격 변동률">24→25 <span class="sa" data-c="y25">▼</span></th>
            <th onclick="sb('c')" title="연평균성장률: 첫 거래연도~2025년 기준. 신축일수록 기간이 짧아 높게 나올 수 있음">CAGR <span class="sa" data-c="c">▼</span></th>
            <th onclick="sb('m')">MDD <span class="sa" data-c="m">▼</span></th>
            <th onclick="sb('s')">샤프 <span class="sa" data-c="s">▼</span></th>
            <th onclick="sb('q')">21→25 <span class="sa" data-c="q">▼</span></th>
            <th onclick="sb('k')">26모멘텀 <span class="sa" data-c="k">▼</span></th>
            <th onclick="sb('v')">거래 <span class="sa" data-c="v">▼</span></th>
          </tr></thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
      <div class="flex items-center justify-between mt-2" style="font-size:11px;color:#64748b">
        <div>페이지당 <select id="ps" class="fi" style="width:60px;display:inline" onchange="cps()"><option value="50">50</option><option value="100" selected>100</option><option value="200">200</option></select></div>
        <div class="flex items-center gap-2">
          <button onclick="pp()" class="pg-btn">&#8249; 이전</button>
          <span id="pi">1/1</span>
          <button onclick="np()" class="pg-btn">다음 &#8250;</button>
        </div>
      </div>
    </div>

    <div class="right-col" id="dp">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px">
        <div class="flex items-start justify-between mb-2">
          <div><h2 id="dn" class="text-sm font-bold text-white"></h2><p id="dl" class="text-xs" style="color:#64748b;margin-top:2px"></p></div>
          <button onclick="cd()" style="color:#64748b;font-size:16px;cursor:pointer;background:none;border:none">&#10005;</button>
        </div>
        <div id="areaTabs" class="area-tabs"></div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px" id="metrics"></div>
        <div style="height:200px;margin-bottom:12px"><canvas id="chart"></canvas></div>
        <div id="mapWrap"><div id="vmap"></div><button class="map-expand-btn" onclick="openMapModal()" title="지도 크게 보기">&#x26F6;</button></div>
        <div><h3 class="text-xs font-medium" style="color:#64748b;margin-bottom:6px">연도별 가격 (클릭하면 거래 내역)</h3><div id="yp" style="font-size:11px"></div></div>
      </div>
    </div>
  </div>

  <div class="footer-disclaimer">본 서비스에서 제공하는 정보는 법적인 효력이 없으므로 참고용으로만 활용하시기 바랍니다.</div>
</div>

<!-- 거래 드릴다운 모달 -->
<div id="txModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeTxModal()">
  <div class="modal-card">
    <div class="modal-header">
      <div>
        <h3 id="txTitle" class="text-sm font-bold text-white"></h3>
        <p id="txSubtitle" class="text-xs" style="color:#64748b;margin-top:2px"></p>
      </div>
      <button onclick="closeTxModal()" style="color:#64748b;font-size:18px;cursor:pointer;background:none;border:none">&#10005;</button>
    </div>
    <div class="modal-body">
      <div id="txSummary" class="tx-summary"></div>
      <div id="txMonthTabs" class="month-tabs"></div>
      <div id="txTableWrap"></div>
    </div>
  </div>
</div>

<!-- 지도 확대 모달 -->
<div id="mapModal" class="map-modal" style="display:none" onclick="if(event.target===this)closeMapModal()">
  <div class="map-modal-card">
    <div class="map-modal-header">
      <h3 id="mapModalTitle" class="text-sm font-bold text-white"></h3>
      <button onclick="closeMapModal()" style="color:#64748b;font-size:18px;cursor:pointer;background:none;border:none">&#10005;</button>
    </div>
    <div class="map-modal-body"><div id="vmapBig"></div></div>
  </div>
</div>

<script>
let D=[],F=[],cp=1,ps=100,sc='c',sa=false,si=-1,ch=null;
let PRICES=null,VOLUMES=null,DETAILS=null;
let TX_CACHE={};
let DI=null; // D index map: i → entry (for fast lookup by data index)
let curDetailIdx=null; // current detail data index (for area tab switching)
const Y=[2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
const VWORLD_KEY='8B74D8CC-0DBF-311A-8E6E-3FBBB54FD034';
let LMAP=null, LMARKER=null, GEO_DATA=null;
const GEO_GU={"가평군":[37.8776,127.6018],"고양시 덕양구":[37.6101,126.8547],"고양시 일산동구":[37.657,126.7774],"고양시 일산서구":[37.7024,126.7282],"과천시":[37.418,126.9872],"광명시":[37.4238,126.87],"광주시":[37.4125,127.2641],"구리시":[37.6411,127.1312],"군포시":[37.3766,126.9451],"김포시":[37.6333,126.6751],"남양주시":[37.6387,127.2267],"동두천시":[37.9214,127.1156],"부천시 소사구":[37.4677,126.8061],"부천시 오정구":[37.5385,126.8211],"부천시 원미구":[37.5163,126.7799],"성남시 분당구":[37.3397,127.1295],"성남시 수정구":[37.4375,127.1063],"성남시 중원구":[37.4322,127.1934],"수원시 권선구":[37.2561,126.9841],"수원시 영통구":[37.2478,127.0532],"수원시 장안구":[37.3395,127.0106],"수원시 팔달구":[37.2796,127.0071],"시흥시":[37.3701,126.7595],"안산시 단원구":[37.3357,126.8368],"안산시 상록구":[37.3201,126.909],"안성시":[37.0213,127.2855],"안양시 동안구":[37.4142,126.9721],"안양시 만안구":[37.4078,126.9091],"양주시":[37.8382,127.0714],"양평군":[37.4752,127.4928],"여주시":[37.1944,127.5553],"연천군":[38.0244,127.0529],"오산시":[37.148,127.0486],"용인시 기흥구":[37.2195,127.1488],"용인시 수지구":[37.3499,127.0767],"용인시 처인구":[37.2477,127.2415],"의왕시":[37.3366,126.972],"의정부시":[37.7478,127.0521],"이천시":[37.2917,127.4761],"파주시":[37.7954,126.7573],"평택시":[37.0414,127.0885],"포천시":[37.8307,127.1828],"하남시":[37.5251,127.1693],"화성시 동탄구":[37.1843,127.0776],"화성시 만세구":[37.2151,126.8158],"화성시 병점구":[37.2211,127.0518],"화성시 효행구":[37.2308,126.9929],"강남구":[37.4829,127.0752],"강동구":[37.5797,127.1763],"강북구":[37.6189,127.0364],"강서구":[37.5649,126.8575],"관악구":[37.4753,126.9715],"광진구":[37.5569,127.1129],"구로구":[37.4861,126.8816],"금천구":[37.4823,126.8861],"노원구":[37.6202,127.1041],"도봉구":[37.6923,127.0478],"동대문구":[37.5764,127.0667],"동작구":[37.5161,126.9459],"마포구":[37.5513,126.9621],"서대문구":[37.5845,126.923],"서초구":[37.4616,127.0675],"성동구":[37.5577,127.0231],"성북구":[37.6067,127.0274],"송파구":[37.5031,127.1231],"양천구":[37.5473,126.8806],"영등포구":[37.5426,126.9019],"용산구":[37.5498,126.9728],"은평구":[37.6263,126.9201],"종로구":[37.5861,126.9854],"중구":[37.5654,127.0034],"중랑구":[37.6061,127.1144]};

async function init(){
  const t0=performance.now();
  document.getElementById('loadMsg').textContent='인덱스 로딩 중...';

  const r=await fetch('data/index.json');
  const j=await r.json();

  if(j.g && j.o && Array.isArray(j.d[0])){
    const GUS=j.g, DONGS=j.o;
    D=j.d.map((x,idx)=>({
      i:idx, n:x[0], r:x[1], g:GUS[x[2]], d:x[3]>=0?DONGS[x[3]]:'',
      a:x[4], b:x[5],
      c:x[6]===''?null:x[6], m:x[7], s:x[8]===''?null:x[8],
      v:x[9], q:x[10]===''?null:x[10], k:x[11]===''?null:x[11],
      t:x[12], p25:x[13]||null, si:x[14]||null
    }));
  } else {
    D=(j.d||j.data||j).map((x,idx)=>({...x, i:x.i??idx}));
  }

  // Build index map: data index → entry object
  DI={};
  D.forEach(x=>{ DI[x.i]=x; });

  document.getElementById('tc').textContent=D.length.toLocaleString();
  buildLoc();

  // URL 해시 복원, 없으면 기본 필터 적용
  if(!loadHash()) af();

  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  console.log(`Index loaded: ${D.length} complexes in ${Math.round(performance.now()-t0)}ms`);

  loadPrices();
  loadVolumes();
  loadDetails();
  loadGeo();
}

function getPrices(idx){ return PRICES?PRICES[String(idx)]:null; }
function getVolumes(idx){ return VOLUMES?VOLUMES[String(idx)]:null; }
function getDetails(idx){ return DETAILS?DETAILS[String(idx)]:null; }

async function loadTx(gu){
  if(TX_CACHE[gu]) return TX_CACHE[gu];
  try{
    const r=await fetch('data/tx/'+encodeURIComponent(gu)+'.json');
    const j=await r.json();
    TX_CACHE[gu]=j.entries||{};
    return TX_CACHE[gu];
  }catch(e){ console.warn('TX load failed for',gu,e); return {}; }
}

let LT={};
function buildLoc(){
  LT={};
  D.forEach(x=>{
    const rk=x.r;
    if(!LT[rk])LT[rk]={};
    if(!LT[rk][x.g])LT[rk][x.g]=new Set();
    if(x.d)LT[rk][x.g].add(x.d);
  });
}

function onR(){
  const v=gv('fR');
  const s=document.getElementById('fG');
  s.innerHTML='<option value="">전체</option>';
  const gs=new Set();
  if(v!==''){
    const rk=parseInt(v);
    if(LT[rk])Object.keys(LT[rk]).sort().forEach(g=>gs.add(g));
  }else{
    Object.values(LT).forEach(o=>Object.keys(o).forEach(g=>gs.add(g)));
  }
  [...gs].sort().forEach(g=>{s.innerHTML+=`<option value="${g}">${g}</option>`});
  onG();
}

function onG(){
  const rv=gv('fR'), gv2=gv('fG');
  const s=document.getElementById('fD');
  s.innerHTML='<option value="">전체</option>';
  const ds=new Set();
  Object.entries(LT).forEach(([rk,ro])=>{
    if(rv!==''&&parseInt(rv)!==parseInt(rk))return;
    Object.entries(ro).forEach(([g,dset])=>{
      if(gv2&&g!==gv2)return;
      dset.forEach(d=>ds.add(d));
    });
  });
  [...ds].sort().forEach(d=>{s.innerHTML+=`<option value="${d}">${d}</option>`});
  af();
}

function gv(id){return document.getElementById(id).value}
function gn(id){const v=document.getElementById(id).value;return v===''?null:parseFloat(v)}

function af(){
  const fR=gv('fR'),fG=gv('fG'),fD=gv('fD'),fS=gv('fS').toLowerCase();
  const cL=gn('cL'),cH=gn('cH'),mL=gn('mL'),mH=gn('mH'),pL=gn('pL'),pH2=gn('pH'),sL=gn('sL'),sH=gn('sH');

  F=D.filter(x=>{
    if(fR!==''&&x.r!==parseInt(fR))return false;
    if(fG&&x.g!==fG)return false;
    if(fD&&x.d!==fD)return false;
    if(fS&&!x.n.toLowerCase().includes(fS)&&!x.g.toLowerCase().includes(fS)&&!(x.d||'').toLowerCase().includes(fS))return false;
    if(cL!==null&&(x.c===null||x.c<cL))return false;
    if(cH!==null&&(x.c===null||x.c>cH))return false;
    if(mL!==null&&x.m<mL)return false;
    if(mH!==null&&x.m>mH)return false;
    if(pL!==null&&(x.p25===null||x.p25===0||x.p25<pL))return false;
    if(pH2!==null&&(x.p25===null||x.p25===0||x.p25>pH2))return false;
    if(sL!==null&&(x.s===null||x.s<sL))return false;
    if(sH!==null&&(x.s===null||x.s>sH))return false;
    return true;
  });
  ds();cp=1;rt();
  saveHash();
}

function ds(){
  F.sort((a,b)=>{
    let va=a[sc], vb=b[sc];
    if(va===null||va===undefined)va=sa?Infinity:-Infinity;
    if(vb===null||vb===undefined)vb=sa?Infinity:-Infinity;
    if(typeof va==='string')return sa?va.localeCompare(vb):vb.localeCompare(va);
    return sa?va-vb:vb-va;
  });
}

function sb(col){
  if(sc===col)sa=!sa;else{sc=col;sa=false;}
  document.querySelectorAll('.sa').forEach(e=>{e.classList.remove('on');e.textContent='\u25BC'});
  const a=document.querySelector(`[data-c="${col}"]`);
  if(a){a.classList.add('on');a.textContent=sa?'\u25B2':'\u25BC';}
  ds();rt();saveHash();
}

function rt(){
  const tb=document.getElementById('tb');
  const s=(cp-1)*ps, e=Math.min(s+ps,F.length);
  const tp=Math.max(1,Math.ceil(F.length/ps));
  document.getElementById('fc').textContent=F.length.toLocaleString()+'\uAC74';
  document.getElementById('pi').textContent=`${cp}/${tp}`;

  const frags=[];
  for(let i=s;i<e;i++){
    const x=F[i];
    const bg=x.r?'b-s':'b-g';
    const rl=x.r?'\uC11C\uC6B8':'\uACBD\uAE30';
    const p25=x.p25&&x.p25>0?x.p25+'\uC5B5':'-';
    const y25v=x.y25!==null&&x.y25!==undefined?(x.y25>0?'+':'')+x.y25+'%':'-';
    const y25c=x.y25>0?'up':x.y25<0?'dn':'';
    const cv=x.c!==null?x.c+'%':'-';
    const cc=x.c>0?'up':x.c<0?'dn':'';
    const qv=x.q!==null?(x.q>0?'+':'')+x.q+'%':'-';
    const qc=x.q>0?'up':x.q<0?'dn':'';
    const kv=x.k!==null?(x.k>0?'+':'')+x.k+'%':'-';
    const kc=x.k>0?'up':x.k<0?'dn':'';
    const mc=x.m<-10?'dn':'';

    frags.push(`<tr onclick="sd(${i})" class="${si===i?'sel':''}">
      <td style="color:#475569;text-align:center">${i+1}</td>
      <td class="text-left"><span class="badge ${bg}">${rl}</span>${x.n}</td>
      <td class="text-left" style="color:#94a3b8">${x.g}</td>
      <td class="text-left" style="color:#94a3b8">${x.d||'-'}</td>
      <td style="text-align:center;color:#94a3b8">${x.a}\u33A1</td>
      <td style="text-align:center;font-weight:600">${p25}</td>
      <td style="text-align:center;font-weight:500" class="${y25c}">${y25v}</td>
      <td style="text-align:center;font-weight:700" class="${cc}">${cv}</td>
      <td style="text-align:center" class="${mc}">${x.m}%</td>
      <td style="text-align:center;color:#94a3b8">${x.s!==null?x.s:'-'}</td>
      <td style="text-align:center;font-weight:500" class="${qc}">${qv}</td>
      <td style="text-align:center;font-weight:500" class="${kc}">${kv}</td>
      <td style="text-align:center;color:#64748b">${x.v}</td>
    </tr>`);
  }
  tb.innerHTML=frags.join('');
}

function sd(i){

  document.getElementById('dl').textContent=`${x.r?'\uC11C\uC6B8':'\uACBD\uAE30'} ${x.g} ${x.d||''} | ${x.a}\u33A1 | ${x.b?x.b+'\uB144 \uC900\uACF5':''} | \uCD1D ${x.t.toLocaleString()}\uAC74`;

    let tabs='';
    x.si.forEach(sibIdx=>{
      const sib=DI[sibIdx];

      const isActive=sibIdx===x.i?'active':'';
      tabs+=`<button class="area-tab ${isActive}" onclick="switchArea(${sibIdx})">${sib.a}\u33A1</button>`;
    });

    tabsEl.style.display='flex';
  } else {
    tabsEl.innerHTML='';

  }

  // 메트릭 카드
  const fm=(v,s='%')=>v!==null&&v!==undefined?(v>0?'+':'')+v+s:'-';
  document.getElementById('metrics').innerHTML=[
    ['CAGR',fm(x.c),x.c>0?'up':'dn'],
    ['MDD',x.m+'%','dn'],
    ['\uC0E4\uD504\uBE44\uC728',x.s!==null?''+x.s:'-',''],
    ['25\uB144 \uD3C9\uADE0\uAC00',x.p25&&x.p25>0?x.p25+'\uC5B5':'-',''],
    ['21\u219225 \uC218\uC775',fm(x.q),x.q>0?'up':'dn'],
    ['26\uB144 \uBAA8\uBA58\uD140',x.k!==null?fm(x.k):'-',x.k>0?'up':x.k<0?'dn':'']
  ].map(([l,v,c])=>`<div class="mc"><div class="l">${l}</div><div class="v ${c}">${v}</div></div>`).join('');

  const prices=getPrices(x.i);
  if(!prices){
    document.getElementById('yp').innerHTML='<div style="color:#64748b">\uAC00\uACA9 \uB370\uC774\uD130 \uB85C\uB529 \uC911...</div>';
    if(ch)ch.destroy();
    const retry=setInterval(()=>{
      if(PRICES){clearInterval(retry);if(curDetailIdx===x.i)renderDetail(x);}
    },200);
    return;
  }
  renderDetail(x);
}

function switchArea(dataIdx){
  const x=DI[dataIdx];
  if(!x)return;
  curDetailIdx=dataIdx;
  showDetail(x);
}

function renderDetail(x){
  const prices=getPrices(x.i);
  if(!prices)return;
  const volumes=getVolumes(x.i);
  const details=getDetails(x.i);

  // 연도별 가격 리스트 (min/max 포함, 클릭 가능)
  let yh='';
  prices.forEach((p,j)=>{
    if(p>0){
      const y=2015+j;
      const vol=volumes?volumes[j]:0;
      let chg='';
      if(j>0&&prices[j-1]>0){
        const pct=((p-prices[j-1])/prices[j-1]*100).toFixed(1);
        chg=`<span class="${pct>0?'up':pct<0?'dn':''}" style="font-size:10px">${pct>0?'+':''}${pct}%</span>`;
      }
      const volStr=vol>0?`<span style="color:#64748b;font-size:10px">${vol}\uAC74</span>`:'';

      // min/max from details
      let rangeStr='';
      if(details && details[j]){
        const d=details[j];
        const mn=d[1], mx=d[2];
        if(mn>0 && mx>0 && mn!==mx){
          rangeStr=`<span style="color:#475569;font-size:10px">(${mn}~${mx})</span>`;
        }
      }

      yh+=`<div class="yr-row" onclick="openTxModal(${x.i},${y})">
        <span style="color:#64748b;min-width:32px">${y}</span>
        <span style="font-weight:600">${p}\uC5B5</span>
        ${rangeStr}
        ${volStr}
        ${chg}
      </div>`;
    }
  });
  document.getElementById('yp').innerHTML=yh;

  // 차트
  const vp=[],vy=[];
  prices.forEach((p,j)=>{if(p>0){vp.push(p);vy.push(2015+j);}});

  if(ch)ch.destroy();
  ch=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels:vy.map(y=>y+'\uB144'),
      datasets:[{
        data:vp,
        borderColor:'#3b82f6',
        backgroundColor:'rgba(59,130,246,.08)',
        fill:true,tension:.3,
        pointRadius:3,pointBackgroundColor:'#3b82f6',pointBorderColor:'#1e293b',pointBorderWidth:2,borderWidth:2
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#334155',borderWidth:1,callbacks:{label:c=>c.parsed.y+'\uC5B5\uC6D0'}}},
      scales:{
        x:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10}}},
        y:{grid:{color:'#1e293b'},ticks:{color:'#64748b',font:{size:10},callback:v=>v+'\uC5B5'}}
      }
    }
  });

  document.getElementById('dp').scrollTop=0;
  showOnMap(x);
}

let txModalData=null, txModalYear=null, txModalMonth=0; // 0=전체

async function openTxModal(dataIdx, year){
  const x=DI[dataIdx];
  if(!x)return;

  const modal=document.getElementById('txModal');
  modal.style.display='flex';
  document.getElementById('txTitle').textContent=`${x.n} ${x.a}\u33A1 \u2014 ${year}\uB144 \uAC70\uB798 \uB0B4\uC5ED`;
  document.getElementById('txSubtitle').textContent=`${x.r?'\uC11C\uC6B8':'\uACBD\uAE30'} ${x.g} ${x.d||''}`;
  document.getElementById('txSummary').innerHTML='<div style="color:#64748b;text-align:center;grid-column:1/-1">\uAC70\uB798 \uB370\uC774\uD130 \uB85C\uB529 \uC911...</div>';
  document.getElementById('txMonthTabs').innerHTML='';
  document.getElementById('txTableWrap').innerHTML='';

  // Load TX data
  const txData=await loadTx(x.g);
  const entryTx=txData[String(dataIdx)];
  const yearTx=entryTx?entryTx[String(year)]:null;

  txModalData=yearTx||[];
  txModalYear=year;
  txModalMonth=0;
  renderTxModal(x);
}

function renderTxModal(x){
  if(!x) x=DI[curDetailIdx];
  const txs=txModalData;

  // 월 탭
  const months=new Set(txs.map(t=>t[0]));
  let mtabs=`<button class="month-tab ${txModalMonth===0?'active':''}" onclick="txModalMonth=0;renderTxModal()">\uC804\uCCB4</button>`;
  for(let m=1;m<=12;m++){
    if(months.has(m)){
      mtabs+=`<button class="month-tab ${txModalMonth===m?'active':''}" onclick="txModalMonth=${m};renderTxModal()">${m}\uC6D4</button>`;
    }
  }
  document.getElementById('txMonthTabs').innerHTML=mtabs;

  // 필터
  const filtered=txModalMonth===0?txs:txs.filter(t=>t[0]===txModalMonth);

  // 요약
  if(filtered.length>0){
    const prices=filtered.map(t=>t[2]);
    const avg=Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
    const mn=Math.min(...prices);
    const mx=Math.max(...prices);
    document.getElementById('txSummary').innerHTML=[
      ['\uCD1D \uAC70\uB798',filtered.length+'\uAC74',''],
      ['\uD3C9\uADE0',(avg/10000).toFixed(2)+'\uC5B5',''],
      ['\uCD5C\uC800',(mn/10000).toFixed(2)+'\uC5B5','dn'],
      ['\uCD5C\uACE0',(mx/10000).toFixed(2)+'\uC5B5','up']
    ].map(([l,v,c])=>`<div class="tx-stat"><div class="label">${l}</div><div class="value ${c}">${v}</div></div>`).join('');
  } else {
    document.getElementById('txSummary').innerHTML='<div style="color:#64748b;text-align:center;grid-column:1/-1">\uAC70\uB798 \uB0B4\uC5ED\uC774 \uC5C6\uC2B5\uB2C8\uB2E4</div>';
  }

  // 테이블
  if(filtered.length>0){
    let rows='';
    filtered.forEach((t,i)=>{
      const price=(t[2]/10000).toFixed(2);
      let diff='';
      if(i>0){
        const prev=filtered[i-1][2];
        const d=t[2]-prev;
        if(d!==0){
          const pct=(d/prev*100).toFixed(1);
          const cls=d>0?'up':'dn';
          diff=`<span class="${cls}">${d>0?'+':''}${pct}%</span>`;
        }
      }
      rows+=`<tr>
        <td>${t[0]}\uC6D4 ${t[1]}\uC77C</td>
        <td style="font-weight:600">${price}\uC5B5</td>
        <td>${t[3]?t[3]+'\uCE35':'-'}</td>
        <td>${diff}</td>
      </tr>`;
    });
    document.getElementById('txTableWrap').innerHTML=`<table class="tx-table">
      <thead><tr><th>\uACC4\uC57D\uC77C</th><th>\uAC70\uB798\uAE08\uC561</th><th>\uCE35</th><th>\uC804\uAC74\uB300\uBE44</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } else {
    document.getElementById('txTableWrap').innerHTML='';
  }
}

  document.getElementById('txModal').style.display='none';
  txModalData=null;
}

let LMAP_BIG=null, LMARKER_BIG=null, curMapCoord=null, curMapEntry=null;
const VWTILE='https://api.vworld.kr/req/wmts/1.0.0/'+VWORLD_KEY+'/Base/{z}/{y}/{x}.png';

function initMap(){
  if(LMAP) return;
  LMAP=L.map('vmap',{center:[37.5665,126.978],zoom:12,zoomControl:false,attributionControl:false});
  L.tileLayer(VWTILE,{maxZoom:19,attribution:'V-World'}).addTo(LMAP);
  L.control.attribution({position:'bottomright',prefix:false}).addTo(LMAP);
}

const GEO_CACHE={};
let _jsonpId=0;

function getCoordSync(x){
  const aptKey=x.g+'|'+(x.d||'')+'|'+x.n;
  const dongKey=x.g+'|'+(x.d||'');
  return GEO_CACHE[aptKey]||(GEO_DATA&&GEO_DATA[aptKey])||(GEO_DATA&&GEO_DATA[dongKey])||GEO_GU[x.g]||null;
}

function vworldJsonp(url){
  return new Promise((resolve)=>{
    const cbName='_vwCb'+(++_jsonpId);
    const script=document.createElement('script');
    const timeout=setTimeout(()=>{cleanup();resolve(null)},5000);
    function cleanup(){clearTimeout(timeout);delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script)}
    window[cbName]=function(data){cleanup();resolve(data)};
    script.src=url+'&callback='+cbName;
    script.onerror=function(){cleanup();resolve(null)};
    document.head.appendChild(script);
  });
}

async function getCoordAsync(x){
  const aptKey=x.g+'|'+(x.d||'')+'|'+x.n;
  // 1. 캐시에 있으면 즉시 반환
  if(GEO_CACHE[aptKey]) return GEO_CACHE[aptKey];
  // 2. 지번주소 API (동+번지 → 정확한 좌표)
  if(x.j && x.d){
    const jibunQ=(x.d||'')+' '+x.j;
    const jUrl='https://apis.vworld.kr/jibun2coord.do?q='+encodeURIComponent(jibunQ)+'&output=json&epsg=epsg:4326&apiKey='+VWORLD_KEY;
    const jData=await vworldJsonp(jUrl);
    if(jData&&jData.EPSG_4326_Y&&jData.EPSG_4326_X){
      const coord=[parseFloat(jData.EPSG_4326_Y),parseFloat(jData.EPSG_4326_X)];
      GEO_CACHE[aptKey]=coord;
      return coord;
    }
  }
  // 3. 도로명주소 API
  if(x.rd){
    const rUrl='https://apis.vworld.kr/new2coord.do?q='+encodeURIComponent(x.rd)+'&output=json&epsg=epsg:4326&apiKey='+VWORLD_KEY;
    const rData=await vworldJsonp(rUrl);
    if(rData&&rData.EPSG_4326_Y&&rData.EPSG_4326_X){
      const coord=[parseFloat(rData.EPSG_4326_Y),parseFloat(rData.EPSG_4326_X)];
      GEO_CACHE[aptKey]=coord;
      return coord;
    }
  }
  // 4. place 검색 (아파트 명칭)
  const region=x.r?'서울':'경기';
  const queries=[
    `${region} ${x.g} ${x.d||''} ${x.n}`,
    `${region} ${x.g} ${x.n}`
  ];
  for(const q of queries){
    const url='https://api.vworld.kr/req/search?service=search&request=search&version=2.0&crs=EPSG:4326&size=1&page=1&type=place&format=json&key='+VWORLD_KEY+'&query='+encodeURIComponent(q);
    const data=await vworldJsonp(url);
    if(data&&data.response&&data.response.status==='OK'&&data.response.result&&data.response.result.items&&data.response.result.items.length>0){
      const pt=data.response.result.items[0].point;
      const coord=[parseFloat(pt.y),parseFloat(pt.x)];
      GEO_CACHE[aptKey]=coord;
      return coord;
    }
  }
  // 5. 최종 폴백: geo.json → 구 좌표
  const dongKey=x.g+'|'+(x.d||'');
  return (GEO_DATA&&GEO_DATA[aptKey])||(GEO_DATA&&GEO_DATA[dongKey])||GEO_GU[x.g]||null;
}

function showOnMap(x){
  document.getElementById('mapWrap').style.display='block';
  initMap();
  // 먼저 동기 좌표로 빠르게 표시
  const syncCoord=getCoordSync(x);
  if(syncCoord){
    curMapCoord=syncCoord; curMapEntry=x;
    setTimeout(()=>{
      LMAP.invalidateSize();
      LMAP.setView(syncCoord,15,{animate:true});
      if(LMARKER) LMAP.removeLayer(LMARKER);
      LMARKER=L.circleMarker(syncCoord,{radius:8,fillColor:'#ef4444',color:'#fff',weight:2,fillOpacity:1})
        .bindPopup(`<b>${x.n}</b><br>${x.g} ${x.d||''}<br>${x.a}\u33A1`,{className:''})
        .addTo(LMAP).openPopup();
    },150);
  }
  // 비동기로 정확한 좌표 조회 후 업데이트
  getCoordAsync(x).then(coord=>{
    if(!coord) return;
    curMapCoord=coord; curMapEntry=x;
    if(!syncCoord){
      // 동기 좌표가 없었으면 처음 표시
      setTimeout(()=>{ LMAP.invalidateSize(); },50);
    }
    LMAP.setView(coord,15,{animate:true});
    if(LMARKER) LMAP.removeLayer(LMARKER);
    LMARKER=L.circleMarker(coord,{radius:8,fillColor:'#ef4444',color:'#fff',weight:2,fillOpacity:1})
      .bindPopup(`<b>${x.n}</b><br>${x.g} ${x.d||''}<br>${x.a}\u33A1`,{className:''})
      .addTo(LMAP).openPopup();
  });
}

function openMapModal(){
  if(!curMapCoord||!curMapEntry) return;
  const x=curMapEntry;
  document.getElementById('mapModal').style.display='flex';
  document.getElementById('mapModalTitle').textContent=`${x.n} \u2014 ${x.r?'\uC11C\uC6B8':'\uACBD\uAE30'} ${x.g} ${x.d||''} ${x.a}\u33A1`;

  if(!LMAP_BIG){
    LMAP_BIG=L.map('vmapBig',{center:curMapCoord,zoom:16,zoomControl:true,attributionControl:false});
    L.tileLayer(VWTILE,{maxZoom:19,attribution:'V-World'}).addTo(LMAP_BIG);
    L.control.attribution({position:'bottomright',prefix:false}).addTo(LMAP_BIG);
  }
  setTimeout(()=>{
    LMAP_BIG.invalidateSize();
    LMAP_BIG.setView(curMapCoord,16,{animate:false});
    if(LMARKER_BIG) LMAP_BIG.removeLayer(LMARKER_BIG);
    LMARKER_BIG=L.circleMarker(curMapCoord,{radius:10,fillColor:'#ef4444',color:'#fff',weight:2,fillOpacity:1})
      .bindPopup(`<b>${x.n}</b><br>${x.g} ${x.d||''}<br>${x.a}\u33A1`,{className:''})
      .addTo(LMAP_BIG).openPopup();
  },200);
}

function closeMapModal(){
  document.getElementById('mapModal').style.display='none';
}

// ESC 키로 모달 닫기
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('mapModal').style.display!=='none') closeMapModal();
    else if(document.getElementById('txModal').style.display!=='none') closeTxModal();
  }
});

function cd(){document.getElementById('dp').classList.remove('open');si=-1;curDetailIdx=null;rt();saveHash();}
function pp(){if(cp>1){cp--;rt();document.getElementById('tableWrap').scrollTop=0;saveHash();}}
function np(){if(cp<Math.ceil(F.length/ps)){cp++;rt();document.getElementById('tableWrap').scrollTop=0;saveHash();}}
function cps(){ps=parseInt(document.getElementById('ps').value);cp=1;rt();saveHash();}
function resetF(){
  ['fR','fG','fD','fS','cL','cH','mL','mH','pL','pH','sL','sH'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.value='';
  });
  document.getElementById('fG').innerHTML='<option value="">\uC804\uCCB4</option>';
  document.getElementById('fD').innerHTML='<option value="">\uC804\uCCB4</option>';
  af();
}

// --- URL 해시 상태 저장/복원 ---
let hashLock=false;
function saveHash(){
  if(hashLock) return;
  const p={};
  const fR=gv('fR');if(fR)p.r=fR;
  const fG=gv('fG');if(fG)p.g=fG;
  const fD=gv('fD');if(fD)p.d=fD;
  const fS=gv('fS');if(fS)p.s=fS;
  const cLv=gv('cL');if(cLv)p.cL=cLv;
  const cHv=gv('cH');if(cHv)p.cH=cHv;
  const mLv=gv('mL');if(mLv)p.mL=mLv;
  const mHv=gv('mH');if(mHv)p.mH=mHv;
  const pLv=gv('pL');if(pLv)p.pL=pLv;
  const pHv=gv('pH');if(pHv)p.pH=pHv;
  const sLv=gv('sL');if(sLv)p.sL=sLv;
  const sHv=gv('sH');if(sHv)p.sH=sHv;
  if(sc!=='c')p.sc=sc;
  if(sa)p.sa=1;
  if(cp>1)p.p=cp;
  if(ps!==100)p.ps=ps;
  if(curDetailIdx!==null)p.i=curDetailIdx;
  const h=Object.entries(p).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  history.replaceState(null,null,h?'#'+h:'#');
}

function loadHash(){
  const h=location.hash.slice(1);
  if(!h) return false;
  const p={};
  h.split('&').forEach(s=>{const [k,v]=s.split('=');if(k)p[k]=decodeURIComponent(v||'');});
  hashLock=true;
  if(p.r){document.getElementById('fR').value=p.r;onR();}
  if(p.g){document.getElementById('fG').value=p.g;onG();}
  if(p.d)document.getElementById('fD').value=p.d;
  if(p.s)document.getElementById('fS').value=p.s;
  if(p.cL)document.getElementById('cL').value=p.cL;
  if(p.cH)document.getElementById('cH').value=p.cH;
  if(p.mL)document.getElementById('mL').value=p.mL;
  if(p.mH)document.getElementById('mH').value=p.mH;
  if(p.pL)document.getElementById('pL').value=p.pL;
  if(p.pH)document.getElementById('pH').value=p.pH;
  if(p.sL)document.getElementById('sL').value=p.sL;
  if(p.sH)document.getElementById('sH').value=p.sH;
  if(p.sc)sc=p.sc;
  if(p.sa)sa=true;
  if(p.ps){ps=parseInt(p.ps);document.getElementById('ps').value=p.ps;}
  hashLock=false;
  af();
  if(p.p)cp=parseInt(p.p);
  rt();
  // 선택 아파트 복원
  if(p.i!==undefined){
    const dataIdx=parseInt(p.i);
    const x=DI[dataIdx];
    if(x){curDetailIdx=dataIdx;showDetail(x);}
  }
  return true;
}

init();
</script>
