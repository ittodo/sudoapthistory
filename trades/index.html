<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실거래가 탐색기 — 서울·경기·인천 아파트</title>
<meta name="description" content="서울·경기·인천 아파트 실거래가 탐색. 날짜·지역·단지별 검색과 정렬.">
<meta property="og:type" content="website">
<meta property="og:title" content="실거래가 탐색기 — 서울·경기·인천 아파트">
<meta property="og:description" content="국토교통부 실거래가 데이터 기반 서울·경기·인천 아파트 개별 거래 탐색. 날짜·지역·단지·가격 필터.">
<meta property="og:url" content="https://nodostream.com/trades/">
<meta property="og:locale" content="ko_KR">
<meta property="og:site_name" content="아파트 투자 스크리너">
<link rel="canonical" href="https://nodostream.com/trades/">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0f172a; --card: #1e293b; --border: #334155;
  --text: #e2e8f0; --muted: #94a3b8;
  --up: #ef4444; --dn: #3b82f6; --accent: #3b82f6; --green: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Loading */
#loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 999; gap: 12px; }
.sp { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.sa { font-size: 10px; opacity: .5; }

/* Buttons */
.tab-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; }
.tab-btn:hover { border-color: var(--muted); color: #fff; }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Input */
.fi { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 12px; }
.fi:focus { outline: none; border-color: var(--accent); }
.fi::placeholder { color: #475569; }

/* Table */
table { width: 100%; border-collapse: collapse; }
thead th {
  position: sticky; top: 0; background: #1a2332; padding: 8px 8px;
  font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer;
  user-select: none; white-space: nowrap; border-bottom: 1px solid var(--border); z-index: 2;
}
thead th:hover { color: #fff; }
thead th.sort-active { color: var(--accent); }
tbody td { padding: 7px 8px; border-bottom: 1px solid #1e293b; white-space: nowrap; font-size: 12px; }
tbody tr { transition: background .1s; }
tbody tr:hover { background: rgba(59,130,246,.08); }
.si { font-size: 9px; margin-left: 2px; }

/* Chips */
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text);
  transition: all .15s;
}
.chip:hover { border-color: var(--muted); }
.chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-x { font-size: 13px; line-height: 1; }

/* Summary bar */
.stat-bar {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 16px; display: flex; gap: 0; align-items: stretch; margin-bottom: 10px;
  flex-wrap: wrap;
}
.stat-item { flex: 1; min-width: 90px; text-align: center; padding: 4px 8px; }
.stat-sep { width: 1px; background: var(--border); flex-shrink: 0; margin: 4px 0; }
.stat-item .sl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.stat-item .sv { font-size: 16px; font-weight: 700; margin-top: 2px; }

/* Month nav */
.month-nav { display: flex; align-items: center; gap: 8px; }
.month-btn {
  width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--text); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.month-btn:hover { border-color: var(--muted); background: var(--card); }
.month-btn:disabled { opacity: .3; cursor: not-allowed; }
.month-label { font-size: 15px; font-weight: 700; min-width: 130px; text-align: center; }

/* Filter panel */
.filter-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
.filter-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.filter-row:last-child { margin-bottom: 0; }
.filter-label { font-size: 11px; color: var(--muted); min-width: 40px; font-weight: 500; flex-shrink: 0; }

/* Gu dropdown */
.gu-dropdown { position: relative; display: inline-block; }
.gu-menu {
  position: absolute; top: calc(100% + 4px); left: 0;
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px; z-index: 100; max-height: 320px; overflow-y: auto; width: 270px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5); display: none;
}
.gu-menu.open { display: block; }
.gu-menu::-webkit-scrollbar { width: 4px; }
.gu-menu::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
.gu-item { padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px; }
.gu-item:hover { background: rgba(59,130,246,.1); }
.gu-item.sel { color: var(--accent); }
.gu-group-lbl { font-size: 10px; color: var(--muted); padding: 6px 8px 2px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.gu-chk { width: 14px; font-size: 10px; text-align: center; flex-shrink: 0; }
.badge-cnt { background: rgba(59,130,246,.2); color: #93c5fd; padding: 0 5px; border-radius: 99px; font-size: 10px; font-weight: 700; margin-left: 3px; }

/* Chips strip */
.chips-strip { display: flex; flex-wrap: wrap; gap: 4px; }

/* Table wrap */
.table-wrap {
  overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 380px);
  min-height: 240px; border: 1px solid var(--border); border-radius: 8px;
}
.table-wrap::-webkit-scrollbar { width: 5px; height: 5px; }
.table-wrap::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

/* Load more btn */
.load-more-btn {
  width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--muted); cursor: pointer; font-size: 12px;
  transition: all .15s; margin-top: 8px;
}
.load-more-btn:hover:not(:disabled) { border-color: var(--muted); color: #fff; background: rgba(255,255,255,.03); }
.load-more-btn:disabled { opacity: .4; cursor: not-allowed; }

/* Mobile cards */
.tx-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.tx-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.tx-card-name { font-size: 13px; font-weight: 700; }
.tx-card-loc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.tx-card-price { font-size: 16px; font-weight: 700; color: var(--up); text-align: right; white-space: nowrap; }
.tx-card-date { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }
.tx-card-meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); }

/* Prev price */
.prev-price { font-size: 10px; color: var(--muted); font-weight: normal; margin-top: 2px; white-space: nowrap; }
.prev-up { color: var(--up); }
.prev-dn { color: var(--dn); }

/* Direct badge */
.badge-direct { display:inline-block; font-size:9px; padding:1px 5px; border-radius:99px; background:rgba(234,179,8,.15); color:#fbbf24; border:1px solid rgba(234,179,8,.3); margin-left:4px; font-weight:600; vertical-align:middle; }

/* Detail Panel */
#detailOverlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:none; }
#detailPanel {
  position:fixed; right:0; top:0; bottom:0; width:440px; max-width:100vw;
  background:var(--bg); border-left:1px solid var(--border);
  z-index:201; overflow-y:auto; display:none;
  box-shadow:-8px 0 32px rgba(0,0,0,.5);
  transition: transform .2s ease;
}
#detailPanel::-webkit-scrollbar { width:4px; }
#detailPanel::-webkit-scrollbar-thumb { background:#475569; border-radius:3px; }
.dp-header { padding:14px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:1; }
.dp-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; float:right; padding:0 2px; }
.dp-close:hover { color:#fff; }
.dp-name { font-size:15px; font-weight:700; padding-right:24px; line-height:1.3; }
.dp-meta { font-size:11px; color:var(--muted); margin-top:3px; }
.dp-price { font-size:19px; font-weight:700; color:var(--up); margin-top:6px; }
.dp-prev { font-size:10px; color:var(--muted); margin-top:2px; }
.dp-section { padding:12px 16px; border-bottom:1px solid var(--border); }
.dp-stitle { font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.dp-yr-label { font-size:11px; color:var(--muted); font-weight:700; margin:8px 0 3px; }
.dp-tx-row { display:flex; gap:8px; padding:3px 0; border-bottom:1px solid #1e293b; font-size:12px; align-items:center; }
.dp-tx-date { color:var(--muted); min-width:64px; flex-shrink:0; }
.dp-tx-price { font-weight:600; color:var(--up); flex:1; }
.dp-tx-floor { color:var(--muted); min-width:28px; flex-shrink:0; }
@media (max-width:480px) { #detailPanel { width:100vw; } }

/* No data */
.no-data { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 13px; }

/* Truncation notice */
.trunc-notice { text-align: center; padding: 8px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }

/* Footer */
.footer-disclaimer { text-align: center; padding: 12px; font-size: 11px; color: #475569; border-top: 1px solid var(--border); margin-top: 16px; }

/* Responsive */
@media (max-width: 768px) {
  .desktop-table { display: none !important; }
  .mobile-cards { display: block !important; }
  .filter-row { gap: 6px; }
  .stat-item { min-width: 80px; }
  .table-wrap { max-height: none; border: none; }
  #app { padding: 8px !important; }
}
@media (min-width: 769px) {
  .desktop-table { display: block; }
  .mobile-cards { display: none; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="sp"></div>
  <div class="sa" id="loadingMsg">데이터 로딩 중...</div>
</div>

<div id="app" style="max-width:1200px;margin:0 auto;padding:12px 16px;display:none;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
    <div>
      <h1 style="font-size:18px;font-weight:700;">실거래가 탐색기</h1>
      <div class="sa" id="dataInfo"></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <a href="../" class="tab-btn" style="text-decoration:none;font-size:11px;">아파트 스크리너</a>
      <a href="../market/" class="tab-btn" style="text-decoration:none;font-size:11px;">월간 동향</a>
      <a href="../div/" class="tab-btn" style="text-decoration:none;font-size:11px;">배당·소각</a>
    </div>
  </div>

  <!-- Month Navigator -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
    <div class="month-nav">
      <button class="month-btn" id="prevMonth" onclick="changeMonth(-1)" title="이전 월">&larr;</button>
      <span class="month-label" id="monthLabel">—</span>
      <button class="month-btn" id="nextMonth" onclick="changeMonth(1)" title="다음 월">&rarr;</button>
    </div>
    <div id="loadStatus" class="sa" style="opacity:.6;"></div>
  </div>

  <!-- Filter Panel -->
  <div class="filter-panel">
    <!-- Row 1: Region + Gu -->
    <div class="filter-row">
      <span class="filter-label">지역</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        <button class="tab-btn active" id="rb-all" onclick="setRegion('all')">전체</button>
        <button class="tab-btn" id="rb-seoul" onclick="setRegion('seoul')">서울</button>
        <button class="tab-btn" id="rb-gyeonggi" onclick="setRegion('gyeonggi')">경기</button>
        <button class="tab-btn" id="rb-incheon" onclick="setRegion('incheon')">인천</button>
      </div>
      <div class="gu-dropdown" id="guDropdown">
        <button class="tab-btn" id="guBtn" onclick="toggleGuMenu(event)">
          구·시 선택<span class="badge-cnt" id="guBadge" style="display:none;"></span>
        </button>
        <div class="gu-menu" id="guMenu"></div>
      </div>
    </div>
    <!-- Gu chips -->
    <div class="chips-strip" id="guChips" style="margin-bottom:6px;min-height:0;"></div>
    <!-- Row 2: Price / Area / Name -->
    <div class="filter-row">
      <span class="filter-label">가격</span>
      <input class="fi" type="number" id="minPrice" placeholder="최소" style="width:72px;" oninput="scheduleFilter()">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0;">~</span>
      <input class="fi" type="number" id="maxPrice" placeholder="최대" style="width:72px;" oninput="scheduleFilter()">
      <span style="color:var(--muted);font-size:11px;flex-shrink:0;">억</span>

      <span class="filter-label" style="margin-left:8px;">면적</span>
      <input class="fi" type="number" id="minArea" placeholder="최소" style="width:64px;" oninput="scheduleFilter()">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0;">~</span>
      <input class="fi" type="number" id="maxArea" placeholder="최대" style="width:64px;" oninput="scheduleFilter()">
      <span style="color:var(--muted);font-size:11px;flex-shrink:0;">㎡</span>

      <span class="filter-label" style="margin-left:8px;">단지</span>
      <input class="fi" type="text" id="nameFilter" placeholder="단지명 검색..." style="width:150px;" oninput="scheduleFilter()">
    </div>
  </div>

  <!-- Summary Bar -->
  <div class="stat-bar" id="summaryBar">
    <div class="stat-item">
      <div class="sl">총 거래</div>
      <div class="sv" id="sumTotal">—</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-item">
      <div class="sl">평균가</div>
      <div class="sv" id="sumAvg">—</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-item">
      <div class="sl">중위가</div>
      <div class="sv" id="sumMedian">—</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-item">
      <div class="sl">최고가</div>
      <div class="sv" id="sumMax" style="color:var(--up);">—</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat-item">
      <div class="sl">최저가</div>
      <div class="sv" id="sumMin" style="color:var(--dn);">—</div>
    </div>
  </div>

  <!-- Desktop Table -->
  <div class="desktop-table table-wrap" id="tableWrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th onclick="setSort('d')" id="th-d">거래일 <span class="si" id="si-d">▼</span></th>
          <th onclick="setSort('g')" id="th-g">지역 <span class="si" id="si-g"></span></th>
          <th onclick="setSort('n')" id="th-n">단지명 <span class="si" id="si-n"></span></th>
          <th onclick="setSort('a')" id="th-a" style="text-align:right;">면적㎡ <span class="si" id="si-a"></span></th>
          <th onclick="setSort('p')" id="th-p" style="text-align:right;">가격 <span class="si" id="si-p"></span></th>
          <th onclick="setSort('f')" id="th-f" style="text-align:right;">층 <span class="si" id="si-f"></span></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Mobile Cards -->
  <div class="mobile-cards" id="mobileCards" style="display:none;"></div>

  <!-- Load more data button -->
  <button class="load-more-btn" id="loadMoreBtn" onclick="loadNextPage()" style="display:none;"></button>

  <!-- Footer -->
  <div class="footer-disclaimer">
    국토교통부 실거래가 공개시스템 데이터 기반 &middot; 참고용이며 투자 결정의 근거로 사용하지 마세요
  </div>

</div>

<!-- Detail Panel -->
<div id="detailOverlay" onclick="closeDetail()"></div>
<div id="detailPanel">
  <div class="dp-header">
    <button class="dp-close" onclick="closeDetail()">&#xD7;</button>
    <div class="dp-name" id="dpName">—</div>
    <div class="dp-meta" id="dpMeta">—</div>
    <div class="dp-price" id="dpPrice">—</div>
    <div class="dp-prev" id="dpPrev"></div>
  </div>
  <div class="dp-section">
    <div class="dp-stitle">가격 추이 (최근 36개월)</div>
    <canvas id="dpChart" style="width:100%;height:90px;display:block;"></canvas>
    <div id="dpChartMsg" style="display:none;color:var(--muted);font-size:11px;text-align:center;padding:8px;"></div>
  </div>
  <div class="dp-section">
    <div class="dp-stitle" id="dpTxTitle">거래 내역</div>
    <div id="dpTxList"><div style="color:var(--muted);font-size:12px;text-align:center;padding:16px;">로딩 중...</div></div>
  </div>
  <div style="padding:10px 16px;">
    <a id="dpScreenerLink" href="../" target="_blank" style="font-size:11px;color:var(--accent);">스크리너에서 전체 분석 보기 ↗</a>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const DATA_BASE = '../data/market';
const MAX_DISPLAY_ROWS = 1000; // DOM 성능을 위한 최대 표시 행 수

// 서울 25개 구
const SEOUL_GU = new Set([
  '강남구','강동구','강북구','강서구','관악구','광진구','구로구','금천구',
  '노원구','도봉구','동대문구','동작구','마포구','서대문구','서초구','성동구',
  '성북구','송파구','양천구','영등포구','용산구','은평구','종로구','중구','중랑구'
]);

// 인천 구·군 (서울과 겹치지 않는 것 위주, 중구는 서울로 분류)
const INCHEON_GU = new Set([
  '미추홀구','연수구','남동구','부평구','계양구','동구','서구','강화군','옹진군'
]);

// ==================== STATE ====================
const state = {
  month: null,
  allData: [],
  loadedPages: 0,
  totalPages: 0,
  totalRecords: 0,
  loading: false,
  allPagesLoaded: false,
  sort: { col: 'd', dir: 'desc' },
  filters: {
    region: 'all',
    gus: new Set(),
    name: '',
    minPrice: null,
    maxPrice: null,
    minArea: null,
    maxArea: null
  },
  availableGus: [],
  filterTimer: null,
  firstPageCache: null,  // 최초 fetch 캐시
  prevPriceMap: null,
  prevMapDataLen: -1
};

// ==================== UTILS ====================
function formatPrice(manwon) {
  if (manwon == null) return '—';
  if (manwon >= 10000) {
    const eok = manwon / 10000;
    const r = Math.round(eok * 10) / 10;
    return r + '억';
  }
  return manwon.toLocaleString() + '만';
}

function formatPriceFull(manwon) {
  if (manwon == null) return '—';
  const eok = Math.floor(manwon / 10000);
  const man = manwon % 10000;
  if (eok > 0 && man > 0) return eok + '억 ' + man.toLocaleString() + '만';
  if (eok > 0) return eok + '억';
  return manwon.toLocaleString() + '만';
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const p = dateStr.split('-');
  if (p.length < 3) return dateStr;
  return parseInt(p[1]) + '.' + p[2];
}

function getRegion(g) {
  if (!g) return 'gyeonggi';
  if (SEOUL_GU.has(g)) return 'seoul';
  if (INCHEON_GU.has(g)) return 'incheon';
  return 'gyeonggi';
}

function monthToLabel(ym) {
  if (!ym) return '—';
  const [y, m] = ym.split('-');
  return y + '년 ' + parseInt(m) + '월';
}

function addMonths(ym, delta) {
  const [y, m] = ym.split('-').map(Number);
  let nm = m + delta, ny = y;
  while (nm > 12) { nm -= 12; ny++; }
  while (nm < 1)  { nm += 12; ny--; }
  return ny + '-' + String(nm).padStart(2, '0');
}

// ==================== DATA LOADING ====================
async function detectLatestMonth() {
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth() + 1;

  for (let i = 0; i < 6; i++) {
    const ym = y + '-' + String(m).padStart(2, '0');
    try {
      const res = await fetch(`${DATA_BASE}/${ym}/1.json`);
      if (res.ok) {
        state.firstPageCache = { ym, json: await res.json() };
        return ym;
      }
    } catch(e) {}
    if (--m < 1) { m = 12; y--; }
  }
  return null;
}

async function loadMonth(ym) {
  state.allData = [];
  state.loadedPages = 0;
  state.totalPages = 0;
  state.totalRecords = 0;
  state.allPagesLoaded = false;
  state.month = ym;
  state.availableGus = [];
  state.prevPriceMap = null;
  state.prevMapDataLen = -1;

  document.getElementById('monthLabel').textContent = monthToLabel(ym);
  document.getElementById('prevMonth').disabled = false;
  document.getElementById('nextMonth').disabled = false;

  await loadNextPage(); // 1페이지 로드 후 나머지 백그라운드 자동 로드
  if (state.totalPages > 1 && state.month === ym) {
    loadAllPagesBackground(ym);
  } else {
    state.allPagesLoaded = true;
    render();
  }
}

async function loadNextPage() {
  if (state.loading) return;
  if (state.totalPages > 0 && state.loadedPages >= state.totalPages) return;

  state.loading = true;
  const pageNum = state.loadedPages + 1;
  const btn = document.getElementById('loadMoreBtn');
  if (btn) { btn.disabled = true; }

  setLoadStatus('페이지 ' + pageNum + ' 로딩 중...');

  try {
    let json;
    if (state.firstPageCache && state.firstPageCache.ym === state.month && pageNum === 1) {
      json = state.firstPageCache.json;
      state.firstPageCache = null;
    } else {
      const res = await fetch(`${DATA_BASE}/${state.month}/${pageNum}.json`);
      if (!res.ok) {
        if (pageNum === 1) {
          renderEmpty('이 달의 데이터가 없습니다');
          updateSummary([]);
        }
        state.loading = false;
        setLoadStatus('');
        updateLoadMoreBtn();
        return;
      }
      json = await res.json();
    }

    state.totalPages = json.meta.pages;
    state.totalRecords = json.meta.total;
    state.loadedPages = pageNum;
    state.allData = state.allData.concat(json.data || []);
    updateAvailableGus(json.data || []);

    setLoadStatus('');
    render();

  } catch(e) {
    console.error('로드 오류:', e);
    setLoadStatus('로드 오류');
  }

  state.loading = false;
  updateLoadMoreBtn();
}

async function loadAllPagesBackground(ym) {
  const pagesToLoad = [];
  for (let p = 2; p <= state.totalPages; p++) pagesToLoad.push(p);
  if (!pagesToLoad.length) { state.allPagesLoaded = true; render(); return; }

  // 더보기 버튼 숨기기 (자동 로드 중)
  const btn = document.getElementById('loadMoreBtn');
  if (btn) btn.style.display = 'none';
  setLoadStatus('집계 데이터 로딩 중... (' + state.totalPages + '페이지)');

  const results = await Promise.all(
    pagesToLoad.map(p =>
      fetch(`${DATA_BASE}/${ym}/${p}.json`).then(r => r.ok ? r.json() : null).catch(() => null)
    )
  );

  if (state.month !== ym) return; // 월이 바뀐 경우 중단

  for (const json of results) {
    if (!json) continue;
    state.allData = state.allData.concat(json.data || []);
    updateAvailableGus(json.data || []);
  }
  state.loadedPages = state.totalPages;

  state.allPagesLoaded = true;
  setLoadStatus('');
  updateLoadMoreBtn();
  render();
}

function updateAvailableGus(records) {
  const existing = new Set(state.availableGus);
  records.forEach(r => {
    if (r.g && !existing.has(r.g)) {
      existing.add(r.g);
      state.availableGus.push(r.g);
    }
  });
  state.availableGus.sort((a, b) => {
    const ra = getRegion(a), rb = getRegion(b);
    const ord = { seoul: 0, incheon: 1, gyeonggi: 2 };
    if (ra !== rb) return ord[ra] - ord[rb];
    return a.localeCompare(b, 'ko');
  });
}

function setLoadStatus(msg) {
  document.getElementById('loadStatus').textContent = msg;
}

function updateLoadMoreBtn() {
  const btn = document.getElementById('loadMoreBtn');
  if (!btn) return;
  if (state.loadedPages < state.totalPages) {
    btn.style.display = 'block';
    btn.disabled = state.loading;
    btn.textContent = '데이터 더 불러오기 (' + state.loadedPages + '/' + state.totalPages + ' 페이지)';
  } else {
    btn.style.display = 'none';
  }
}

// ==================== FILTERING & SORTING ====================
function getFilteredData() {
  let data = state.allData;
  const f = state.filters;

  if (f.region !== 'all') {
    data = data.filter(r => getRegion(r.g) === f.region);
  }
  if (f.gus.size > 0) {
    data = data.filter(r => f.gus.has(r.g));
  }
  if (f.name) {
    const q = f.name.toLowerCase();
    data = data.filter(r => r.n && r.n.toLowerCase().includes(q));
  }
  if (f.minPrice != null && f.minPrice !== '') {
    data = data.filter(r => r.p >= f.minPrice * 10000);
  }
  if (f.maxPrice != null && f.maxPrice !== '') {
    data = data.filter(r => r.p <= f.maxPrice * 10000);
  }
  if (f.minArea != null && f.minArea !== '') {
    data = data.filter(r => r.a >= f.minArea);
  }
  if (f.maxArea != null && f.maxArea !== '') {
    data = data.filter(r => r.a <= f.maxArea);
  }
  return data;
}

function getSortedData(data) {
  const { col, dir } = state.sort;
  const factor = dir === 'asc' ? 1 : -1;
  return [...data].sort((a, b) => {
    let va = a[col], vb = b[col];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return factor * va.localeCompare(vb, 'ko');
    return factor * (va - vb);
  });
}

function computeSummary(data) {
  if (!data.length) return { count: 0, avg: null, median: null, max: null, min: null };
  const prices = data.map(r => r.p).filter(p => p != null).sort((a, b) => a - b);
  const n = prices.length;
  if (!n) return { count: data.length, avg: null, median: null, max: null, min: null };
  const sum = prices.reduce((a, b) => a + b, 0);
  const avg = sum / n;
  const median = n % 2 === 0 ? (prices[n/2 - 1] + prices[n/2]) / 2 : prices[Math.floor(n/2)];
  return { count: data.length, avg, median, max: prices[n-1], min: prices[0] };
}

// ==================== PREV PRICE ====================
function buildPrevPriceMap() {
  if (state.prevMapDataLen === state.allData.length && state.prevPriceMap) return;
  const sorted = [...state.allData].sort((a, b) => {
    if (!a.d && !b.d) return 0;
    if (!a.d) return -1;
    if (!b.d) return 1;
    return a.d < b.d ? -1 : a.d > b.d ? 1 : 0;
  });
  const latestMid = new Map(); // 직거래 제외한 최근 거래만 "이전가" 기준으로 사용
  const map = new Map();
  for (const r of sorted) {
    const key = (r.n || '') + '|' + (r.a != null ? r.a : '');
    if (latestMid.has(key)) map.set(r, latestMid.get(key));
    if (!r.dt) latestMid.set(key, r); // 직거래 아닌 것만 등록
  }
  state.prevPriceMap = map;
  state.prevMapDataLen = state.allData.length;
}

function renderPrevPrice(r) {
  if (!state.prevPriceMap || r.dt) return ''; // 직거래는 직전가 표시 안 함
  const prev = state.prevPriceMap.get(r);
  if (!prev || prev.p == null || r.p == null) return '';
  const dateStr = prev.d ? prev.d.slice(0, 7) : '';
  const pct = Math.round((r.p - prev.p) / prev.p * 1000) / 10;
  const sign = pct >= 0 ? '+' : '';
  const cls = pct > 0 ? 'prev-up' : pct < 0 ? 'prev-dn' : '';
  return '<div class="prev-price">이전 ' + formatPriceFull(prev.p) + ' (' + dateStr +
    ', <span class="' + cls + '">' + sign + pct + '%</span>)</div>';
}

function drawDetailSparkline(canvas, priceData) {
  // priceData: 252 monthly prices (2006-01 ~ 2026-12), 0=없음
  const pts = [];
  const startIdx = Math.max(0, priceData.length - 36);
  for (let i = startIdx; i < priceData.length; i++) {
    if (priceData[i] > 0) pts.push(priceData[i]);
  }
  const W = canvas.offsetWidth || 400;
  const H = 90;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (pts.length < 2) { return; }
  const mn = Math.min(...pts), mx = Math.max(...pts), range = mx - mn || 1;
  const pad = { t: 14, b: 14, l: 4, r: 4 };
  const toX = i => pad.l + i / (pts.length - 1) * (W - pad.l - pad.r);
  const toY = v => pad.t + (1 - (v - mn) / range) * (H - pad.t - pad.b);
  const xs = pts.map((_, i) => toX(i)), ys = pts.map(v => toY(v));
  // Fill
  ctx.beginPath();
  ctx.moveTo(xs[0], H);
  xs.forEach((x, i) => ctx.lineTo(x, ys[i]));
  ctx.lineTo(xs[xs.length-1], H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(59,130,246,.1)';
  ctx.fill();
  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 1.5;
  xs.forEach((x, i) => i === 0 ? ctx.moveTo(x, ys[i]) : ctx.lineTo(x, ys[i]));
  ctx.stroke();
  // Last dot
  ctx.beginPath();
  ctx.fillStyle = '#ef4444';
  ctx.arc(xs[xs.length-1], ys[ys.length-1], 3, 0, Math.PI * 2);
  ctx.fill();
  // Min/Max labels
  ctx.font = '9px sans-serif'; ctx.fillStyle = '#64748b';
  ctx.textAlign = 'left'; ctx.fillText(formatPriceFull(Math.round(mn * 10000)), pad.l, H - 2);
  ctx.textAlign = 'right'; ctx.fillText(formatPriceFull(Math.round(mx * 10000)), W - pad.r, 10);
}

function updateSummary(data) {
  const s = computeSummary(data);
  const f = state.filters;
  const hasFilters = f.region !== 'all' || f.gus.size > 0 || f.name ||
    (f.minPrice != null && f.minPrice !== '') || (f.maxPrice != null && f.maxPrice !== '') ||
    (f.minArea != null && f.minArea !== '') || (f.maxArea != null && f.maxArea !== '');

  if (!state.allPagesLoaded) {
    // 전체 로드 전: 필터 없으면 서버 전체 건수, 필터 있으면 계산 중
    document.getElementById('sumTotal').textContent =
      (!hasFilters && state.totalRecords > 0) ? state.totalRecords.toLocaleString() + '건' : '계산 중…';
    document.getElementById('sumAvg').textContent    = '계산 중…';
    document.getElementById('sumMedian').textContent = '계산 중…';
    document.getElementById('sumMax').textContent    = '계산 중…';
    document.getElementById('sumMin').textContent    = '계산 중…';
  } else {
    // 전체 로드 완료: 필터된 정확한 건수와 통계
    document.getElementById('sumTotal').textContent   = s.count.toLocaleString() + '건';
    document.getElementById('sumAvg').textContent     = s.avg    != null ? formatPrice(Math.round(s.avg))    : '—';
    document.getElementById('sumMedian').textContent  = s.median != null ? formatPrice(Math.round(s.median)) : '—';
    document.getElementById('sumMax').textContent     = s.max    != null ? formatPrice(s.max)                : '—';
    document.getElementById('sumMin').textContent     = s.min    != null ? formatPrice(s.min)                : '—';
  }
}

        '<span class="gu-chk">' + (sel ? '✓' : '') + '</span>' + g +
        '</div>';
    });

  menu.innerHTML = html || '<div style="padding:8px;color:var(--muted);font-size:12px;">데이터 없음</div>';

  // 배지
  const badge = document.getElementById('guBadge');
  if (state.filters.gus.size > 0) {
    badge.style.display = 'inline';
    badge.textContent = state.filters.gus.size;
  } else {
    badge.style.display = 'none';
  }
}

function renderGuChips() {
  const container = document.getElementById('guChips');
  if (state.filters.gus.size === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = [...state.filters.gus].map(g =>
    '<span class="chip selected" onclick="toggleGu(\'' + escAttr(g) + '\')">' +
      g + ' <span class="chip-x">&times;</span>' +
    '</span>'
  ).join('');
}

function updateDataInfo() {
  const loaded = state.allData.length;
  const total  = state.totalRecords;
  document.getElementById('dataInfo').textContent =
    loaded.toLocaleString() + '건 로드 (' + state.loadedPages + '/' + state.totalPages + ' 페이지) · 전체 ' + total.toLocaleString() + '건';
}

function updateSortIcons() {
  ['d','g','n','a','p','f'].forEach(col => {
    const si = document.getElementById('si-' + col);
    const th = document.getElementById('th-' + col);
    if (!si || !th) return;
    if (state.sort.col === col) {
      si.textContent = state.sort.dir === 'asc' ? '▲' : '▼';
      th.classList.add('sort-active');
    } else {
      si.textContent = '';
      th.classList.remove('sort-active');
    }
  });
}

function escAttr(s) {
  return s.replace(/'/g, "\\'");
}

// ==================== URL HASH (P4) ====================
function encodeHash() {
  const f = state.filters;
  const parts = [];
  if (state.month)    parts.push('m=' + state.month);
  if (f.region !== 'all') parts.push('r=' + f.region);
  if (f.gus.size > 0) parts.push('g=' + encodeURIComponent([...f.gus].join(',')));
  if (f.minPrice)     parts.push('min=' + f.minPrice);
  if (f.maxPrice)     parts.push('max=' + f.maxPrice);
  if (f.minArea)      parts.push('amin=' + f.minArea);
  if (f.maxArea)      parts.push('amax=' + f.maxArea);
  if (f.name)         parts.push('q=' + encodeURIComponent(f.name));
  parts.push('sort=' + state.sort.col + '-' + state.sort.dir);

  const hash = '#' + parts.join('&');
  if (location.hash !== hash) history.replaceState(null, '', hash);
}

function decodeHash() {
  const raw = location.hash.slice(1);
  if (!raw) return {};
  const result = {};
  raw.split('&').forEach(seg => {
    const eq = seg.indexOf('=');
    if (eq < 0) return;
    const k = seg.slice(0, eq);
    const v = decodeURIComponent(seg.slice(eq + 1));
    result[k] = v;
  });
  return result;
}

function applyHashToState(params) {
  if (params.r) state.filters.region = params.r;
  if (params.g) state.filters.gus = new Set(params.g.split(',').filter(Boolean));
  if (params.min)  state.filters.minPrice = parseFloat(params.min);
  if (params.max)  state.filters.maxPrice = parseFloat(params.max);
  if (params.amin) state.filters.minArea  = parseFloat(params.amin);
  if (params.amax) state.filters.maxArea  = parseFloat(params.amax);
  if (params.q)    state.filters.name     = params.q;
  if (params.sort) {
    const idx = params.sort.lastIndexOf('-');
    state.sort.col = params.sort.slice(0, idx);
    state.sort.dir = params.sort.slice(idx + 1) || 'desc';
  }
}

function applyStateToInputs() {
  const f = state.filters;
  ['all','seoul','gyeonggi','incheon'].forEach(r => {
    document.getElementById('rb-' + r).classList.toggle('active', f.region === r);
  });
  document.getElementById('minPrice').value  = f.minPrice  != null ? f.minPrice  : '';
  document.getElementById('maxPrice').value  = f.maxPrice  != null ? f.maxPrice  : '';
  document.getElementById('minArea').value   = f.minArea   != null ? f.minArea   : '';
  document.getElementById('maxArea').value   = f.maxArea   != null ? f.maxArea   : '';
  document.getElementById('nameFilter').value = f.name || '';
}

function updateHashState() {
  encodeHash();
}

// ==================== EVENT HANDLERS ====================
function changeMonth(delta) {
  if (!state.month) return;
  const newMonth = addMonths(state.month, delta);
  loadMonth(newMonth);
  // 다음 달로 넘어갈 때 로드 실패 시 메시지 표시는 loadNextPage에서 처리
}

function setRegion(r) {
  state.filters.region = r;
  state.filters.gus = new Set();
  ['all','seoul','gyeonggi','incheon'].forEach(id => {
    document.getElementById('rb-' + id).classList.toggle('active', id === r);
  });
  render();
}

function toggleGu(gu) {
  if (state.filters.gus.has(gu)) state.filters.gus.delete(gu);
  else state.filters.gus.add(gu);
  render();
}

function toggleGuMenu(e) {
  e.stopPropagation();
  document.getElementById('guMenu').classList.toggle('open');
}

document.addEventListener('click', e => {
  const dropdown = document.getElementById('guDropdown');
  if (dropdown && !dropdown.contains(e.target)) {
    document.getElementById('guMenu').classList.remove('open');
  }
});

let filterTimer = null;
function scheduleFilter() {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => {
    const f = state.filters;
    f.name     = document.getElementById('nameFilter').value.trim();
    const minP = document.getElementById('minPrice').value;
    const maxP = document.getElementById('maxPrice').value;
    const minA = document.getElementById('minArea').value;
    const maxA = document.getElementById('maxArea').value;
    f.minPrice = minP !== '' ? parseFloat(minP) : null;
    f.maxPrice = maxP !== '' ? parseFloat(maxP) : null;
    f.minArea  = minA !== '' ? parseFloat(minA) : null;
    f.maxArea  = maxA !== '' ? parseFloat(maxA) : null;
    render();
  }, 300);
}

function setSort(col) {
  if (state.sort.col === col) {
    state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    state.sort.col = col;
    // 거래일·가격은 내림차순이 기본값
    state.sort.dir = (col === 'd' || col === 'p') ? 'desc' : 'asc';
  }
  updateSortIcons();
  render();
}

// ==================== INIT ====================
async function init() {
  const params = decodeHash();
  applyHashToState(params);
  applyStateToInputs();
  updateSortIcons();

  const targetMonth = params.m || null;
  let month;

  if (targetMonth) {
    month = targetMonth;
    // 캐시 없이 직접 로드
  } else {
    document.getElementById('loadingMsg').textContent = '최신 데이터 탐색 중...';
    month = await detectLatestMonth();
  }

  if (!month) {
    document.getElementById('loading').innerHTML =
      '<div style="color:var(--muted);font-size:13px;">데이터를 찾을 수 없습니다</div>';
    return;
  }

  await loadMonth(month);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

init();
</script>
